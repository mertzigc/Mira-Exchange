// Plockar ut sektioner och tabeller från agentens markdown-output
function parseKalkylMarkdown(md){
  const out={meta:{},ytor:[],tid:{},kostnader:[],totalManad:null,pris:{},bemanning:{passLista:[],tillsyn:null,fokus:null},forslag2:[],sections:{}};
  const lines=md.split("\n");

  // Hjälpfunktion: rensa markdown och extrahera siffra
  const num=s=>{
    if(s==null)return null;
    const t=String(s).replace(/\*\*/g,"").trim();
    // Föredra tal som är följda av "kr" – det är beloppet
    const krMatch=t.match(/([-]?\d[\d\s.,]*)\s*kr/i);
    if(krMatch){
      const n=parseFloat(krMatch[1].replace(/\s/g,"").replace(",","."));
      if(!isNaN(n)&&isFinite(n))return n;
    }
    // Fallback: första vettiga siffer-sekvens
    const m=t.match(/(-?\d[\d\s.,]*)/);
    if(!m)return null;
    const n=parseFloat(m[1].replace(/\s/g,"").replace(",","."));
    return (isNaN(n)||!isFinite(n))?null:n;
  };
  const clean=s=>String(s||"").replace(/\*\*/g,"").trim();

  // Plockar ut "Etikett: värde" från listrad.
  // useLastColon=true → sista kolonet (för kostnader där etiketten kan innehålla kolon, t.ex. "OB-tillägg (vardagar: +26 kr/h)")
  // useLastColon=false → första kolonet (default, för värden som innehåller kolon, t.ex. tider "Pass 1: 06:00 – 08:00")
  const parseListItem=(line,useLastColon)=>{
    const m=line.trim().match(/^[-*]\s+(.+)$/);
    if(!m)return null;
    const txt=m[1].trim();
    const colonIdx=useLastColon?txt.lastIndexOf(":"):txt.indexOf(":");
    if(colonIdx===-1)return null;
    return {
      label:clean(txt.substring(0,colonIdx)),
      value:clean(txt.substring(colonIdx+1))
    };
  };

  // Dela upp markdown i sektioner med ## som rubrik
  let currentSection=null;
  const sections={};
  for(const line of lines){
    const m=line.match(/^##\s+(.+?)\s*$/);
    if(m){currentSection=m[1].trim();sections[currentSection]=[];continue;}
    if(currentSection){sections[currentSection].push(line);}
  }
  out.sections=sections;

  // 1. Uppdragssammanfattning → meta
  const sumLines=sections["Uppdragssammanfattning"]||[];
  for(const l of sumLines){
    const item=parseListItem(l);
    if(!item)continue;
    const k=item.label.toLowerCase();
    const v=item.value;
    if(k.includes("kund"))out.meta.kund=v;
    else if(k.includes("adress"))out.meta.adress=v;
    else if(k.includes("total yta"))out.meta.kvm=v;
    else if(k.includes("medarbetare"))out.meta.medarbetare=v;
    else if(k.includes("frekvens")||k.includes("städ frekvens"))out.meta.frekvens=v;
    else if(k.includes("tid på dygnet"))out.meta.tidpadygnet=v;
    else if(k.includes("beläggning"))out.meta.belaggning=v;
    else if(k.includes("diskplock"))out.meta.diskplock=v;
    else if(k.includes("daglig tillsyn"))out.meta.dagligTillsyn=v;
  }

  // 2. Yttyper och tidsåtgång → tabell eller lista
  const ytLines=sections["Yttyper och tidsåtgång"]||[];
  for(const l of ytLines){
    const t=l.trim();
    // Tabellrad
    if(t.startsWith("|")&&t.endsWith("|")){
      const cells=t.split("|").slice(1,-1).map(c=>c.trim());
      if(cells.length<4)continue;
      if(cells.every(c=>/^:?-+:?$/.test(c)))continue;
      if(cells[0].toLowerCase().includes("yttyp"))continue;
      // Stöd både 4-kolumns (gammal) och 5-kolumns (ny med avverkning)
      if(cells.length>=5){
        out.ytor.push({
          namn:clean(cells[0]),
          avverkning:clean(cells[1]),
          enhet:clean(cells[2]),
          tid:clean(cells[3]),
          frekvens:clean(cells[4])
        });
      }else{
        out.ytor.push({
          namn:clean(cells[0]),
          avverkning:"",
          enhet:clean(cells[1]),
          tid:clean(cells[2]),
          frekvens:clean(cells[3])
        });
      }
      continue;
    }
    // Listrad fallback
    const listMatch=t.match(/^\s*[-*]\s*\*?\*?([^:]+?)\*?\*?:\s*(.+)$/);
    if(listMatch){
      const namn=clean(listMatch[1]);
      const rest=listMatch[2].split(/[,;]/).map(s=>s.trim());
      if(rest.length>=2){
        out.ytor.push({namn,avverkning:"",enhet:rest[0]||"",tid:rest[1]||"",frekvens:rest[2]||""});
      }
    }
  }

  // 3. Tidsberäkning
  const tidLines=sections["Tidsberäkning"]||[];
  for(const l of tidLines){
    const item=parseListItem(l);
    if(!item)continue;
    const k=item.label.toLowerCase();
    const v=item.value;
    if(k.includes("tillfälle"))out.tid.tillfalle=v;
    else if(k.includes("vecka"))out.tid.vecka=v;
    else if(k.includes("månad"))out.tid.manad=v;
  }

  // 4. Kostnadssammanställning → stöd både tabell och lista
  const kostLines=sections["Kostnadssammanställning"]||[];
  for(const l of kostLines){
    const t=l.trim();
    // Tabellrad
    if(t.startsWith("|")&&t.endsWith("|")){
      const cells=t.split("|").slice(1,-1).map(c=>c.trim());
      if(cells.length<2)continue;
      if(cells.every(c=>/^:?-+:?$/.test(c)))continue;
      if(cells[0].toLowerCase()==="post")continue;
      const post=clean(cells[0]);
      const belopp=num(cells[1]);
      if(post.toLowerCase().includes("total månadskostnad")){
        out.totalManad=belopp;
      }else if(belopp!=null){
        out.kostnader.push({post,belopp});
      }
      continue;
    }
    // Listrad: "- Post: belopp" eller "* Post: belopp" (använder sista kolonet pga OB med kolon i etikett)
    const listItem=parseListItem(t,true);
    if(listItem){
      const post=listItem.label;
      const belopp=num(listItem.value);
      if(post.toLowerCase().includes("total månadskostnad")){
        out.totalManad=belopp;
      }else if(belopp!=null){
        out.kostnader.push({post,belopp});
      }
    }
  }

  // Fallback: om Kostnadssammanställning är tom, leta efter kostnadsmönster i hela md
  if(out.kostnader.length===0&&out.totalManad==null){
    const knownPosts=["Regelmässigt städ","OB-tillägg","Daglig tillsyn","Funktionshyra maskin","Löpande materialkostnad","Mopphantering","Övriga kostnader"];
    for(const line of lines){
      const t=line.trim();
      for(const kp of knownPosts){
        if(t.toLowerCase().includes(kp.toLowerCase())){
          // Försök plocka belopp från raden
          const beloppMatch=t.match(/([\d\s.,]+)\s*kr/i);
          if(beloppMatch){
            const belopp=num(beloppMatch[1]);
            if(belopp!=null&&!out.kostnader.some(k=>k.post.toLowerCase().includes(kp.toLowerCase()))){
              out.kostnader.push({post:t.replace(/^[-*\s|]+/,"").replace(/\s*\|.*$/,"").replace(/\*\*/g,"").trim(),belopp});
            }
            break;
          }
        }
      }
      // Total månadskostnad
      if(out.totalManad==null && /total\s*månadskostnad/i.test(t)){
        const beloppMatch=t.match(/([\d\s.,]+)\s*kr/i);
        if(beloppMatch){const b=num(beloppMatch[1]); if(b!=null)out.totalManad=b;}
      }
    }
  }

  // 5. Prissättning
  const prisLines=sections["Prissättning"]||[];
  for(const l of prisLines){
    const item=parseListItem(l);
    if(!item)continue;
    const k=item.label.toLowerCase();
    const v=item.value;
    const n=num(v);
    if(k.includes("önskad tg"))out.pris.tgOnskad=v;
    else if(k.includes("pris till kund"))out.pris.prisManad=n;
    else if(k==="tb"||k.includes("tb "))out.pris.tb=n;
    else if(k==="tg"||k.startsWith("tg "))out.pris.tg=v;
    else if(k.includes("årspris"))out.pris.arspris=n;
    else if(k.includes("totalt år 1"))out.pris.totaltAr1=n;
    else if(k.includes("engångskostnad")||k.includes("uppstart"))out.pris.uppstart=n;
  }

  // 6. Bemanningsförslag
  const bemLines=sections["Bemanningsförslag"]||[];
  for(const l of bemLines){
    const item=parseListItem(l);
    if(!item)continue;
    const k=item.label.toLowerCase();
    const v=item.value;
    if(k.includes("regelmässig städning")||k.includes("antal lokalvårdare"))out.bemanning.regelmassig=v;
    else if(k.startsWith("pass"))out.bemanning.passLista.push({namn:item.label,tid:v});
    else if(k.includes("fokus"))out.bemanning.fokus=v;
    else if(k.includes("daglig tillsyn"))out.bemanning.tillsyn=v;
  }

  // 7. Förslag 2
  const f2Lines=sections["Förslag 2 – Marknadsjämförelse (min expertkalkyl)"]||[];
  for(const l of f2Lines){
    const t=l.trim();
    if(t.startsWith("-")||t.startsWith("*")){
      out.forslag2.push(clean(t.replace(/^[-*]\s*/,"")));
    }
  }

  // 8. Ytor per våning (om flera plan)
  out.vaningar=[];
  const vaningLines=sections["Ytor per våning"]||[];
  let currentVaning=null;
  for(const l of vaningLines){
    const t=l.trim();
    // Våningsrubrik: **Plan 1** eller **Plan 1** etc.
    const planMatch=t.match(/^\*\*\s*(Plan|Våning|Vaning|Plan\s)\s*([^*:]+?)\s*\*\*\s*$/i);
    const summaMatch=t.match(/^[-*]?\s*\*\*\s*(Summa|Total)\s+(Plan|Våning|Vaning)\s*([^:*]+?):\s*([\d\s.,]+)\s*kvm\s*\*\*/i);
    const grandTotalMatch=t.match(/^[-*]?\s*\*\*\s*Total\s+över\s+alla\s+våningar:\s*([\d\s.,]+)\s*kvm/i);
    if(grandTotalMatch){
      out.vaningarTotal=num(grandTotalMatch[1]);
      continue;
    }
    if(summaMatch){
      if(currentVaning){currentVaning.summa=num(summaMatch[4]);}
      continue;
    }
    if(planMatch && !/^summa/i.test(t.replace(/\*/g,""))){
      currentVaning={namn:"Plan "+clean(planMatch[2]),ytor:[],summa:null};
      out.vaningar.push(currentVaning);
      continue;
    }
    // Yttyprad inom våning: "- Arbetsplatser/kontor: 800 kvm"
    const ytMatch=t.match(/^[-*]\s*([^:]+?):\s*([\d\s.,]+)\s*kvm/i);
    if(ytMatch && currentVaning){
      currentVaning.ytor.push({namn:clean(ytMatch[1]),kvm:num(ytMatch[2])});
    }
  }

  // 9. DETERMINISTISK DISKPLOCK + sanering av felaktig diskplock-yttyprad
  // Ta bort eventuell diskplock-rad som modellen felaktigt lagt i yttyptabellen
  // (känns igen på namn "diskplock" – diskplock är ALDRIG en yta med avverkning).
  out.ytor=out.ytor.filter(y=>!/diskplock/i.test(y.namn||""));
  // Beräkna diskplocktid deterministiskt om diskplock är valt
  out.diskplockTid=null;
  const diskplockJa=/\bja\b/i.test(String(out.meta.diskplock||""));
  if(diskplockJa){
    const totalKvm=pNum(out.meta.kvm)||0;
    const medarbetare=pNum(out.meta.medarbetare)||0;
    let belaggning=pNum(out.meta.belaggning);
    if(belaggning==null) belaggning=100;
    // Beläggning anges i procent (t.ex. 100) → dela med 100
    const belFrac=belaggning>1?belaggning/100:belaggning;
    const minuter=(medarbetare*belFrac*0.5)+(totalKvm/100);
    out.diskplockTid=minuter/60; // timmar per tillfälle
    out.diskplockMin=minuter;
  }

  return out;
}

// Hjälpfunktion för att plocka ut ett tal ur sträng (parser-intern)
function pNum(s){
  if(s==null)return null;
  // Ta bort markdown, alla typer av mellanslag (inkl. hårt/smalt) och normalisera decimaltecken
  const t=String(s).replace(/\*\*/g,"").replace(/[\s\u00a0\u202f\u2009]/g,"").replace(",",".");
  const m=t.match(/-?\d+(\.\d+)?/);
  return m?parseFloat(m[0]):null;
}

// Bygger en LEVANDE Excel-fil med formler – ändringar räknar om automatiskt
async function downloadKalkylAsXlsx(markdown,filename,title){
  if(typeof ExcelJS==="undefined")throw new Error("ExcelJS-biblioteket är inte laddat");

  const data=parseKalkylMarkdown(markdown);
  const hasStructure=Object.keys(data.meta).length>0||data.ytor.length>0||data.kostnader.length>0;

  if(!hasStructure){
    return downloadFallbackXlsx(markdown,filename,title);
  }

  // === STYLE-KONSTANTER ===
  const ORANGE="FFF59E0B";
  const ORANGE_LIGHT="FFFEF3C7";
  const DARK="FF1F2937";
  const GRAY_LIGHT="FFF9FAFB";
  const GRAY_MED="FFE5E7EB";
  const GRAY_DARK="FF6B7280";
  const INPUT_BG="FFEFF6FF";       // Ljusblå för redigerbara celler
  const WHITE="FFFFFFFF";
  const TOTAL_BG="FF1F2937";
  const SUBTOTAL_BG="FFFEF3C7";

  const wb=new ExcelJS.Workbook();
  wb.creator="Carotte AI";
  wb.created=new Date();

  const ws=wb.addWorksheet("Kalkyl",{
    pageSetup:{paperSize:9,orientation:"portrait",fitToPage:true,fitToWidth:1,fitToHeight:0,margins:{left:0.5,right:0.5,top:0.5,bottom:0.5}},
    views:[{showGridLines:false,zoomScale:110}]
  });

  ws.columns=[{width:46},{width:18},{width:16},{width:22}];

  // === HJÄLPARE ===
  const thinBorder={style:"thin",color:{argb:GRAY_MED}};
  const allThin={top:thinBorder,bottom:thinBorder,left:thinBorder,right:thinBorder};

  const sectionHeader=(rowNum,label)=>{
    ws.mergeCells(rowNum,1,rowNum,4);
    const cell=ws.getCell(rowNum,1);
    cell.value=label;
    cell.font={name:"Calibri",size:14,bold:true,color:{argb:WHITE}};
    cell.fill={type:"pattern",pattern:"solid",fgColor:{argb:ORANGE}};
    cell.alignment={vertical:"middle",horizontal:"left",indent:1};
    ws.getRow(rowNum).height=26;
  };

  const tableHeader=(rowNum,labels)=>{
    labels.forEach((lbl,i)=>{
      const cell=ws.getCell(rowNum,i+1);
      cell.value=lbl;
      cell.font={name:"Calibri",size:11,bold:true,color:{argb:DARK}};
      cell.fill={type:"pattern",pattern:"solid",fgColor:{argb:ORANGE_LIGHT}};
      cell.alignment={vertical:"middle",horizontal:i===0?"left":"right",indent:i===0?1:0};
      cell.border={...allThin,bottom:{style:"medium",color:{argb:ORANGE}}};
    });
    ws.getRow(rowNum).height=22;
  };

  // Hjälper att skapa en cell med styling i ett anrop
  const styleCell=(cell,opts={})=>{
    if(opts.formula){
      cell.value={formula:opts.formula};
    }else if(opts.value!==undefined){
      cell.value=opts.value;
    }
    cell.font={name:"Calibri",size:opts.size||11,color:{argb:opts.color||DARK},bold:!!opts.bold,italic:!!opts.italic};
    cell.fill={type:"pattern",pattern:"solid",fgColor:{argb:opts.bg||WHITE}};
    cell.alignment={vertical:"middle",horizontal:opts.align||"left",indent:opts.indent!=null?opts.indent:1,wrapText:true};
    cell.border=opts.border||allThin;
    if(opts.numFmt)cell.numFmt=opts.numFmt;
    return cell;
  };

  // Hjälper att tolka tal i en text-cell (t.ex. "250 m²/h" → 250)
  const extractNum=s=>{
    if(s==null)return null;
    const m=String(s).match(/(-?\d[\d\s.,]*)/);
    if(!m)return null;
    const n=parseFloat(m[1].replace(/\s/g,"").replace(",","."));
    return (isNaN(n)||!isFinite(n))?null:n;
  };

  let r=1;

  // === SIDHUVUD ===
  ws.mergeCells(r,1,r,4);
  styleCell(ws.getCell(r,1),{value:"CAROTTE STÄDKALKYL",size:24,bold:true,color:DARK,border:{}});
  ws.getRow(r).height=38;
  r++;

  ws.mergeCells(r,1,r,4);
  styleCell(ws.getCell(r,1),{value:title||"Sammanställning",size:13,italic:true,color:ORANGE,border:{}});
  ws.getRow(r).height=22;
  r++;

  ws.mergeCells(r,1,r,4);
  styleCell(ws.getCell(r,1),{value:"Genererad "+new Date().toLocaleDateString("sv-SE")+" "+new Date().toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"}),size:9,color:GRAY_DARK,border:{}});
  ws.getRow(r).height=16;
  r++;

  ws.getRow(r).height=4;
  ws.mergeCells(r,1,r,4);
  ws.getCell(r,1).fill={type:"pattern",pattern:"solid",fgColor:{argb:ORANGE}};
  r+=2;

  // === KONSTANTER (redigerbara) ===
  sectionHeader(r,"KONSTANTER (redigerbara – ändra värdet så räknas allt om)");r++;

  // Namngivna celler för formler
  const konstRows={
    timpris:null,
    obKvall:null,
    obNatt:null,
    obSondag:null,
    obStorhelg:null,
    veckorPerManad:null,
    tg:null,
    uppstart:null
  };

  // Plocka TG från data
  const tgNum=extractNum(data.pris.tgOnskad)||30;
  const uppstartNum=data.pris.uppstart!=null?data.pris.uppstart:15000;

  const konstanter=[
    {key:"timpris",label:"Grundtimkostnad",value:274.37,fmt:'# ##0.00" kr/h"',note:"Lön inkl. sociala, skatter, schablon för sjukdom"},
    {key:"obKvall",label:"OB-tillägg mån–fre 18:00–24:00",value:26,fmt:'# ##0" kr/h"',note:""},
    {key:"obNatt",label:"OB-tillägg mån–fre 00:00–06:00",value:35,fmt:'# ##0" kr/h"',note:""},
    {key:"obSondag",label:"OB-tillägg söndag/helgdag",value:54,fmt:'# ##0" kr/h"',note:""},
    {key:"obStorhelg",label:"OB-tillägg storhelger",value:116,fmt:'# ##0" kr/h"',note:""},
    {key:"veckorPerManad",label:"Veckor per månad",value:4.33,fmt:"0.00",note:"Genomsnitt"},
    {key:"tg",label:"Önskad TG (%)",value:tgNum,fmt:'0"%"',note:"Påverkar pris till kund"},
    {key:"uppstart",label:"Uppstartskostnad (engång)",value:uppstartNum,fmt:'# ##0" kr"',note:""}
  ];

  konstanter.forEach((k,idx)=>{
    const isAlt=idx%2===1;
    const bg=isAlt?GRAY_LIGHT:WHITE;
    styleCell(ws.getCell(r,1),{value:k.label,color:GRAY_DARK,bold:true,bg});
    ws.mergeCells(r,2,r,3);
    styleCell(ws.getCell(r,2),{value:k.note||"",size:9,color:GRAY_DARK,italic:true,bg,align:"left"});
    styleCell(ws.getCell(r,3),{bg});
    styleCell(ws.getCell(r,4),{value:k.value,bold:true,align:"right",numFmt:k.fmt,bg:INPUT_BG});
    konstRows[k.key]=`D${r}`;
    ws.getRow(r).height=22;
    r++;
  });
  r++;

  // === GRUNDUPPGIFTER ===
  sectionHeader(r,"GRUNDUPPGIFTER");r++;

  const grundRows=[
    ["Kund",data.meta.kund||"—","Kontorsyta",data.meta.kvm||"—"],
    ["Adress",data.meta.adress||"—","Medarbetare",data.meta.medarbetare||"—"],
    ["Frekvens",data.meta.frekvens||"—","Beläggningsgrad",data.meta.belaggning||"—"],
    ["Diskplock",data.meta.diskplock||"—","Daglig tillsyn",data.meta.dagligTillsyn||"—"]
  ];
  grundRows.forEach((rowData,idx)=>{
    const bg=idx%2===1?GRAY_LIGHT:WHITE;
    styleCell(ws.getCell(r,1),{value:rowData[0],color:GRAY_DARK,bold:true,bg});
    styleCell(ws.getCell(r,2),{value:rowData[1],bg});
    styleCell(ws.getCell(r,3),{value:rowData[2],color:GRAY_DARK,bold:true,bg});
    styleCell(ws.getCell(r,4),{value:rowData[3],bg});
    ws.getRow(r).height=22;
    r++;
  });
  r++;

  // === REGELMÄSSIGT STÄD ===
  // Spara referenser för formler
  const ytorRowRefs=[]; // { typ: 'yta'|'tillsyn', enhetCell, avverkningCell, tidCell }
  let dagligTillsynRowRef=null;

  // Antal städdagar (behövs för zon-division i tidsformeln) – räknas fram tidigt
  const antalDagarMatch=(data.meta.frekvens||"").match(/(\d+)/);
  const stadDagar=antalDagarMatch?parseInt(antalDagarMatch[1]):5;

  // ── DETERMINISTISK YTRECONCILIATION ──
  // Total yta från formuläret är auktoritativ. Yttypernas kvm MÅSTE summera till den.
  // Modellen missar ofta detta, så vi tvingar fram det i kod genom proportionerlig skalning.
  // Konvention: kvm-kolumnen = TOTAL golvyta per yttyp (ej yta per tillfälle).
  // Zonindelning hanteras enbart i tidskolumnen (delas på antal städdagar).
  const totalYtaForm = pNum(data.meta.kvm); // t.ex. 1600
  let ytReconInfo=null;
  if(totalYtaForm && totalYtaForm>0 && data.ytor.length){
    // Summera ytbaserade rader (ej toalett [st], ej tillsyn, ej diskplock)
    const areaRows=data.ytor.filter(y=>!/toalett/i.test(y.namn)&&!/daglig\s*tillsyn/i.test(y.namn)&&!/diskplock/i.test(y.namn));
    const rawSum=areaRows.reduce((s,y)=>s+(pNum(y.enhet)||0),0);
    if(rawSum>0 && Math.abs(rawSum-totalYtaForm)/totalYtaForm > 0.01){
      // Skala varje ytbaserad rad så summan blir exakt totalYtaForm
      const factor=totalYtaForm/rawSum;
      areaRows.forEach(y=>{ y.enhet=Math.round((pNum(y.enhet)||0)*factor); });
      // Justera sista raden så summan blir exakt (avrundningskorrigering)
      const newSum=areaRows.reduce((s,y)=>s+(pNum(y.enhet)||0),0);
      if(areaRows.length){ areaRows[areaRows.length-1].enhet=(pNum(areaRows[areaRows.length-1].enhet)||0)+(totalYtaForm-newSum); }
      ytReconInfo={rawSum,totalYtaForm,factor};
    }
  }

  if(data.ytor.length){
    sectionHeader(r,"REGELMÄSSIGT STÄD");r++;
    if(ytReconInfo){
      // Synlig notis om att ytorna justerats för att matcha formulärets totalyta
      styleCell(ws.getCell(r,1),{value:`⚠ Ytorna har skalats proportionerligt så att summan = formulärets totalyta (${ytReconInfo.totalYtaForm} kvm). Modellens råa summa var ${Math.round(ytReconInfo.rawSum)} kvm.`,size:9,italic:true,color:GRAY_DARK,bg:WHITE,border:{}});
      ws.mergeCells(r,1,r,4);
      ws.getRow(r).height=18;
      r++;
    }
    tableHeader(r,["Yttyp","Avverkning","Enhet (kvm)","Tidsåtgång h"]);r++;

    data.ytor.forEach((y,idx)=>{
      const isAlt=idx%2===1;
      const bg=isAlt?GRAY_LIGHT:WHITE;
      const isTillsyn=/daglig\s*tillsyn/i.test(y.namn);
      const isToalett=/toalett/i.test(y.namn);

      // Kolumn 1: Yttyp (text)
      styleCell(ws.getCell(r,1),{value:y.namn,bg});

      // Kolumn 2: Avverkning (redigerbart tal med enhet i format)
      const avverkningNum=extractNum(y.avverkning);
      if(isTillsyn){
        styleCell(ws.getCell(r,2),{value:"–",align:"right",bg,color:GRAY_DARK});
      }else if(isToalett && /min/i.test(y.avverkning||"")){
        // Toalett: 5 min/st
        styleCell(ws.getCell(r,2),{value:avverkningNum||5,bg:INPUT_BG,align:"right",bold:true,numFmt:'0" min/st"'});
      }else{
        styleCell(ws.getCell(r,2),{value:avverkningNum||0,bg:INPUT_BG,align:"right",bold:true,numFmt:'0" m²/h"'});
      }

      // Kolumn 3: Enhet (redigerbar siffra)
      const enhetNum=extractNum(y.enhet);
      if(isTillsyn){
        // "2 timmar/dag"
        styleCell(ws.getCell(r,3),{value:enhetNum||0,bg:INPUT_BG,align:"right",bold:true,numFmt:'0" h/dag"'});
      }else if(isToalett){
        styleCell(ws.getCell(r,3),{value:enhetNum||0,bg:INPUT_BG,align:"right",bold:true,numFmt:'0" st"'});
      }else{
        styleCell(ws.getCell(r,3),{value:enhetNum||0,bg:INPUT_BG,align:"right",bold:true,numFmt:'# ##0" kvm"'});
      }

      // Kolumn 4: Tidsåtgång (formel)
      // Zonindelade ytor: kvm är TOTAL yta, men bara en zon (kvm/städdagar) städas per tillfälle.
      // "(zonindelat)" matchar zon-raden men INTE "(ej zonindelat)".
      const isZon=/\(zonindelat\)/i.test(y.namn);
      if(isTillsyn){
        // Tillsyn räknas separat baserat på dagar – placeholder här
        const tidNum=extractNum(y.tid)||0;
        styleCell(ws.getCell(r,4),{value:tidNum,bg,align:"right",numFmt:'0.00" h"'});
      }else if(isToalett){
        // Tid = antal × min / 60
        styleCell(ws.getCell(r,4),{formula:`C${r}*B${r}/60`,bg,align:"right",numFmt:'0.00" h"'});
      }else if(isZon && stadDagar>0){
        // Tid = (total kvm / antal städdagar) / avverkning – endast en zon städas per tillfälle
        styleCell(ws.getCell(r,4),{formula:`IF(B${r}>0,(C${r}/${stadDagar})/B${r},0)`,bg,align:"right",numFmt:'0.00" h"'});
      }else{
        // Tid = kvm / avverkning
        styleCell(ws.getCell(r,4),{formula:`IF(B${r}>0,C${r}/B${r},0)`,bg,align:"right",numFmt:'0.00" h"'});
      }

      ytorRowRefs.push({rowNum:r,isTillsyn,isToalett,enhetCell:`C${r}`,avverkningCell:`B${r}`,tidCell:`D${r}`});
      if(isTillsyn)dagligTillsynRowRef=r;

      ws.getRow(r).height=22;
      r++;
    });

    // === DISKPLOCK (deterministiskt tidstillägg – aldrig en yta) ===
    // Diskplock räknas alltid om det är valt, oavsett om modellen tog med det.
    // Tid = (medarbetare × beläggning × 0,5 + kvm/100) / 60. Egen rad, ingen avverkning.
    let diskplockRowRef=null;
    if(data.diskplockTid!=null && data.diskplockTid>0){
      const dpRow=r;
      const isAlt=data.ytor.length%2===1;
      const bg=isAlt?GRAY_LIGHT:WHITE;
      styleCell(ws.getCell(r,1),{value:"Diskplock",bg});
      styleCell(ws.getCell(r,2),{value:"–",align:"right",bg,color:GRAY_DARK});
      // Visa underlaget (medarbetare) i enhet-kolumnen som info
      const medarb=Math.round(extractNum(data.meta.medarbetare)||0);
      styleCell(ws.getCell(r,3),{value:medarb,bg,align:"right",color:GRAY_DARK,numFmt:'0" pers"'});
      // Tidsåtgång: fast värde (timmar), ej formel – får ALDRIG bli 0 när diskplock är valt
      styleCell(ws.getCell(r,4),{value:Number(data.diskplockTid.toFixed(2)),bg,align:"right",bold:true,numFmt:'0.00" h"'});
      ytorRowRefs.push({rowNum:r,isTillsyn:false,isToalett:false,isDiskplock:true,tidCell:`D${r}`});
      diskplockRowRef=r;
      ws.getRow(r).height=22;
      r++;
    }

    // Summa per tillfälle (exkl. daglig tillsyn, INKL. diskplock)
    const tillfalleRow=r;
    const nonTillsynRefs=ytorRowRefs.filter(x=>!x.isTillsyn);
    const sumFormula=nonTillsynRefs.length>0?nonTillsynRefs.map(x=>x.tidCell).join("+"):"0";
    // Snittavverkning (B-kolumnen i summaraden): total golvyta / total ren yt-tid (kvm/avverkning).
    // OBS: använder INTE den zon-reducerade tidskolumnen, utan ren yta/avverkning, så snittet
    // speglar den faktiska blandade städtakten (m²/h) oberoende av zon-division.
    const areaRefs=ytorRowRefs.filter(x=>!x.isTillsyn&&!x.isToalett&&!x.isDiskplock);
    let avgFormula=null;
    if(areaRefs.length>0){
      const kvmSum=areaRefs.map(x=>x.enhetCell).join("+");
      // ren tid per yta = kvm/avverkning (utan zon-division)
      const pureTid=areaRefs.map(x=>`${x.enhetCell}/${x.avverkningCell}`).join("+");
      avgFormula=`IF((${pureTid})>0,(${kvmSum})/(${pureTid}),0)`;
    }

    styleCell(ws.getCell(r,1),{value:"Summa per tillfälle",bold:true,bg:SUBTOTAL_BG,border:{...allThin,top:{style:"medium",color:{argb:ORANGE}}}});
    // B: snittavverkning, C: total kvm – fyll dem istället för att merga över hela raden
    if(avgFormula){
      styleCell(ws.getCell(r,2),{formula:avgFormula,bold:true,bg:SUBTOTAL_BG,align:"right",numFmt:'0" m²/h (snitt)"',border:{...allThin,top:{style:"medium",color:{argb:ORANGE}}}});
    }else{
      styleCell(ws.getCell(r,2),{value:"–",bg:SUBTOTAL_BG,align:"right",border:{...allThin,top:{style:"medium",color:{argb:ORANGE}}}});
    }
    // C: total städbar kvm (summa av yt-baserade rader)
    if(areaRefs.length>0){
      styleCell(ws.getCell(r,3),{formula:areaRefs.map(x=>x.enhetCell).join("+"),bold:true,bg:SUBTOTAL_BG,align:"right",numFmt:'# ##0" kvm"',border:{...allThin,top:{style:"medium",color:{argb:ORANGE}}}});
    }else{
      styleCell(ws.getCell(r,3),{value:"",bg:SUBTOTAL_BG,border:{...allThin,top:{style:"medium",color:{argb:ORANGE}}}});
    }
    styleCell(ws.getCell(r,4),{formula:sumFormula,bold:true,bg:SUBTOTAL_BG,align:"right",numFmt:'0.00" h"',border:{...allThin,top:{style:"medium",color:{argb:ORANGE}}}});
    ws.getRow(r).height=22;
    const tillfalleCell=`D${r}`;
    r++;
    r++;

    // === YTOR PER VÅNING (deterministisk – baserat på antal plan i formuläret) ===
    // Vi litar INTE på modellens våningsdata (den hittar ofta på fel plan/0 kvm).
    // Antal våningar läses ur totalytan, t.ex. "1 600 kvm (2 plan)".
    const planMatch=(data.meta.kvm||"").match(/(\d+)\s*(plan|våning|vaning)/i);
    const antalPlan=planMatch?parseInt(planMatch[1]):1;
    if(antalPlan>=2 && totalYtaForm && totalYtaForm>0){
      sectionHeader(r,"YTOR PER VÅNING");r++;
      // Förklarande notis
      styleCell(ws.getCell(r,1),{value:`Totalytan ${totalYtaForm} kvm är jämnt fördelad på ${antalPlan} plan. Justera enskilda plan vid behov – totalen räknas om automatiskt.`,size:9,italic:true,color:GRAY_DARK,bg:WHITE,border:{}});
      ws.mergeCells(r,1,r,4);
      ws.getRow(r).height=18;
      r++;
      tableHeader(r,["Våning","","","Yta (kvm)"]);
      ws.mergeCells(r,2,r,3);
      r++;
      const vTotalRefs=[];
      const perPlan=Math.floor(totalYtaForm/antalPlan);
      const rest=totalYtaForm-perPlan*antalPlan; // läggs på sista planet
      for(let p=1;p<=antalPlan;p++){
        const isAlt=(p-1)%2===1;
        const bg=isAlt?GRAY_LIGHT:WHITE;
        const planYta=perPlan+(p===antalPlan?rest:0);
        styleCell(ws.getCell(r,1),{value:"Plan "+p,bold:true,bg});
        ws.mergeCells(r,2,r,3);
        [2,3].forEach(c=>styleCell(ws.getCell(r,c),{bg}));
        styleCell(ws.getCell(r,4),{value:planYta,bg:INPUT_BG,align:"right",bold:true,numFmt:'# ##0" kvm"'});
        vTotalRefs.push(`D${r}`);
        ws.getRow(r).height=22;
        r++;
      }
      // Grand total
      styleCell(ws.getCell(r,1),{value:"Total över alla våningar",bold:true,bg:SUBTOTAL_BG,border:{...allThin,top:{style:"medium",color:{argb:ORANGE}}}});
      ws.mergeCells(r,1,r,3);
      [2,3].forEach(c=>styleCell(ws.getCell(r,c),{bg:SUBTOTAL_BG,border:{...allThin,top:{style:"medium",color:{argb:ORANGE}}}}));
      styleCell(ws.getCell(r,4),{formula:vTotalRefs.join("+"),bold:true,bg:SUBTOTAL_BG,align:"right",numFmt:'# ##0" kvm"',border:{...allThin,top:{style:"medium",color:{argb:ORANGE}}}});
      ws.getRow(r).height=22;
      r++;
      r++;
    }

    // === TIDSBERÄKNING ===
    sectionHeader(r,"TIDSBERÄKNING");r++;

    // Antal städdagar (redigerbart input)
    const dagarVal=stadDagar;
    styleCell(ws.getCell(r,1),{value:"Antal städdagar per vecka",color:GRAY_DARK,bold:true,bg:WHITE});
    ws.mergeCells(r,1,r,3);
    [2,3].forEach(c=>styleCell(ws.getCell(r,c),{bg:WHITE}));
    styleCell(ws.getCell(r,4),{value:dagarVal,bold:true,bg:INPUT_BG,align:"right",numFmt:'0" dagar"'});
    const dagarCell=`D${r}`;
    ws.getRow(r).height=22;
    r++;

    // Per tillfälle (referens)
    styleCell(ws.getCell(r,1),{value:"Per tillfälle",color:GRAY_DARK,bold:true,bg:GRAY_LIGHT});
    ws.mergeCells(r,1,r,3);
    [2,3].forEach(c=>styleCell(ws.getCell(r,c),{bg:GRAY_LIGHT}));
    styleCell(ws.getCell(r,4),{formula:tillfalleCell,bg:GRAY_LIGHT,align:"right",numFmt:'0.00" h"'});
    ws.getRow(r).height=20;
    r++;

    // Per vecka
    styleCell(ws.getCell(r,1),{value:"Per vecka",color:GRAY_DARK,bold:true,bg:WHITE});
    ws.mergeCells(r,1,r,3);
    [2,3].forEach(c=>styleCell(ws.getCell(r,c),{bg:WHITE}));
    styleCell(ws.getCell(r,4),{formula:`${tillfalleCell}*${dagarCell}`,bg:WHITE,align:"right",numFmt:'0.00" h"'});
    const veckaCell=`D${r}`;
    ws.getRow(r).height=20;
    r++;

    // Per månad
    styleCell(ws.getCell(r,1),{value:"Per månad",color:GRAY_DARK,bold:true,bg:GRAY_LIGHT});
    ws.mergeCells(r,1,r,3);
    [2,3].forEach(c=>styleCell(ws.getCell(r,c),{bg:GRAY_LIGHT}));
    styleCell(ws.getCell(r,4),{formula:`${veckaCell}*${konstRows.veckorPerManad}`,bold:true,bg:GRAY_LIGHT,align:"right",numFmt:'0.00" h"'});
    const manadCell=`D${r}`;
    ws.getRow(r).height=20;
    r++;

    // Daglig tillsyn-block om finns
    let tillsynManadCell=null;
    if(dagligTillsynRowRef){
      const tillsynEnhetCell=`C${dagligTillsynRowRef}`;

      // Antal tillsynsdagar/vecka (input)
      const dagligTillsynMatch=(data.meta.dagligTillsyn||"").match(/(\d+)\s*dagar/i);
      const tillsynDagar=dagligTillsynMatch?parseInt(dagligTillsynMatch[1]):5;

      styleCell(ws.getCell(r,1),{value:"Daglig tillsyn antal dagar/vecka",color:GRAY_DARK,bold:true,bg:WHITE});
      ws.mergeCells(r,1,r,3);
      [2,3].forEach(c=>styleCell(ws.getCell(r,c),{bg:WHITE}));
      styleCell(ws.getCell(r,4),{value:tillsynDagar,bold:true,bg:INPUT_BG,align:"right",numFmt:'0" dagar"'});
      const tillsynDagarCell=`D${r}`;
      ws.getRow(r).height=22;
      r++;

      // Tillsyn h/månad
      styleCell(ws.getCell(r,1),{value:"Daglig tillsyn timmar/månad",color:GRAY_DARK,bold:true,bg:GRAY_LIGHT});
      ws.mergeCells(r,1,r,3);
      [2,3].forEach(c=>styleCell(ws.getCell(r,c),{bg:GRAY_LIGHT}));
      styleCell(ws.getCell(r,4),{formula:`${tillsynEnhetCell}*${tillsynDagarCell}*${konstRows.veckorPerManad}`,bold:true,bg:GRAY_LIGHT,align:"right",numFmt:'0.00" h"'});
      tillsynManadCell=`D${r}`;
      ws.getRow(r).height=20;
      r++;
    }

    r++;

    // === KOSTNADSSAMMANSTÄLLNING ===
    sectionHeader(r,"KOSTNADSSAMMANSTÄLLNING");r++;
    tableHeader(r,["Post","","","Belopp"]);r++;

    const kostnaderRows=[];

    // Regelmässigt städ
    styleCell(ws.getCell(r,1),{value:"Regelmässigt städ",bg:WHITE});
    ws.mergeCells(r,1,r,3);
    [2,3].forEach(c=>styleCell(ws.getCell(r,c),{bg:WHITE}));
    styleCell(ws.getCell(r,4),{formula:`${manadCell}*${konstRows.timpris}`,bg:WHITE,align:"right",numFmt:'# ##0" kr"'});
    kostnaderRows.push(`D${r}`);
    ws.getRow(r).height=22;
    r++;

    // OB-tillägg: avgör vilken OB-typ baserat på tid på dygnet
    const tidPaDygnet=String(data.meta.tidpadygnet||"").toLowerCase();
    let obCellRef=null;
    let obLabel="OB-tillägg";
    // Hitta original OB-kostnad i datat om det finns
    const obKost=data.kostnader.find(k=>/ob/i.test(k.post));
    if(obKost){
      obLabel=obKost.post;
      // Detektera vilken OB-typ från etiketten
      let obKonstRef=konstRows.obKvall;
      if(/natt/i.test(obKost.post))obKonstRef=konstRows.obNatt;
      else if(/söndag|helgdag/i.test(obKost.post))obKonstRef=konstRows.obSondag;
      else if(/storhelg/i.test(obKost.post))obKonstRef=konstRows.obStorhelg;

      styleCell(ws.getCell(r,1),{value:obLabel,bg:GRAY_LIGHT});
      ws.mergeCells(r,1,r,3);
      [2,3].forEach(c=>styleCell(ws.getCell(r,c),{bg:GRAY_LIGHT}));
      styleCell(ws.getCell(r,4),{formula:`${manadCell}*${obKonstRef}`,bg:GRAY_LIGHT,align:"right",numFmt:'# ##0" kr"'});
      kostnaderRows.push(`D${r}`);
      ws.getRow(r).height=22;
      r++;
    }

    // Daglig tillsyn-kostnad
    if(tillsynManadCell){
      const isAlt=kostnaderRows.length%2===1;
      const bg=isAlt?GRAY_LIGHT:WHITE;
      styleCell(ws.getCell(r,1),{value:"Daglig tillsyn",bg});
      ws.mergeCells(r,1,r,3);
      [2,3].forEach(c=>styleCell(ws.getCell(r,c),{bg}));
      styleCell(ws.getCell(r,4),{formula:`${tillsynManadCell}*${konstRows.timpris}`,bg,align:"right",numFmt:'# ##0" kr"'});
      kostnaderRows.push(`D${r}`);
      ws.getRow(r).height=22;
      r++;
    }

    // Övriga månadskostnader: läs från data men gör redigerbara
    const ovrigaKost=data.kostnader.filter(k=>!/regelmässigt|ob[^a-z]|^ob$|daglig\s*tillsyn/i.test(k.post));
    ovrigaKost.forEach(k=>{
      const isAlt=kostnaderRows.length%2===1;
      const bg=isAlt?GRAY_LIGHT:WHITE;
      styleCell(ws.getCell(r,1),{value:k.post,bg});
      ws.mergeCells(r,1,r,3);
      [2,3].forEach(c=>styleCell(ws.getCell(r,c),{bg}));
      styleCell(ws.getCell(r,4),{value:k.belopp,bg:INPUT_BG,align:"right",bold:true,numFmt:'# ##0" kr"'});
      kostnaderRows.push(`D${r}`);
      ws.getRow(r).height=22;
      r++;
    });

    // TOTAL MÅNADSKOSTNAD (formel = summa av alla rader)
    const totalFormula=kostnaderRows.join("+");
    const c1=ws.getCell(r,1);
    c1.value="TOTAL MÅNADSKOSTNAD";
    c1.font={name:"Calibri",size:12,bold:true,color:{argb:WHITE}};
    c1.fill={type:"pattern",pattern:"solid",fgColor:{argb:TOTAL_BG}};
    c1.alignment={vertical:"middle",horizontal:"left",indent:1};
    c1.border=allThin;
    ws.mergeCells(r,1,r,3);
    [2,3].forEach(c=>{
      ws.getCell(r,c).fill={type:"pattern",pattern:"solid",fgColor:{argb:TOTAL_BG}};
      ws.getCell(r,c).border=allThin;
    });
    const c4=ws.getCell(r,4);
    c4.value={formula:totalFormula};
    c4.font={name:"Calibri",size:12,bold:true,color:{argb:WHITE}};
    c4.fill={type:"pattern",pattern:"solid",fgColor:{argb:TOTAL_BG}};
    c4.alignment={vertical:"middle",horizontal:"right",indent:1};
    c4.border=allThin;
    c4.numFmt='# ##0" kr"';
    ws.getRow(r).height=28;
    const totalManadCell=`D${r}`;
    r++;
    r++;

    // === PRISSÄTTNING ===
    sectionHeader(r,"PRISSÄTTNING");r++;

    const prisRows=[
      {label:"Önskad TG",formula:`${konstRows.tg}`,fmt:'0"%"',ref:false},
      {label:"Pris till kund / månad",formula:`${totalManadCell}/(1-${konstRows.tg}/100)`,fmt:'# ##0" kr"',ref:true,save:"prisManad"},
      {label:"TB / månad",formula:null,fmt:'# ##0" kr"',ref:true,save:"tb"},
      {label:"Årspris (12 mån)",formula:null,fmt:'# ##0" kr"',ref:true,save:"arspris"},
      {label:"Engångskostnad uppstart",formula:konstRows.uppstart,fmt:'# ##0" kr"',ref:false}
    ];

    let prisManadCell=null,tbCell=null,arsprisCell=null;
    prisRows.forEach((p,idx)=>{
      const isAlt=idx%2===1;
      const bg=isAlt?GRAY_LIGHT:WHITE;
      styleCell(ws.getCell(r,1),{value:p.label,color:GRAY_DARK,bg});
      ws.mergeCells(r,1,r,3);
      [2,3].forEach(c=>styleCell(ws.getCell(r,c),{bg}));

      let f=p.formula;
      if(p.save==="tb")f=`${prisManadCell}-${totalManadCell}`;
      else if(p.save==="arspris")f=`${prisManadCell}*12`;

      styleCell(ws.getCell(r,4),{formula:f,bold:true,bg,align:"right",numFmt:p.fmt});

      if(p.save==="prisManad")prisManadCell=`D${r}`;
      else if(p.save==="tb")tbCell=`D${r}`;
      else if(p.save==="arspris")arsprisCell=`D${r}`;

      ws.getRow(r).height=22;
      r++;
    });

    // Totalt år 1 = årspris + uppstart
    const c1Total=ws.getCell(r,1);
    c1Total.value="TOTALT ÅR 1 INKL. UPPSTART";
    c1Total.font={name:"Calibri",size:12,bold:true,color:{argb:WHITE}};
    c1Total.fill={type:"pattern",pattern:"solid",fgColor:{argb:TOTAL_BG}};
    c1Total.alignment={vertical:"middle",horizontal:"left",indent:1};
    c1Total.border=allThin;
    ws.mergeCells(r,1,r,3);
    [2,3].forEach(c=>{
      ws.getCell(r,c).fill={type:"pattern",pattern:"solid",fgColor:{argb:TOTAL_BG}};
      ws.getCell(r,c).border=allThin;
    });
    const c4Total=ws.getCell(r,4);
    c4Total.value={formula:`${arsprisCell}+${konstRows.uppstart}`};
    c4Total.font={name:"Calibri",size:12,bold:true,color:{argb:WHITE}};
    c4Total.fill={type:"pattern",pattern:"solid",fgColor:{argb:TOTAL_BG}};
    c4Total.alignment={vertical:"middle",horizontal:"right",indent:1};
    c4Total.border=allThin;
    c4Total.numFmt='# ##0" kr"';
    ws.getRow(r).height=28;
    r++;
    r++;
  }

  // === BEMANNINGSFÖRSLAG ===
  const hasBem=data.bemanning.regelmassig||data.bemanning.passLista.length||data.bemanning.tillsyn;
  if(hasBem){
    sectionHeader(r,"BEMANNINGSFÖRSLAG");r++;
    const bemEntries=[];
    if(data.bemanning.regelmassig)bemEntries.push(["Regelmässig städning",data.bemanning.regelmassig]);
    data.bemanning.passLista.forEach(p=>bemEntries.push([p.namn,p.tid]));
    if(data.bemanning.tillsyn)bemEntries.push(["Daglig tillsyn",data.bemanning.tillsyn]);
    if(data.bemanning.fokus)bemEntries.push(["Fokus daglig tillsyn",data.bemanning.fokus]);

    bemEntries.forEach(([label,val],idx)=>{
      const bg=idx%2===1?GRAY_LIGHT:WHITE;
      styleCell(ws.getCell(r,1),{value:label,color:GRAY_DARK,bold:true,bg});
      ws.mergeCells(r,2,r,4);
      styleCell(ws.getCell(r,2),{value:val,bg});
      [3,4].forEach(c=>styleCell(ws.getCell(r,c),{bg}));
      ws.getRow(r).height=22;
      r++;
    });
    r++;
  }

  // === FÖRKLARING ===
  sectionHeader(r,"SÅ ANVÄNDER DU KALKYLEN");r++;
  const forklaringRows=[
    ["Blå celler","Redigerbara värden (kvm, avverkning, konstanter, TG, manuella kostnader)"],
    ["Vita/grå celler","Beräknade automatiskt med formler – ändra inte"],
    ["Total månadskostnad","Summa av alla löpande kostnader"],
    ["Totalt år 1","Årspris × 12 + uppstartskostnad"]
  ];
  forklaringRows.forEach(([k,v],idx)=>{
    const bg=idx%2===1?GRAY_LIGHT:WHITE;
    styleCell(ws.getCell(r,1),{value:k,color:GRAY_DARK,bold:true,bg,size:10});
    ws.mergeCells(r,2,r,4);
    styleCell(ws.getCell(r,2),{value:v,bg,size:10,italic:true});
    [3,4].forEach(c=>styleCell(ws.getCell(r,c),{bg}));
    ws.getRow(r).height=20;
    r++;
  });
  r++;

  // Sidfot
  r++;
  ws.mergeCells(r,1,r,4);
  styleCell(ws.getCell(r,1),{value:"Carotte Group  •  www.carottegroup.se",size:9,italic:true,color:GRAY_DARK,align:"center",border:{}});
  ws.getRow(r).height=18;

  // === LÄGG TILL EXTRA BLAD ===
  buildBemanningSheet(wb,data);
  buildAktivitetsplanSheet(wb,data);

  // Spara
  const buffer=await wb.xlsx.writeBuffer();
  const blob=new Blob([buffer],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
}

// Bygger Bemanning-bladet: housekeeper-tabell med formler + Gantt-schema
function buildBemanningSheet(wb,data){
  const ORANGE="FFF59E0B";
  const ORANGE_LIGHT="FFFEF3C7";
  const DARK="FF1F2937";
  const GRAY_LIGHT="FFF9FAFB";
  const GRAY_MED="FFE5E7EB";
  const GRAY_DARK="FF6B7280";
  const INPUT_BG="FFEFF6FF";
  const WHITE="FFFFFFFF";
  const TOTAL_BG="FF1F2937";
  const SCHEMA_ACTIVE="FFFBBF24";
  const SCHEMA_TILLSYN="FF60A5FA";

  const ws=wb.addWorksheet("Bemanning",{
    pageSetup:{paperSize:9,orientation:"landscape",fitToPage:true,fitToWidth:1,fitToHeight:0,margins:{left:0.4,right:0.4,top:0.4,bottom:0.4}},
    views:[{showGridLines:false,zoomScale:90}]
  });

  // 18 kolumner — bred för Personal+Uppgift, smal för timmar
  ws.columns=[
    {width:22},  // A: Personal / lång text
    {width:14},  // B: Uppgift / siffra
    {width:7},   // C: kl 06 / smal
    {width:7},   // D: kl 07
    {width:7},   // E: kl 08
    {width:7},   // F: kl 09
    {width:7},   // G: kl 10
    {width:7},   // H: kl 11
    {width:7},   // I: kl 12
    {width:7},   // J: kl 13
    {width:7},   // K: kl 14
    {width:7},   // L: kl 15
    {width:7},   // M: kl 16
    {width:7},   // N: kl 17
    {width:7},   // O: kl 18
    {width:7},   // P: kl 19
    {width:7},   // Q: kl 20
    {width:7}    // R: kl 21
  ];

  const thinBorder={style:"thin",color:{argb:GRAY_MED}};
  const allThin={top:thinBorder,bottom:thinBorder,left:thinBorder,right:thinBorder};

  const styleC=(cell,opts={})=>{
    if(opts.formula)cell.value={formula:opts.formula};
    else if(opts.value!==undefined)cell.value=opts.value;
    cell.font={name:"Calibri",size:opts.size||10,color:{argb:opts.color||DARK},bold:!!opts.bold,italic:!!opts.italic};
    cell.fill={type:"pattern",pattern:"solid",fgColor:{argb:opts.bg||WHITE}};
    cell.alignment={vertical:"middle",horizontal:opts.align||"left",indent:opts.indent!=null?opts.indent:0,wrapText:true};
    cell.border=opts.border||allThin;
    if(opts.numFmt)cell.numFmt=opts.numFmt;
    return cell;
  };

  let r=1;

  // === TITEL (sträcker över hela bredden) ===
  ws.mergeCells(r,1,r,18);
  const t1=ws.getCell(r,1);
  t1.value="BEMANNING";
  t1.font={name:"Calibri",size:22,bold:true,color:{argb:DARK}};
  t1.alignment={vertical:"middle",horizontal:"left",indent:1};
  ws.getRow(r).height=29;
  r++;

  ws.mergeCells(r,1,r,18);
  const t2=ws.getCell(r,1);
  t2.value=data.meta.kund||"Bemanningsplan";
  t2.font={name:"Calibri",size:12,italic:true,color:{argb:ORANGE}};
  t2.alignment={vertical:"middle",horizontal:"left",indent:1};
  ws.getRow(r).height=18;
  r++;

  ws.mergeCells(r,1,r,18);
  const t3=ws.getCell(r,1);
  t3.value="Giltig från: "+new Date().toLocaleDateString("sv-SE");
  t3.font={name:"Calibri",size:9,color:{argb:GRAY_DARK}};
  t3.alignment={vertical:"middle",horizontal:"left",indent:1};
  ws.getRow(r).height=16;
  r++;

  // Orange linje
  ws.getRow(r).height=4;
  ws.mergeCells(r,1,r,18);
  ws.getCell(r,1).fill={type:"pattern",pattern:"solid",fgColor:{argb:ORANGE}};
  r+=2;

  // === KONSTANTER ===
  ws.mergeCells(r,1,r,18);
  const sh=ws.getCell(r,1);
  sh.value="KONSTANTER (redigerbara)";
  sh.font={name:"Calibri",size:13,bold:true,color:{argb:WHITE}};
  sh.fill={type:"pattern",pattern:"solid",fgColor:{argb:ORANGE}};
  sh.alignment={vertical:"middle",horizontal:"left",indent:1};
  ws.getRow(r).height=17;
  r++;

  const konstanter=[
    {label:"Lön (kr/h)",value:171.48,fmt:'0.00" kr/h"'},
    {label:"Soc.avg (faktor)",value:1.6,fmt:'0.00'},
    {label:"OB 18-24 (kr/h)",value:26,fmt:'0" kr/h"'},
    {label:"OB 00-06 (kr/h)",value:35,fmt:'0" kr/h"'}
  ];

  const konstRefs={};
  konstanter.forEach(k=>{
    styleC(ws.getCell(r,1),{value:k.label,color:GRAY_DARK,bold:true,bg:GRAY_LIGHT,indent:1});
    styleC(ws.getCell(r,2),{value:k.value,bold:true,bg:INPUT_BG,align:"right",numFmt:k.fmt,indent:1});
    ws.mergeCells(r,3,r,18);
    styleC(ws.getCell(r,3),{bg:WHITE,border:{}});
    konstRefs[k.label]=`B${r}`;
    ws.getRow(r).height=15;
    r++;
  });
  const lonRef=konstRefs["Lön (kr/h)"];
  const socRef=konstRefs["Soc.avg (faktor)"];
  const ob1Ref=konstRefs["OB 18-24 (kr/h)"];
  const ob2Ref=konstRefs["OB 00-06 (kr/h)"];
  r++;

  // === BEMANNINGSTABELL ===
  // Strategi: använd kolumn A-R för housekeeper-tabellen.
  // 14 logiska kolumner men varje får 1-2 reella celler (mergade) för att få mer plats för belopp.
  // Layout:
  //   A=Personal (bred)
  //   B=tim/dag
  //   C=OB18-24
  //   D=OB00-06
  //   E=Dagar/mån
  //   F-G=Tim/mån (mergade)
  //   H=OB18-24 tim/mån
  //   I=OB00-06 tim/mån
  //   J=Lön/tim
  //   K-L=Lön+sociala/tim (mergade)
  //   M-N=Lönekost/mån (mergade)
  //   O=OB18-24 kost/mån
  //   P=OB00-06 kost/mån
  //   Q-R=S:A lönekost (mergade)
  ws.mergeCells(r,1,r,18);
  const sh2=ws.getCell(r,1);
  sh2.value="HOUSEKEEPER-TABELL (sammanfattning per anställd)";
  sh2.font={name:"Calibri",size:13,bold:true,color:{argb:WHITE}};
  sh2.fill={type:"pattern",pattern:"solid",fgColor:{argb:ORANGE}};
  sh2.alignment={vertical:"middle",horizontal:"left",indent:1};
  ws.getRow(r).height=17;
  r++;

  // Header
  const headerCells=[
    {label:"Personal",col:1},
    {label:"tim/dag",col:2},
    {label:"OB 18-24",col:3},
    {label:"OB 00-06",col:4},
    {label:"Dagar/mån",col:5},
    {label:"Tim/mån",col:6,merge:2},
    {label:"OB 18-24 tim/mån",col:8},
    {label:"OB 00-06 tim/mån",col:9},
    {label:"Lön/tim",col:10},
    {label:"Lön+sociala/tim",col:11,merge:2},
    {label:"Lönekost/mån",col:13,merge:2},
    {label:"OB 18-24 kost/mån",col:15},
    {label:"OB 00-06 kost/mån",col:16},
    {label:"S:A lönekost",col:17,merge:2}
  ];
  headerCells.forEach(hc=>{
    if(hc.merge)ws.mergeCells(r,hc.col,r,hc.col+hc.merge-1);
    const c=ws.getCell(r,hc.col);
    c.value=hc.label;
    c.font={name:"Calibri",size:9,bold:true,color:{argb:DARK}};
    c.fill={type:"pattern",pattern:"solid",fgColor:{argb:ORANGE_LIGHT}};
    c.alignment={vertical:"middle",horizontal:hc.col===1?"left":"right",indent:hc.col===1?1:0,wrapText:true};
    c.border={...allThin,bottom:{style:"medium",color:{argb:ORANGE}}};
    // Sätt även styling på de mergade cellerna
    if(hc.merge){
      for(let i=1;i<hc.merge;i++){
        const m=ws.getCell(r,hc.col+i);
        m.fill={type:"pattern",pattern:"solid",fgColor:{argb:ORANGE_LIGHT}};
        m.border={...allThin,bottom:{style:"medium",color:{argb:ORANGE}}};
      }
    }
  });
  ws.getRow(r).height=26;
  r++;

  const housekeepers=["Housekeeper 1","Housekeeper 2","Housekeeper 3","Housekeeper 4","Housekeeper 5"];

  let defaultTimDag=0;
  const manadStr=data.tid.manad||"";
  const manadMatch=manadStr.match(/([\d,.]+)/);
  if(manadMatch){
    const manadH=parseFloat(manadMatch[1].replace(",","."));
    if(!isNaN(manadH))defaultTimDag=Math.round((manadH/21)*10)/10;
  }

  const rowRefs=[];
  housekeepers.forEach((name,idx)=>{
    const isFirst=idx===0;
    const isAlt=idx%2===1;
    const bg=isAlt?GRAY_LIGHT:WHITE;
    // Layout enligt headern ovan
    styleC(ws.getCell(r,1),{value:name,bg,size:10,indent:1});
    styleC(ws.getCell(r,2),{value:isFirst?defaultTimDag:0,bg:INPUT_BG,bold:true,align:"right",numFmt:"0.00"});
    styleC(ws.getCell(r,3),{value:0,bg:INPUT_BG,bold:true,align:"right",numFmt:"0.00"});
    styleC(ws.getCell(r,4),{value:0,bg:INPUT_BG,bold:true,align:"right",numFmt:"0.00"});
    styleC(ws.getCell(r,5),{value:21,bg:INPUT_BG,bold:true,align:"right",numFmt:"0"});
    // F-G: Tim/mån (mergad)
    ws.mergeCells(r,6,r,7);
    styleC(ws.getCell(r,6),{formula:`B${r}*E${r}`,bg,align:"right",numFmt:'0.00" h"'});
    styleC(ws.getCell(r,7),{bg,border:allThin});
    // H: OB 18-24 tim/mån
    styleC(ws.getCell(r,8),{formula:`C${r}*E${r}`,bg,align:"right",numFmt:'0.00" h"'});
    // I: OB 00-06 tim/mån
    styleC(ws.getCell(r,9),{formula:`D${r}*E${r}`,bg,align:"right",numFmt:'0.00" h"'});
    // J: Lön/tim
    styleC(ws.getCell(r,10),{formula:lonRef,bg,align:"right",numFmt:'0.00" kr"'});
    // K-L: Lön+sociala/tim
    ws.mergeCells(r,11,r,12);
    styleC(ws.getCell(r,11),{formula:`J${r}*${socRef}`,bg,align:"right",numFmt:'0.00" kr"'});
    styleC(ws.getCell(r,12),{bg,border:allThin});
    // M-N: Lönekost/mån (J=Lön+sociala, F=Tim/mån). I formler refererar vi första cellen i merge.
    ws.mergeCells(r,13,r,14);
    styleC(ws.getCell(r,13),{formula:`K${r}*F${r}`,bg,align:"right",numFmt:'# ##0" kr"'});
    styleC(ws.getCell(r,14),{bg,border:allThin});
    // O: OB 18-24 kost/mån
    styleC(ws.getCell(r,15),{formula:`H${r}*${ob1Ref}`,bg,align:"right",numFmt:'# ##0" kr"'});
    // P: OB 00-06 kost/mån
    styleC(ws.getCell(r,16),{formula:`I${r}*${ob2Ref}`,bg,align:"right",numFmt:'# ##0" kr"'});
    // Q-R: S:A lönekost
    ws.mergeCells(r,17,r,18);
    styleC(ws.getCell(r,17),{formula:`M${r}+O${r}+P${r}`,bold:true,bg,align:"right",numFmt:'# ##0" kr"'});
    styleC(ws.getCell(r,18),{bg,border:allThin});
    rowRefs.push(r);
    ws.getRow(r).height=15;
    r++;
  });

  // Summa-rad
  const sumStart=rowRefs[0];
  const sumEnd=rowRefs[rowRefs.length-1];
  styleC(ws.getCell(r,1),{value:"SUMMA",bold:true,color:WHITE,bg:TOTAL_BG,indent:1});
  styleC(ws.getCell(r,2),{formula:`SUM(B${sumStart}:B${sumEnd})`,bold:true,color:WHITE,bg:TOTAL_BG,align:"right",numFmt:"0.00"});
  styleC(ws.getCell(r,3),{formula:`SUM(C${sumStart}:C${sumEnd})`,bold:true,color:WHITE,bg:TOTAL_BG,align:"right",numFmt:"0.00"});
  styleC(ws.getCell(r,4),{formula:`SUM(D${sumStart}:D${sumEnd})`,bold:true,color:WHITE,bg:TOTAL_BG,align:"right",numFmt:"0.00"});
  styleC(ws.getCell(r,5),{bg:TOTAL_BG,color:WHITE});
  // F-G: Tim/mån
  ws.mergeCells(r,6,r,7);
  styleC(ws.getCell(r,6),{formula:`SUM(F${sumStart}:F${sumEnd})`,bold:true,color:WHITE,bg:TOTAL_BG,align:"right",numFmt:'0.00" h"'});
  styleC(ws.getCell(r,7),{bg:TOTAL_BG,border:allThin});
  // H, I
  styleC(ws.getCell(r,8),{formula:`SUM(H${sumStart}:H${sumEnd})`,bold:true,color:WHITE,bg:TOTAL_BG,align:"right",numFmt:'0.00" h"'});
  styleC(ws.getCell(r,9),{formula:`SUM(I${sumStart}:I${sumEnd})`,bold:true,color:WHITE,bg:TOTAL_BG,align:"right",numFmt:'0.00" h"'});
  // J, K-L
  styleC(ws.getCell(r,10),{bg:TOTAL_BG,color:WHITE});
  ws.mergeCells(r,11,r,12);
  styleC(ws.getCell(r,11),{bg:TOTAL_BG,color:WHITE,border:allThin});
  styleC(ws.getCell(r,12),{bg:TOTAL_BG,border:allThin});
  // M-N: Lönekost/mån
  ws.mergeCells(r,13,r,14);
  styleC(ws.getCell(r,13),{formula:`SUM(M${sumStart}:M${sumEnd})`,bold:true,color:WHITE,bg:TOTAL_BG,align:"right",numFmt:'# ##0" kr"'});
  styleC(ws.getCell(r,14),{bg:TOTAL_BG,border:allThin});
  // O, P
  styleC(ws.getCell(r,15),{formula:`SUM(O${sumStart}:O${sumEnd})`,bold:true,color:WHITE,bg:TOTAL_BG,align:"right",numFmt:'# ##0" kr"'});
  styleC(ws.getCell(r,16),{formula:`SUM(P${sumStart}:P${sumEnd})`,bold:true,color:WHITE,bg:TOTAL_BG,align:"right",numFmt:'# ##0" kr"'});
  // Q-R: S:A lönekost
  ws.mergeCells(r,17,r,18);
  styleC(ws.getCell(r,17),{formula:`SUM(Q${sumStart}:Q${sumEnd})`,bold:true,color:WHITE,bg:TOTAL_BG,align:"right",numFmt:'# ##0" kr"'});
  styleC(ws.getCell(r,18),{bg:TOTAL_BG,border:allThin});
  ws.getRow(r).height=15;
  r++;
  r++;

  // === SCHEMAÖVERSIKT (GANTT) ===
  // Använder ALLA 18 kolumner: A=Personal, B=Uppgift, C-R = 16 timmar (kl 06-21)
  ws.mergeCells(r,1,r,18);
  const sh3=ws.getCell(r,1);
  sh3.value="SCHEMA – TYPISK DAG";
  sh3.font={name:"Calibri",size:13,bold:true,color:{argb:WHITE}};
  sh3.fill={type:"pattern",pattern:"solid",fgColor:{argb:ORANGE}};
  sh3.alignment={vertical:"middle",horizontal:"left",indent:1};
  ws.getRow(r).height=17;
  r++;

  // Tidshuvuden (kl 06-21 = 16 timmar)
  const startHour=6;
  const endHour=21;
  styleC(ws.getCell(r,1),{value:"Personal",bold:true,bg:ORANGE_LIGHT,size:10,align:"left",indent:1,border:{...allThin,bottom:{style:"medium",color:{argb:ORANGE}}}});
  styleC(ws.getCell(r,2),{value:"Uppgift",bold:true,bg:ORANGE_LIGHT,size:10,align:"left",indent:1,border:{...allThin,bottom:{style:"medium",color:{argb:ORANGE}}}});
  for(let h=startHour;h<=endHour;h++){
    const col=3+(h-startHour);
    styleC(ws.getCell(r,col),{value:String(h).padStart(2,"0"),bold:true,bg:ORANGE_LIGHT,size:9,align:"center",indent:0,border:{...allThin,bottom:{style:"medium",color:{argb:ORANGE}}}});
  }
  ws.getRow(r).height=15;
  r++;

  // Visa pass för housekeepers
  housekeepers.forEach((name,idx)=>{
    if(idx>=2)return; // Bara 2 rader i Gantt
    const isAlt=idx%2===1;
    const bg=isAlt?GRAY_LIGHT:WHITE;
    styleC(ws.getCell(r,1),{value:name,bg,size:10,bold:true,color:GRAY_DARK,indent:1});
    styleC(ws.getCell(r,2),{value:"Regelmässig städ",bg,size:10,color:GRAY_DARK,indent:1});

    let passStartH=null,passEndH=null;
    if(idx<data.bemanning.passLista.length){
      const passTid=data.bemanning.passLista[idx].tid;
      const m=String(passTid||"").match(/(\d{1,2})[:.](\d{2})\s*[-–—]\s*(\d{1,2})[:.](\d{2})/);
      if(m){passStartH=parseInt(m[1]); passEndH=parseInt(m[3]);}
    }
    if(passStartH==null && /kväll/i.test(data.meta.tidpadygnet||"")){
      passStartH=18; passEndH=20;
    }else if(passStartH==null && /natt/i.test(data.meta.tidpadygnet||"")){
      passStartH=22; passEndH=6;
    }else if(passStartH==null){
      passStartH=6; passEndH=8;
    }

    for(let h=startHour;h<=endHour;h++){
      const col=3+(h-startHour);
      const isActive=h>=passStartH && h<passEndH;
      styleC(ws.getCell(r,col),{value:isActive?"█":"",bg:isActive?SCHEMA_ACTIVE:bg,size:11,align:"center",indent:0,color:isActive?SCHEMA_ACTIVE:DARK});
    }
    ws.getRow(r).height=15;
    r++;
  });

  if(data.bemanning.tillsyn){
    const tillsynTidM=String(data.bemanning.tillsyn).match(/(\d{1,2})[:.](\d{2})\s*[-–—]\s*(\d{1,2})[:.](\d{2})/);
    let startH=11,endH=13;
    if(tillsynTidM){startH=parseInt(tillsynTidM[1]); endH=parseInt(tillsynTidM[3]);}
    styleC(ws.getCell(r,1),{value:"Daglig tillsyn",bg:WHITE,size:10,bold:true,color:GRAY_DARK,indent:1});
    styleC(ws.getCell(r,2),{value:"Tillsyn/diskplock",bg:WHITE,size:10,color:GRAY_DARK,indent:1});
    for(let h=startHour;h<=endHour;h++){
      const col=3+(h-startHour);
      const isActive=h>=startH && h<endH;
      styleC(ws.getCell(r,col),{value:isActive?"█":"",bg:isActive?SCHEMA_TILLSYN:WHITE,size:11,align:"center",indent:0,color:isActive?SCHEMA_TILLSYN:DARK});
    }
    ws.getRow(r).height=15;
    r++;
  }

  // Legend
  r++;
  styleC(ws.getCell(r,1),{value:"Förklaring:",size:9,italic:true,color:GRAY_DARK,bg:WHITE,border:{},indent:1});
  styleC(ws.getCell(r,2),{value:"█ = pass",size:9,italic:true,color:SCHEMA_ACTIVE,bg:WHITE,align:"center",border:{}});
  ws.mergeCells(r,3,r,6);
  styleC(ws.getCell(r,3),{value:"Regelmässigt städ",size:9,italic:true,color:GRAY_DARK,bg:WHITE,border:{},indent:1});
  styleC(ws.getCell(r,7),{value:"█",size:9,color:SCHEMA_TILLSYN,bg:WHITE,align:"center",border:{}});
  ws.mergeCells(r,8,r,11);
  styleC(ws.getCell(r,8),{value:"Daglig tillsyn",size:9,italic:true,color:GRAY_DARK,bg:WHITE,border:{},indent:1});
  for(let c=12;c<=18;c++)styleC(ws.getCell(r,c),{bg:WHITE,border:{}});
  ws.getRow(r).height=15;
  r+=2;

  // Sidfot
  ws.mergeCells(r,1,r,18);
  styleC(ws.getCell(r,1),{value:"Carotte Group  •  www.carottegroup.se",size:9,italic:true,color:GRAY_DARK,align:"center",border:{}});
  ws.getRow(r).height=18;
}

// Bygger Aktivitetsplan-bladet: checklista inför uppstart
function buildAktivitetsplanSheet(wb,data){
  const ORANGE="FFF59E0B";
  const ORANGE_LIGHT="FFFEF3C7";
  const DARK="FF1F2937";
  const GRAY_LIGHT="FFF9FAFB";
  const GRAY_MED="FFE5E7EB";
  const GRAY_DARK="FF6B7280";
  const INPUT_BG="FFEFF6FF";
  const WHITE="FFFFFFFF";

  const ws=wb.addWorksheet("Aktivitetsplan",{
    pageSetup:{paperSize:9,orientation:"portrait",fitToPage:true,fitToWidth:1,fitToHeight:0,margins:{left:0.5,right:0.5,top:0.5,bottom:0.5}},
    views:[{showGridLines:false,zoomScale:100}]
  });

  ws.columns=[{width:5},{width:48},{width:14},{width:14},{width:14},{width:32}];

  const thinBorder={style:"thin",color:{argb:GRAY_MED}};
  const allThin={top:thinBorder,bottom:thinBorder,left:thinBorder,right:thinBorder};

  const styleC=(cell,opts={})=>{
    if(opts.formula)cell.value={formula:opts.formula};
    else if(opts.value!==undefined)cell.value=opts.value;
    cell.font={name:"Calibri",size:opts.size||11,color:{argb:opts.color||DARK},bold:!!opts.bold,italic:!!opts.italic};
    cell.fill={type:"pattern",pattern:"solid",fgColor:{argb:opts.bg||WHITE}};
    cell.alignment={vertical:"middle",horizontal:opts.align||"left",indent:opts.indent!=null?opts.indent:1,wrapText:true};
    cell.border=opts.border||allThin;
    if(opts.numFmt)cell.numFmt=opts.numFmt;
    return cell;
  };

  let r=1;

  // TITEL
  ws.mergeCells(r,1,r,6);
  const t1=ws.getCell(r,1);
  t1.value="AKTIVITETSPLAN INFÖR UPPSTART";
  t1.font={name:"Calibri",size:22,bold:true,color:{argb:DARK}};
  t1.alignment={vertical:"middle",horizontal:"left",indent:1};
  ws.getRow(r).height=34;
  r++;

  ws.mergeCells(r,1,r,6);
  const t2=ws.getCell(r,1);
  t2.value=data.meta.kund||"Ny kund";
  t2.font={name:"Calibri",size:12,italic:true,color:{argb:ORANGE}};
  t2.alignment={vertical:"middle",horizontal:"left",indent:1};
  ws.getRow(r).height=20;
  r++;

  // Orange linje
  ws.getRow(r).height=4;
  ws.mergeCells(r,1,r,6);
  ws.getCell(r,1).fill={type:"pattern",pattern:"solid",fgColor:{argb:ORANGE}};
  r+=2;

  // Header-block: Kund / Uppstart / Ansvarig (redigerbart)
  const uppstartDate=new Date();
  uppstartDate.setDate(uppstartDate.getDate()+28); // 4 veckor framåt som default

  const headerRows=[
    {label:"Kund:",value:data.meta.kund||""},
    {label:"Adress:",value:data.meta.adress||""},
    {label:"Uppstart:",value:uppstartDate.toLocaleDateString("sv-SE")},
    {label:"Ansvarig:",value:""}
  ];
  headerRows.forEach((h,idx)=>{
    const isAlt=idx%2===1;
    const bg=isAlt?GRAY_LIGHT:WHITE;
    styleC(ws.getCell(r,1),{bg});
    styleC(ws.getCell(r,2),{value:h.label,bold:true,color:GRAY_DARK,bg});
    ws.mergeCells(r,3,r,6);
    styleC(ws.getCell(r,3),{value:h.value,bg:INPUT_BG,bold:true,indent:1});
    [4,5,6].forEach(c=>styleC(ws.getCell(r,c),{bg:INPUT_BG}));
    ws.getRow(r).height=22;
    r++;
  });
  r++;

  // === CHECKLISTA ===
  ws.mergeCells(r,1,r,6);
  const sh=ws.getCell(r,1);
  sh.value="CHECKLISTA";
  sh.font={name:"Calibri",size:13,bold:true,color:{argb:WHITE}};
  sh.fill={type:"pattern",pattern:"solid",fgColor:{argb:ORANGE}};
  sh.alignment={vertical:"middle",horizontal:"left",indent:1};
  ws.getRow(r).height=24;
  r++;

  // Tabellhuvud
  const headers=["Nr","Aktivitet","Ansvarig","Klart senast","Status","Kommentar"];
  headers.forEach((h,i)=>{
    const c=ws.getCell(r,i+1);
    c.value=h;
    c.font={name:"Calibri",size:11,bold:true,color:{argb:DARK}};
    c.fill={type:"pattern",pattern:"solid",fgColor:{argb:ORANGE_LIGHT}};
    c.alignment={vertical:"middle",horizontal:i===0||i===1||i===5?"left":"center",indent:i===0||i===1||i===5?1:0,wrapText:true};
    c.border={...allThin,bottom:{style:"medium",color:{argb:ORANGE}}};
  });
  ws.getRow(r).height=24;
  r++;

  // CAROTTES CHECKLISTA + KOMPLETTERINGAR
  // Beräkna default-datum: spritt över 4 veckor före uppstart
  const dagInnan=n=>{
    const d=new Date(uppstartDate);
    d.setDate(d.getDate()-n);
    return d.toLocaleDateString("sv-SE");
  };
  const dagEfter=n=>{
    const d=new Date(uppstartDate);
    d.setDate(d.getDate()+n);
    return d.toLocaleDateString("sv-SE");
  };

  // Roterande lista av Carotte-ansvariga
  const ansvarigaNamn=["Jalol","Atilla","Elin","Frida","Shahbaz","Emma","Katarina","Gustaf"];
  const nasta=idx=>ansvarigaNamn[idx%ansvarigaNamn.length];

  const aktiviteter=[
    // CAROTTES URSPRUNGLIGA 22 PUNKTER (från Banqsoft-mallen)
    {akt:"Lokalbesök",klart:dagInnan(21)},
    {akt:"Skaffa städinstruktion enligt överenskommelse med kunden",klart:dagInnan(7)},
    {akt:"Skaffa driftplan till personal",klart:dagInnan(7)},
    {akt:"Diskutera nollstädning av lokaler",klart:dagInnan(21)},
    {akt:"Boka statuskontroll nr 1 och nr 2",klart:dagInnan(21)},
    {akt:"Fråga kunden om skötselinstruktion",klart:dagInnan(20)},
    {akt:"Introduktion till personal",klart:dagInnan(2)},
    {akt:"Anställa personal",klart:dagInnan(7)},
    {akt:"Beställa kläder",klart:dagInnan(7)},
    {akt:"Säkerställa maskinpark",klart:dagInnan(7)},
    {akt:"Säkerställa leverans av tvättmaskin (kontakta PODAB)",klart:dagInnan(7)},

// Enkel fallback om strukturerad data saknas (t.ex. Steg 1)
function downloadFallbackXlsx(markdown,filename,title){
  const lines=markdown.split("\n");
  const rows=[];
  rows.push([title||"Carotte Städkalkyl"]);
  rows.push(["Genererad: "+new Date().toLocaleDateString("sv-SE")]);
  rows.push([""]);
  const cleanCell=s=>String(s||"").replace(/\*\*/g,"").trim();
  for(const l of lines){
    const t=l.trim();
    if(!t){rows.push([""]);continue;}
    if(t.startsWith("#")){rows.push([cleanCell(t.replace(/^#+\s*/,""))]);continue;}
    if(/^[-*]\s/.test(t)){
      const txt=t.replace(/^[-*]\s+/,"");
      const kv=txt.match(/^([^:]+):\s*(.+)$/);
      if(kv)rows.push([cleanCell(kv[1]),cleanCell(kv[2])]);
      else rows.push([cleanCell(txt)]);
      continue;
    }
    if(t.startsWith("|")&&t.endsWith("|")){
      const cells=t.split("|").slice(1,-1).map(c=>cleanCell(c));
      if(cells.every(c=>/^:?-+:?$/.test(c)))continue;
      rows.push(cells);
      continue;
    }
    rows.push([cleanCell(t)]);
  }
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"]=[{wch:48},{wch:24},{wch:22},{wch:24}];
  XLSX.utils.book_append_sheet(wb,ws,"Notering");
  XLSX.writeFile(wb,filename);
}

// ── TB ANALYS ────────────────────────────────────────────────────
async function doTBAnalys(){
  const timmar=parseFloat(S.tbTimmar)||0;
  const pass=parseFloat(S.tbPass)||1;
  const malTB=parseFloat(S.tbMalTB)||30;
  const cands=S.tbCands.filter(c=>c.lon&&c.pris);
  if(!cands.length||!timmar){return;}
  const lines=cands.map(c=>{
    const lon=parseFloat(c.lon)||0;
    const pris=parseFloat(c.pris)||0;
    const extra=parseFloat(c.extra)||0;
    const kost=lon*1.6+extra;
    const tb=pris-kost;
    const tbPct=pris>0?(tb/pris*100):0;
    const tbPass=tb*timmar;
    const totalTB=tbPass*pass;
    const be=kost;
    const malPris=malTB<100?kost/(1-malTB/100):0;
    return `${c.name||"Kandidat"}: Lön ${lon} kr/h, Pris ${pris} kr/h, Extra kostnad ${extra} kr/h → Kostnad/h: ${kost.toFixed(0)} kr, TB/h: ${tb.toFixed(0)} kr, TB%: ${tbPct.toFixed(1)}%, TB/pass (${timmar}h): ${tbPass.toFixed(0)} kr, Total TB (${pass} pass): ${totalTB.toFixed(0)} kr, Break-even: ${be.toFixed(0)} kr/h, Pris för ${malTB}% TB: ${malPris.toFixed(0)} kr/h`;
  });
  const prompt=`Jag har kört en TB-kalkyl för ett bemanningspass på ${timmar} timmar (${pass} pass totalt). Önskad TB-nivå: ${malTB}%.\n\nResultat:\n${lines.join("\n")}\n\nGe mig en pedagogisk affärsanalys.`;
  set({tbAnalys:{status:"loading"},tbAnalysLoading:true});
  try{
    const txt=await callAI([{role:"user",content:prompt}],SP.tb,null,pickModel("tb"));
    set({tbAnalys:{status:"done",text:txt},tbAnalysLoading:false});
  }catch(e){
    set({tbAnalys:{status:"done",text:"⚠️ "+e.message},tbAnalysLoading:false});
  }
}

    const btn=h("button",{style:{marginTop:"8px",padding:"11px 24px",borderRadius:"8px",background:S.loading?"#2d4060":a.color,border:"none",color:S.loading?DIM:"#fff",fontWeight:"600",fontSize:"13px",cursor:S.loading?"not-allowed":"pointer"},disabled:S.loading,onClick:submitForm},S.loading?"Genererar...":a.cta);

  // TB-kalkyl – real-time kandidatjämförelse

    // ── LÄGE: Räkna ut pris
    if(S.tbMode==="pris"){

    const prisMal=parseFloat(S.tbPrisMal)||0;
    const prisExtra=parseFloat(S.tbPrisExtra)||0;
    const prisKost=prisLon>0?prisLon*1.6+prisExtra:0;
    const prisUt=prisMal>0&&prisMal<100&&prisKost>0?prisKost/(1-prisMal/100):0;

    // ── LÄGE: Hitta TB från kundpris (labb-läge)

      // Konvertera till samma enhet som kundpriset

      const enhet=isManlon?"mån":"h";
      // Färgkodning: 0-20% röd, 20-28% gul, 28%+ grön. Negativ TB = mörkröd (förlust).
      function tbColors(t){

        const btn=h("button",{style:{padding:"5px 14px",border:"none",background:sel?tbColor:"transparent",color:sel?"#fff":MUT,fontSize:"12px",fontWeight:"600",cursor:"pointer",transition:"background .15s"},

      // Inputs-rad

        tbBox.appendChild(tag);

        tbBox.appendChild(h("div",{style:{fontSize:"15px",color:DIM,fontStyle:"italic",marginTop:"8px"}},"Fyll i kundpris och lön"));

      // TB kr/h box
      const krBox=h("div",{style:{background:CRD,border:`1px solid ${BD}`,borderRadius:"12px",padding:"18px 20px",display:"flex",flexDirection:"column",justifyContent:"center"}});
      krBox.appendChild(h("div",{style:{fontSize:"11px",fontWeight:"700",color:MUT,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"6px"}},`TB i kr/${enhet}`));

      } else {

      const kostBox=h("div",{style:{background:CRD,border:`1px solid ${BD}`,borderRadius:"12px",padding:"18px 20px",display:"flex",flexDirection:"column",justifyContent:"center"}});

      // ── Känslighetstabell: vad händer om lönen ändras?
      if(kundPris>0 && lonPerH>0){

        const grid=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(110px, 1fr))",gap:"8px"}});
        // Bygg en serie löner: -25, -20, -15, -10, -5, +0, +5, +10, +15, +20, +25
        const offsets=[-25,-20,-15,-10,-5,0,5,10,15,20,25];
        offsets.forEach(off=>{
          const testLonH=lonPerH+off;
          if(testLonH<=0)return;
          const testKostH=testLonH*1.6+extra;
          const testKost=isManlon?testKostH*timmarMan:testKostH;
          const testTb=(kundPris-testKost)/kundPris*100;
          const c=tbColors(testTb);
          const isCurrent=off===0;
          const cell=h("div",{style:{background:c.bg,border:`${isCurrent?"2":"1"}px solid ${isCurrent?tbColor:c.border}`,borderRadius:"8px",padding:"10px 8px",textAlign:"center",position:"relative",transition:"all .15s",cursor:"pointer"},

            cell.appendChild(h("div",{style:{position:"absolute",top:"-7px",left:"50%",transform:"translateX(-50%)",background:tbColor,color:"#fff",fontSize:"9px",fontWeight:"700",padding:"1px 6px",borderRadius:"4px",textTransform:"uppercase",letterSpacing:"0.4px"}},"Nu"));

          cell.appendChild(h("div",{style:{fontSize:"10px",color:MUT,marginBottom:"4px",marginTop:isCurrent?"4px":"0"}},lonDisplay));

        sensWrap.appendChild(h("div",{style:{fontSize:"11px",color:DIM,marginTop:"10px",fontStyle:"italic"}},"Klicka på en cell för att sätta den lönen som den nuvarande."));
