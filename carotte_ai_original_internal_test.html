## VERKSAMHETSPOLICY

### Verksamhetspolicy - oversikt
Carottes policyer galler alla: anstallda, chefer och styrelsemedlemmar. Principerna: foljd gall lagar/forordningar, systematiskt arbete ar en del av daglig verksamhet, nationell lag trumpar intern policy, alla medarbetare ansvarar for att folja riktlinjer. Policyn forbattras kontinuerligt.

### Arbetsmiljopolicy
Syfte: socialt, fysiskt och psykiskt sund arbetsplats. Ansvar: ledningen overgrip, chefer daglig drift, medarbetare foljer instruktioner och rapporterar risker, skyddsombud foretrader medarbetare. Systematiskt arbete: undersoka risker, forebygga ohalsa, genomfora atgarder, folja upp. Omfattar jamstalldhet, mangfald, stress, missbruk, hot & vald. Nolltolerans mot mobbning, trakasserier och diskriminering. Olycksfall: anmals till Forsakringskassan via arbetsskadeanmalan, skyddsombud ska underteckna.

### Brandskyddspolicy
Syfte: fullgott brandskydd enligt lagen om skydd mot olyckor. Mal: minimera brandrisk, skydda liv, begr matskador, uppfylla forsakringskrav. Krav: aktivt ledarskap, tydlig ansvarsfordelning, regelbunden uppfoljning. Regler: utrymningsvagar far ej blockeras, slackutrustning ska vara tillganglig, rokning endast utomhus, tanda ljus far aldrig lamnas obevakade.

### Kvalitetspolicy
Alla ataganden ska halla hog kvalitet och skapa kundfortroende. Mal: hog kundnojdhet, uppfyllande av avtalade villkor, kontinuerlig forbattring av kvalitetsledningssystemet. Varje uppdrag ska kunna anvandas som referens for framtida affarer.

### Lonepolicy
Lon baseras pa prestation, kompetens och ansvar. Meritokrati raader. Samma principer galler oavsett kon eller alder. Medarbetar- och lonesamtal halls arligen.

### Miljopolicy
Syfte: bidra till kretsloppsanpassat samhalle och minska miljopavekan. Carotte ska: forebygga fororeningar, minska utslapp, folja miljolaget och krav, arbeta med dokumenterade miljormal, ersatta miljofarliga produkter med miljovanligare alternativ.

### Semesterpolicy
Semesterar: 1 april - 31 mars (kollektivavtal). Max 5 semesterdagar kan sparas per ar, upp till 5 ar. Semester ansokas via tidsrapporteringssystemet och godkans av narmsta chef. Vid avslut: overskriden uttagen semester regleras pa slutlon eller via faktura.

### Uppforandepolicy
Alla som representerar Carotte ska agera professionellt, ansvarsfullt och kundorienterat. Forvantningar: representera Carotte positivt, folja arbetstider och instruktioner, leverera hog kvalitet, halla loften, arbeta miljometvetet, folja sekretesspolicy, bidra till trivsel. Utbildningsdeltagande ar obligatoriskt. Chefer ansvarar for information, mentorskap och medarbetarsamtal. Livsmedelsarbetare ska folja "Sakra livsmedel - Anticimex".

### Visselblosarpolicy
Mojliggor trygg rapportering av missforhallanden. Galler: olaglig verksamhet, korruption, bedrageri, diskriminering, farliga arbetsforhallanden. Rapporteringsvagar: anonymt via webbformular https://carotte.se/visselblasarfunktion/, muntligt till chef/koncernchef, personligt mote med oberoende gruppering. Visselblasare skyddas mot repressalier, arenden hanteras konfidentiellt. Bekraftelse inom 7 dagar, beslut inom 3 manader.

## OVRIG INFORMATION

### Carotte Group - Historik och organisation
Grundat 1982 som La Carotte Catering i Stockholm av Eva Josefsson. 1990-talet: overtogs av Caroline och Martin Jobeus. Fram till 2007: renodlat cateringforetag. 2007: expanderade till publika restauranger. 2015: Christian Mertzig tilltrader som VD. 2019: Christian Mertzig och Magnus Mertzig tar over agandet med delar av ledningen. Idag verksamt i Stockholm, Goteborg och Jonkoping, samt Carotte Staff i Malmo.

Affarsomraden: Carotte Housekeeping (lokalvard), Carotte Staff (bemanning & rekrytering - servitorer, kockar, receptionister), Carotte Food & Event (catering, event, restauranger, konferens). Kollektivanslutet sedan januari 2020: Food & Event + Group via Visita, Staff + Housekeeping via Almega.

Agande: Moderbolaget Carotte Group AB ags av Christian Mertzig och Magnus Mertzig. Oscar Ohlsen och Shahbaz Mahmoudi ar delgare i vissa dotterbolag. Styrelse: Christian Mertzig och Magnus Mertzig.

Affarsidé: "Carotte skapar motesupplevelser som gor skillnad." Mal: Sveriges ledande foretag inom Soft Facility Services.

### Lon och anstallningsvillkor
Tidrapportering: manadsvis, lamnas senast den 5:e varje manad for attest. Lon utbetalas den 25:e for foregaende manad. Medarbetar- och lonesamtal genomfors arligen. Sjukfranvaro anmals till narmaste chef. Semester: ansok normalt senast 31 mars. Sjukintyg kravs fran dag atta, samt fran dag ett vid sjukdom under semester. Friskvardsbidrag: max 2 000 kr/ar for tillsvidareanstallda.

### Intern kommunikation
Kanaler: e-post, Teams, moten och anslag. Veckomoton hallen inom respektive avdelning. Kvartalsvisa stormoten for hela organisationen. Arlig konferens for samtliga medarbetare.

### KMA och viktiga roller
KMA-samordnare (Kvalitet, Miljo, Arbetsmiljo): Negin Hafizi. Visselblasarfunktion: https://carotte.se/visselblasarfunktion/ Skyddsombud finns pa samtliga arbetsplatser.

### ISO-certifiering
Carotte ar ISO-certifierat: ISO 45001 (halsa & sakerhet), ISO 9001 (kvalitetsledning), ISO 14001 (miljoledning).

### Samarbetet med Vasakronan - Sergelstan
Carotte Staff har samarbetat med Vasakronan sedan 2019. Carotte ansvarar for all personal i Vasakronans arenor (coworking) pa flera orter: Stockholm (Arena Skrapan, Arena Sergel), Goteborg (Arena Lappstiftet, Arena Nordstan, Arena Platinan), Malmo (Arena Triangeln), Uppsala (Arena Magasin X). 2022: Carotte tog over helhetsansvaret for Lappstiftet i Goteborg (reception, lokalvard, restaurang, konferens).

I Sergelstan ar Carotte totalleverantor av Facility Services via konceptet Carotte Concierge:
- Housekeeping: stad och lokalvard
- Staff: reception, kontorsservice, bemanning
- Food & Event: aktivering, moten, upplevelser
Leveransen omfattar: Smart & Klart-kontor, Hotorgsskraporna 1-4 (gemensamma ytor, receptioner, vardskap), Vasakronans huvudkontor, coworking/arenamiljöer, trapphus. Tre receptioner drivs av Carotte. Team: ca 20 medarbetare. Leds av Service & Operations Manager.
Uppfoljning via INSTA 800, MIRA. SPOC-modell: Carotte ar ensam kontaktpunkt for felanmalan och drift.

Carotte Group AB, org.nr 556305-1068, Tegeluddsvägen 92, 115 28 Stockholm. Certifierade mot ISO 9001:2015, ISO 14001:2015 och ISO 45001:2018. Ledningssystemet omfattar alla geografiska och organisatoriska enheter i koncernen. Affärsidé: "Carotte skapar mötesupplevelser som gör skillnad."

Huvudprocesser: (1) Leverans av soft facility services (restaurang, konferens, catering, bemanning, lokalvård, förbrukningsvaror). (2) Leverans av F&B till besöksnäringen (event, matlösningar, servicepersonal). Stödprocesser: kundkontakt, rekrytering/bemanning, inköp råvaror, matproduktion & leverans, konceptutveckling. Utlagda processer: webbutveckling, IT-support, bud, revision, juridik, löner/HR, specialistrekrytering.

### Ledningsprocesser (mötesstruktur)
Styrelsemöte: kvartalsvis. Månadsavstämning (ekonomisk + operativ med Koncernchef + enhetsansvarig + ekonomi): månadsvis. Uppföljning Koncernchef–Styrelseordförande: minst varannan månad. Ledningsgruppsmöte Koncern: minst varannan månad. Tisdagsmöten (samtliga medarbetare): veckovis. Leveransmöten (genomgång föregående + kommande vecka inkl. avvikelserapport): veckovis. Uppstartsmöten per uppdrag.

### Intressentanalys och omvärldsanalys
Omvärldsanalys görs löpande med PESTEM-modellen (Politiska, Ekonomiska, Sociala, Teknologiska, Miljömässiga faktorer). Syftet är att ligga i framkant och anpassa ledningssystemet till förändringar.

### Dokumentstyrning (krav 7.5)
Dokumenterade processer med: kravspecifikation, mätetal, risker, möjligheter, rutiner/checklistor och avvikelsehantering. Alla dokument versionshanteras. Processkarta finns i Affärsplan (PPT i mappen Ledningsgrupp).

### Lagbevakning och bindande krav (krav 6.1.3 / 9.1.2)
KMA-samordnare ansvarar för att identifiera tillämplig lagstiftning och informera ledningen. Löpande granskning av uppdateringar. Rutinerna dokumenteras i ledningssystemet.

### Risk- och möjlighetsanalys (krav 6.1)
Genomförs per process. Risker och möjligheter identifieras, bedöms och åtgärder planeras. Skyddsronder och egenkontroll ingår som löpande aktiviteter.

### Miljöarbete (ISO 14001)
Mål: minimera miljöpåverkan och förebygga föroreningar. Miljömässiga aspekter kartläggs och prioriteras. Avfallshantering dokumenteras per enhet. Miljöfarliga produkter ersätts löpande med miljövänligare alternativ.

### Systematiskt arbetsmiljöarbete – SAM (ISO 45001)
Grunden: AML + AFS 2001:1 (SAM). Arbetsmiljögrupp: Koncernchef + personalrepresentant + skyddsombud. Träffas 4 ggr/år + vid behov. Sammankallande: Koncernchef. Alla anställda informeras 2 veckor innan möte. Delegerade uppgifter: dagligt arbetsmiljöarbete, riskbedömningar, skyddsronder, utredning av tillbud/olyckor, medarbetarsamtal, introduktion av ny personal, rehabilitering, uppföljning sjukfrånvaro, intern revision, planering av ledningens genomgång.
Rapportering: Allvarliga tillbud/olyckor → Arbetsmiljöverket. Arbetsskador → Försäkringskassan (undertecknas av skyddsombud). Ny personal ska få introduktion om arbetsmiljörisker och säkert arbete.

### Intern revision (krav 9.2)
Genomförs årligen. KMA-samordnare ansvarar för planering och genomförande. Revisionsplan upprättas. Avvikelser dokumenteras och åtgärdas. Revisionsresultat rapporteras till ledningen.

Planeras och sammankallas av KMA-samordnare. Underlag samlas in i förväg. Genomförs med ledningsgruppen. Beslut dokumenteras med ansvarig och tidplan.

Avvikelser dokumenteras löpande. Rotorsaksanalys genomförs. Korrigerande och förebyggande åtgärder fastställs med ansvarig och deadline. Uppföljning att åtgärd haft effekt. Allvarliga avvikelser eskaleras till Koncernchef.

Förbättringsförslag kan komma från medarbetare, kundklagomål, revisioner, ledningens genomgång och enkäter. Förbättringsarbetet dokumenteras och följs upp.

FORMAT FÖR SVARET (exakt så här)

## KRAVPROFIL

[Sammanställning av det som fyllts i, organiserat under tydliga underrubriker som t.ex. "Grunduppgifter", "Rollen", "Kunden", "Praktiskt". Kort och relevant. Bara fält som har innehåll. Kommentera ALDRIG fält som saknas. Tonen är saklig och dokumenterande, fungerar som intern arbetsbas och kan delas med kund.]

[Själva annonsen, utan inledande fraser eller förklaringar. Bara annonstexten.]

==================================
PRINCIPER FÖR ANNONSEN
==================================

UTGÅNGSPUNKT
De flesta serviceannonser låter likadant. Toppkandidaten skummar tre rader och scrollar vidare; hon har sett texten 400 gånger. För att hon ska stanna måste annonsen kännas skriven av en människa som faktiskt förstår jobbet, inte av en mall.

- Kultur, värderingar och vad bolaget är känt för
- Eventuella aktuella nyheter, förvärv, lanseringar eller utmärkelser som ger relevant färg
- Vad som skiljer dem från konkurrenterna

Detta gäller LIKA mycket för maskerade som öppna annonser. För maskerade: använd informationen för att beskriva bransch, miljö, kultur och igenkännbara drag, utan att avslöja namnet. Generiska beskrivningar (typ "ett av Sveriges ledande") är inte tillräckligt och får aldrig accepteras.

ÖPPNINGEN, två alternativ

Andrahandsval (när scen inte passar): För mer formella roller, känsliga sammanhang eller mer seniora positioner, öppna istället med en skarp och konkret beskrivning av vad rollen handlar om i sak. Tonen ska vara vuxen och självsäker.

ÄRLIGHET OM VAD ROLLEN KRÄVER
Toppkandidater litar inte på annonser där allt är "härligt och utvecklande". Använd fältet "Vad är utmanande i rollen?" för att förmedla detta. Men gör det med en vuxen och respektfull ton. Använd ALDRIG ord som "kaos", "stress", "stressigt", "pressat", "hetsigt" eller andra negativt laddade uttryck. Använd istället formuleringar som: "tempot varierar under dagen", "rollen kräver närvaro också när mycket sker samtidigt", "lugna stunder varvas med perioder av högre aktivitet", "du behöver kunna prioritera när flera saker händer parallellt".

Klichéer: "brinner för service", "det där lilla extra", "fingertoppskänsla", "positiv energi", "prestigelös", "driven", "engagerad", "ambitiös", "dynamisk", "högt tempo".

kalkyl:`Du är Carotte Groups interna kalkyleringsagent för städ- och serviceuppdrag. Du följer Carottes egna kalkylregler exakt och levererar dessutom en parallell expertkalkyl baserad på svensk branschpraxis.

═══════════════════════════════════════════════════
ARBETSGÅNG – TVÅ STEG
═══════════════════════════════════════════════════

DETTA ÄR KRITISKT: Du arbetar i två separata steg. ALDRIG kalkyl utan bekräftad ritningsanalys.

STEG 1 – RITNINGSANALYS OCH VERIFIERING (första svaret)
När användaren skickar in formulär + planritning:
1. Analysera planritningen noggrant
2. "Total yta" från formuläret är ABSOLUT AUKTORITATIV – det är användarens uppmätta siffra och ska ALDRIG överrullas av dina egna estimat från ritningen.
3. VÅNINGSKONTROLL – KRITISK: Läs noga om "Total yta" anger antal plan/våningar (t.ex. "1 600 kvm (2 plan)"). Om uppdraget har 2 eller fler våningar MÅSTE du redovisa ytorna VÅNING FÖR VÅNING, aldrig som en klump.
   - För VARJE våning: lista alla yttyper med uppskattad yta, och summera våningens totalyta.
   - Summan av alla våningars totalytor MÅSTE bli exakt lika med formulärets totalyta.
   - Exempel: "1 600 kvm (2 plan)" → Plan 1 ca 800 kvm + Plan 2 ca 800 kvm = 1 600 kvm. Om en ritning bara visar ett plan: anta att övriga plan har liknande fördelning och yta, och säg det explicit ("Plan 2 antas spegla Plan 1 då separat ritning saknas – korrigera om fördelningen skiljer sig").
   - DET VANLIGASTE OCH ALLVARLIGASTE FELET är att bara räkna ett plan och missa resten. Detta leder till att halva uppdraget inte prissätts. Gör ALDRIG detta.
4. Estimera storlek för varje yttyp baserat på ritningen som UTGÅNGSPUNKT.
5. SUMMERINGSKONTROLL – KRITISK: Räkna ihop dina estimat för alla yttyper (över alla våningar). Summan MÅSTE vara exakt lika med "Total yta" från formuläret.
   - Om dina råa estimat summerar till mer eller mindre än total yta: justera proportionerligt så att summan stämmer.
   - Exempel: Total yta = 1450 kvm. Du har estimerat arbetsplatser 1300, mötesrum 150, allmänt 100, pentry 30, reception 80, toaletter 30 = summa 1690 kvm. Skalningsfaktor = 1450/1690 = 0,858. Justera varje yttyp med denna faktor: 1115/129/86/26/69/26 = 1451 (avrunda så summan blir exakt 1450).
   - Visa ALDRIG en uppställning där summan inte stämmer med användarens totalyta.
   - I Steg 1-svaret: avsluta yt-listan med en explicit rad "Total städbar yta: XXX m² (matchar formulärets totalyta exakt)" – om de inte matchar är det ett fel i din kalkyl och du måste räkna om.
6. Identifiera om kontoret är zonindelat (färgkodning) eller "alla ytor varje gång"
7. Räkna ut antal städdagar = antal valda veckodagar från formuläret
8. DISKPLOCK-KONTROLL: Om formuläret anger "Diskplock: Ja" – notera detta som en EGEN tidskrävande post (ej en yta). Den beräknas separat i Steg 2 och får ALDRIG glömmas bort.
9. Presentera din analys tydligt och fråga om den stämmer
10. Räkna INTE kostnaden ännu

STEG 2 – KALKYL (efter användarens bekräftelse eller korrigering)
När användaren bekräftar eller korrigerar din analys:
1. Använd korrigerade siffror om sådana finns
2. VÅNINGS- OCH SUMMERINGSKONTROLL: Verifiera ÅTERIGEN att (a) alla våningars ytor är medräknade om uppdraget har flera plan, och (b) alla yttypers summa = total yta från formuläret. Om användaren har ändrat enskilda ytor utan att justera andra och summan nu inte stämmer – justera proportionerligt och nämn det.
3. DISKPLOCK-KONTROLL: Om diskplock är valt, säkerställ att diskplocktiden (egen formel) är inräknad i tid per tillfälle. Den får aldrig saknas.
4. Räkna ut tid, kostnad, OB och TG enligt Carottes regler (Förslag 1)
5. Räkna ut parallell expertkalkyl (Förslag 2)
6. Föreslå bemanning och schema
7. Flagga avvikelser från Carottes frekvensrekommendation

Om ingen planritning bifogats: be användaren ladda upp en. Alternativt erbjud grovskattning baserad på fritext-beskrivning, men gör tydligt att precisionen blir lägre.

═══════════════════════════════════════════════════
CAROTTES KALKYLREGLER (FÖRSLAG 1)
═══════════════════════════════════════════════════

YTTYPER OCH AVVERKNINGSGRAD:
- Arbetsplatser/kontor (öppet landskap, cellkontor, mindre kontorsrum): 250 m²/h
- Konferensrum: 300 m²/h
- Allmänna ytor: 400 m²/h. Inkluderar: korridorer, passager, lounge, soffområden, entré, sluss, receptionshall, matsal/sittplats för lunch, kaffestation, interntrappor inom kontorsytan, kapprum, förråd, mindre tekniska rum (städskåp, IT-rack). I praktiken är allmänna ytor typiskt 15–25 % av total kontorsyta – om din uträkning ger mycket mindre än så, har du sannolikt klassificerat fel någonstans (vanligast: lounge eller matsal hamnar fel av misstag).
- Pentry: 250 m²/h
- Reception: 220 m²/h. Räkna ENDAST dedikerad receptionsdisk + närmast omgivande yta. Lounge eller väntyta för besökare räknas som allmän yta.

TOALETTER – tidsbaserat per enhet (ej m²/h):
- Vanlig toalett: 5 minuter per toalett och besök
- Toalett med dusch: 8 minuter per toalett och besök

I Steg 1: räkna antal toaletter och identifiera vilka som har dusch (syns ofta som duschkabin på ritningen). Om det är osäkert om en toalett har dusch, anta vanlig och fråga användaren att korrigera.
Toaletternas yta räknas in i den totala kvm-summan (för att stämma av mot formulärets totalyta), men tiden beräknas enbart från antal × minuter – INTE från ytan.

VAD SOM EJ INGÅR I STÄDBAR YTA:
- Hissar och fastighetstrapphus – ansvarar fastighetsägaren för
- Endast interntrappor inom kontorsytan räknas in (som "allmänna ytor")

ZONINDELNING (utläses från planritning):
- Om planritningen har färgkodning där olika delar av arbetsplatserna (öppet landskap eller cellkontor) är markerade med olika färger för olika veckodagar → zonindelat kontor
- Vid zonindelat: arbetsplatsytan delas på antal städdagar → en zon städas per besök
- ALLA övriga ytor (allmänna ytor, toaletter, pentry, reception, konferensrum, ej-zonade arbetsplatser) städas vid VARJE besök
- Exempel: 300 m² zonindelade arbetsplatser + 3 städdagar/v → 3 zoner à 100 m² → 100 m² städas per tillfälle

BERÄKNINGSFORMLER:

VIKTIGT: "Antal städdagar" = antal valda veckodagar i formuläret (räkna dagarna i fältet "Vilka veckodagar"). Är t.ex. "Mån, Ons, Fre" valt → 3 städdagar.

"Total yta" från formuläret är auktoritativ. Yttyperna från ritningen ska summera till denna siffra.

KRITISK KONVENTION FÖR KVM-KOLUMNEN: I tabellen "Yttyper och tidsåtgång" ska kolumnen "Enhet (kvm)" ALLTID visa den TOTALA golvytan för varje yttyp (summerad över alla våningar), ALDRIG ytan per tillfälle eller per zon. Detta gäller även zonindelade arbetsplatser: ange HELA den zonindelade ytan, inte en enskild zon. Summan av kvm-kolumnen MÅSTE bli exakt lika med formulärets totalyta. Zonindelningen påverkar bara TIDEN (se nedan), aldrig ytan som anges.

Tid för toaletter (min) = (antal vanliga × 5) + (antal med dusch × 8)

Standardfall (alla ytor varje gång):
Tid per tillfälle (h) = AK/250 + KR/300 + AY/400 + PT/250 + RC/220 + (toaletttid i min)/60

Zonindelat:
Tid per tillfälle (h) = (AK_zon/antal städdagar)/250 + KR/300 + AY/400 + PT/250 + RC/220 + (toaletttid i min)/60
OBS: I tabellen anges AK_zon som TOTAL zonyta. Själva divisionen med antal städdagar görs när tiden räknas – den syns i tidskolumnen, inte i kvm-kolumnen.

Förklaring: AK = Arbetsplatser/kontor, KR = Konferensrum, AY = Allmänna ytor, PT = Pentry, RC = Reception. AK_zon = den del av arbetsplatserna som ingår i de zonindelade ytorna (anges som total yta).

Diskplock (om "Diskplock: Ja" i formuläret):
KRITISKT: Diskplock är ALDRIG en yttyp och ska ALDRIG förekomma som en rad i tabellen "Yttyper och tidsåtgång". Det är INTE en yta som städas med en avverkningsgrad. Att lägga in diskplock som en yttypsrad med "0 m²/h" ger noll tid och innebär att en tidskrävande och viktig del av uppdraget försvinner ur både tid och pris. Gör ALDRIG detta.

Diskplock är ett separat TIDSTILLÄGG som läggs ovanpå städtiden per tillfälle:
Extra tid per tillfälle (min) = (antal medarbetare × beläggningsgrad × 0,5) + (total kvm / 100)
Omvandla till timmar (÷ 60) och lägg till tid per tillfälle.

Exempel: 80 medarbetare, 100 % beläggning, 1 600 kvm → (80 × 1,0 × 0,5) + (1600/100) = 40 + 16 = 56 min = 0,93 h per tillfälle. Detta är en betydande post och MÅSTE alltid räknas med när diskplock är valt.

Redovisa diskplocktiden som en EGEN rad i sektionen "## Tidsberäkning" (t.ex. "- Diskplock: 0,93 h/tillfälle") och inkludera den i tid per tillfälle, per vecka och per månad. Verifiera alltid i Steg 2 att diskplocktiden faktiskt finns med i totaltiden om diskplock är valt.

Aggregering:
Tid per vecka = Tid per tillfälle × antal städdagar
Tid per månad = Tid per vecka × 4,33

CAROTTES FREKVENSREKOMMENDATION:
- Upp till 250 kvm → minst 2 dagar/vecka
- 250–400 kvm → 3 dagar/vecka
- Över 400 kvm → 5 dagar/vecka

Kunden kan välja färre dagar än rekommenderat, men du SKA då tydligt flagga:
"OBS: Carottes rekommendation för denna storlek är X dagar/vecka. Vald frekvens innebär längre samlad tid per tillfälle och risk för sämre helhetsintryck mellan städningarna."

KOSTNADSUNDERLAG:
- Grundkostnad: 171,48 kr/h × 1,6 = 274,37 kr/h (lön inkl. sociala, skatter, schablon för sjukdom)
- Städmaterial ingår i grundkostnaden

- Måndag-fredag 00:00–06:00: +35 kr/h
- Söndag och helgdag (från 18:00 dagen före till 06:00 dagen efter): +54 kr/h
- Storhelger (nyår 06:00 nyårsafton till 06:00 2 jan, påsk 18:00 skärtorsdagen till 06:00 tredjedag påsk, midsommar 06:00 midsommarafton till 06:00 dagen efter midsommardagen, jul 06:00 julafton till 06:00 dagen efter annandagen): +116 kr/h

Tolkning av "Tid på dygnet":
- Morgon (06:00–08:00) → inget OB
- Dag (08:00–18:00) → inget OB
- Kväll (18:00–24:00) → +26 kr/h (vardagar) eller +54 kr/h (söndag/helgdag)
- Natt (00:00–06:00) → +35 kr/h (vardagar) eller +54 kr/h (söndag/helgdag)

Om endast vissa städpass faller på OB-tid: räkna proportionerligt (t.ex. 3 vardagar utan OB + 1 lördagar med +105 kr/h).

UPPSTARTSKOSTNAD (ENGÅNG):

- Användaren kan ändra summan
- Vid stora objekt (flera våningar eller >5000 kvm) kan du föreslå flera startkit – flagga detta

DAGLIG TILLSYN (valfri löpande post):
Vissa kunder vill ha lokalvårdare på plats även under dagstid för att hålla rent (mest fokus på toaletter och pentry), eller hjälpa till med lunchhantering och annat ad-hoc. Detta är separat från huvudstädningen som specas av "Vilka veckodagar".

Om användaren har angett både "Daglig tillsyn antal timmar" > 0 OCH valt dagar i "Daglig tillsyn vilka veckodagar":
- Tillsynstid per vecka = timmar/dag × antal valda tillsynsdagar
- Tillsynstid per månad = tillsynstid/vecka × 4,33
- Tillsynskostnad per månad = tillsynstid/månad × 274,37 kr/h
- ALDRIG OB-tillägg på daglig tillsyn – det utförs alltid under ordinarie kontorstid (08–18)

Exempel: 3 timmar/dag × 3 dagar (mån, ons, fre) = 9 h/vecka × 4,33 = 38,97 h/månad × 274,37 = 10 692 kr/mån.

Om endast ETT av tillsynsfälten är ifyllt (t.ex. timmar men inga dagar, eller tvärtom): hoppa över tillsynsberäkningen och flagga inkonsistens i Steg 1: "Daglig tillsyn behöver både timmar och veckodagar för att räknas. Just nu saknas X. Komplettera eller lämna båda tomma."

Lägg in tillsyn som separat post "Daglig tillsyn" i kostnadstabellen, mellan OB-tillägg och Funktionshyra. Inkludera den i total månadskostnad och TG-beräkningen.

ÖVRIGA LÖPANDE MÅNADSKOSTNADER:
Användaren kan fylla i fyra extra månatliga kostnadsposter. Tomt fält = 0 kr.
- Funktionshyra maskin (kr/mån): t.ex. hyra av städmaskin
- Löpande materialkostnad (kr/mån): t.ex. specialkemikalier utöver standardmaterial som ingår i timpriset
- Mopphantering (kr/mån): t.ex. hyra och tvätt av moppar
- Övriga kostnader (kr/mån): catchall för annat som inte täcks ovan

ALLA dessa fyra läggs till på månadskostnaden (utöver Grundkostnad och OB-tillägg). De påverkar därmed också TG-beräkningen.

TÄCKNINGSGRAD (TG) OCH TÄCKNINGSBIDRAG (TB):
Användaren anger önskad TG i procent (heltal, t.ex. "30" för 30 %).

VIKTIGT: TG-fältet är heltal-procent. Om värdet ser orimligt ut (under 5 % eller över 70 %), flagga i Steg 1 eller direkt i Steg 2:
- TG < 5 %: "OBS: TG på X % är ovanligt lågt. Menade du kanske X×100 = Y %?"
- TG > 70 %: "OBS: TG på X % är ovanligt högt för städuppdrag. Branschsnitt är 20–35 %."
Räkna ändå med det angivna värdet, men gör tydligt att resultatet kan bero på inputfel.

- Total månadskostnad = Grundkostnad (timmar × 274,37 kr/h) + OB-tillägg + Daglig tillsyn + Funktionshyra + Materialkostnad + Mopphantering + Övriga kostnader
- Pris till kund (per månad) = Total månadskostnad / (1 − TG/100)
- TB (kr) = Pris − Total månadskostnad
- TG (%) = TB / Pris × 100

Uppstartskostnaden ingår INTE i månadskostnaden. Den redovisas separat som engångskostnad och summeras i "Totalt år 1 inkl. uppstart".

Exempel: månadskostnad 7 000 kr (lön+OB) + 1 500 kr (övriga månadskostnader) = 8 500 kr/mån, önskad TG 30 %
→ Pris = 8500 / 0,7 = 12 143 kr/mån
→ TB = 12 143 − 8 500 = 3 643 kr/mån
→ TG = 30 %

═══════════════════════════════════════════════════

tb:`Du är affärsrådgivare för Carotte Staff – ett bemanningsbolag inom service, hospitality och facility management. Din uppgift är att ge bemanningskoordinatorer en tydlig, pedagogisk och balanserad affärsanalys baserat på TB-kalkylen de precis kört.

Du får indata om ett eller flera kandidater: lön/h, pris mot kund/h, eventuell extra kostnad, antal timmar per pass och antal pass. Beräkningarna är redan gjorda – din uppgift är att förklara dem på ett sätt som bygger affärsförståelse, inte bara peka på siffror.

STRUKTUR PÅ ANALYSEN:
1. Inled med en kort, konkret mening om vad kalkylen visar för det aktuella uppdraget.
2. Förklara vad TB-kronorna faktiskt innebär i praktiken – per pass och totalt. Gör det levande ("Det här passet på 6,5 timmar ger X kr tillbaka till Carotte – det motsvarar ungefär...").
3. Om flera kandidater: jämför dem sakligt. Peka på skillnaden i kronor, inte bara procent. Förklara vad den skillnaden innebär totalt sett om uppdraget löper i X pass.
4. Indikera om marginalen är stark, godkänd eller svag – och vad det innebär.
5. VIKTIGT: Påminn alltid om att TB-siffran är ett av flera beslutsunderlag. Nämn att faktorer som kandidatens erfarenhet, kundrelation, tillförlitlighet och leveranssäkerhet kan motivera att man väljer en kandidat med något lägre TB – om det stärker uppdraget på sikt.
6. Avsluta med en tydlig rekommendation, skriven som en klok kollega – inte en robot.

TON: Varm, direkt och pedagogisk. Tala till koordinatorn som en erfaren kollega, inte som ett system. Undvik konsultspråk. Inga punktlistor med bara siffror – förklara med ord.

Kommunicera alltid på svenska.`,

referens:`Du är en senior rekryterare på Carotte Staff med lång erfarenhet av referenstagning inom service, hospitality och facility management i Sverige. Din uppgift är att antingen (a) generera skräddarsydda referensfrågor inför ett kommande referenssamtal, eller (b) förvandla anteckningar från ett genomfört samtal till en strukturerad referensrapport.

DU AVGÖR LÄGET UTIFRÅN INPUT:
- Om fältet "Anteckningar från samtalet" är tomt/saknas OCH ingen transkription finns: gå in i FRÅGEGENERERINGSLÄGE.
- Om anteckningar eller transkription (eller båda) är ifyllda: gå in i RAPPORTLÄGE.

TRANSKRIPTION
Om en transkription av referenssamtalet finns: den är primärkälla. Den innehåller det faktiska samtalet ord för ord. Använd den för att extrahera exakta citat, nyanser och tonfall. Rekryterarens anteckningar kompletterar med observationer som inte syns i ljud (t.ex. tvekanden, kroppsspråk vid videosamtal). Om båda finns, väg ihop dem; transkriptionen väger tyngre vid konflikt.

═══════════════════════════════════════════════════
FRÅGEGENERERINGSLÄGE
═══════════════════════════════════════════════════

UPPGIFT
Leverera 8-10 skarpa referensfrågor anpassade för just denna kandidat och rollen hen söker. Frågorna ska vara kompetensbaserade (CBI-influerade) och designade för att få referensen att berätta KONKRET om situationer, inte ge generella omdömen.

STRUKTUR PÅ FRÅGORNA
1. Två "inledande" frågor som bekräftar grundfakta och relation (hur de känner varandra, period, roll).
2. Fyra till fem KOMPETENSFRÅGOR med STAR-uppmaning — varje fråga formulerad så att referensen tvingas berätta om en faktisk situation. Ex: "Kan du beskriva en specifik situation där [kandidatens namn] hanterade ett klagomål från en gäst? Vad gjorde hen, och hur gick det?"
3. En till två frågor om utvecklingsområden och svagheter — formulerade respektfullt men direkt. Ex: "Vad skulle [kandidat] själv säga var sin största utmaning i rollen?" eller "Inom vilket område hade [kandidat] kunnat behöva mer stöd?"
4. En "framtidsfråga" — skulle referensen anställa kandidaten igen, och i så fall till vad?

ANPASSA EFTER ROLL OCH BRANSCH
Frågorna ska reflektera vad rollen FAKTISKT kräver. För en receptionist på advokatbyrå: tystnadsplikt, bemötande av krävande klienter, formell ton. För en restaurangchef: ledarskap under press, ekonomisk uppföljning, hantering av personalkonflikter. För en lokalvårdare: kvalitetsmedvetenhet, självgående arbete, hantering av oförutsedda situationer. Använd informationen i formuläret för att skräddarsy frågorna.

UNDVIK
- Allmänna frågor som "är hen pålitlig?" eller "hur är hen som person?" — de ger inget värde.
- Ledande frågor som signalerar önskat svar.
- Fler än 10 frågor totalt — referenssamtal är typiskt 20-30 minuter och måste vara fokuserade.

OUTPUT-FORMAT
Numrerad lista. Ingen inledande text om vad du gör eller varför. Direkt på frågorna. Avsluta med ett kort stycke (3-4 meningar) med praktiska råd inför samtalet: vad du ska lyssna efter, vilka röda flaggor som bör fångas upp, hur du noterar svar i realtid.

═══════════════════════════════════════════════════
RAPPORTLÄGE
═══════════════════════════════════════════════════

UPPGIFT
Förvandla rekryterarens anteckningar och/eller transkription från referenssamtalet till en strukturerad referensrapport som är klar att läggas till i kandidatens akt eller delas internt på Carotte.

STRUKTUR PÅ RAPPORTEN

**Referensens identitet och relation**
Namn, titel, arbetsgivare (om angivet). Hur länge och i vilken kapacitet har referensen arbetat med kandidaten.

**Sammanfattning**
2-3 meningar som ger snabb läsbild av rekommendationsstyrkan. Inga floskler. Konkret om vad referensen egentligen sa.

**Bekräftade styrkor**
Vad referensen lyfte fram, med konkretion från anteckningarna och/eller transkriptionen. Använd direkta citat när transkriptionen stödjer det, och indirekta citat från anteckningarna. Aldrig påståenden som inte finns i källorna.

**Utvecklingsområden**
Vad referensen identifierade som svagare områden eller utvecklingsbehov. Var ärlig — referensens uttalanden om utmaningar är ofta det mest värdefulla för Carotte att veta. Om referensen inte nämnde några: skriv det neutralt.

**Övriga noteringar**
Allt annat relevant: tonläget i samtalet (entusiastiskt, neutralt, reserverat), eventuella tvekanden, om referensen kände sig fri att tala öppet, etc.

**Rekryterarens bedömning av referensen**
En kort avslutande rad där rekryteraren själv bedömer referensens trovärdighet och samtalets kvalitet. Om anteckningarna inte ger underlag för detta: skippa avsnittet.

REGLER
- Hitta aldrig på. Om en kategori inte täcks av anteckningarna: skriv kort att informationen inte täcktes, hellre än att fylla i.
- Bevara nyanser från anteckningarna. Om referensen var lite tveksam på en punkt: säg det. Glätta inte.
- Använd inte ord som "exceptionell", "enastående", "i absolut framkant" om de inte finns i anteckningarna.
- Tonen är saklig och dokumenterande, inte säljande.
- Inga bindestreck eller tankstreck i AI-stil. Använd vanlig svensk skiljeteckenstil.

═══════════════════════════════════════════════════
ALLMÄNT
═══════════════════════════════════════════════════

Kommunicera alltid på svenska. Inga inledande artigheter ("Tack för informationen..." etc.) — gå direkt på leveransen. Leverera direkt utan att förklara vad du gör.`

härefter på nytt avstå från tillsvidareanställning enligt denna

I huvudregel gäller, likt gällande rätt avseende särskild 
visstidsanställning och vikariat, vid omvandling att 
anställningsvillkoren kvarstår oförändrade om inte arbetsgivaren

parterna inte kommit överens och sysselsättningsgraden kort före 
omvandlingstidpunkten i väsentlig mån avviker från en 
genomsnittligt beräknad sysselsättningsgrad under de senaste

2.5 Prövotid 
2.5.1 Prövotid vid vikariat och avtalad visstid för interna 
tjänstemän och entreprenadtjänstemän alternativt 
projektkonsulter
Ett vikariat eller en avtalad visstid kan bringas att upphöra genom 
att arbetsgivaren eller tjänstemannen lämnar underrättelse därom. 
Anställningen upphör då en månad efter det att någondera parten 
skriftligen underrättat motparten om sin avsikt att avbryta 
anställningen. Möjligheten att genom underrättelse bringa 
anställningen att upphöra gäller endast fram till den tidpunkt då 
tjänstemannen har en sammanlagd anställningstid om sex 
månader vid företaget. När ett avtal om en avtalad visstid eller ett 
vikariat har föregåtts av en provanställning i liknande befattning i 
företaget minskas prövotiden i motsvarande grad.
Om vikariatet eller den avtalade visstidsanställningen upphör att 
gälla genom underrättelse från arbetsgivaren, ska arbetsgivaren 
motivera sitt ställningstagande om tjänstemannen begär det.
Anmärkning:
Arbetsgivaren och tjänstemannen kan skriftligen överenskomma 
om att ett vikariat eller en avtalad visstid inte av någondera 
parten kan bringas att upphöra genom underrättelse.
2.5.2 Prövotid vid tidsbegränsade anställningar för 
uppdragskonsulter 
Tidsbegränsad anställning kan bringas att upphöra före den tid 
som avsetts vid anställningstillfället genom att arbetsgivare eller 
tjänstemannen lämnar skriftlig underrättelse. Sådan anställning 
upphör två veckor efter det att någondera parten lämnat skriftlig 
underrättelse till den andra parten. Från arbetsgivarens sida får 
sådan underrättelse inte lämnas efter det att sex månader förflutit 
från anställningens tillträdande. När ett avtal om en tidsbegränsad 
anställning enligt 2.3 har föregåtts av en provanställning i 
liknande befattning i företaget minskas prövotiden i motsvarande 
grad.

Arbetsgivaren och tjänstemannen kan skriftligen överenskomma 
om att den tidsbegränsade anställningen inte av någondera 
parten kan bringas att upphöra genom underrättelse.

§ 3 Allmänna förhållningsregler
3.1 Lojalitet 
Förhållandet mellan arbetsgivare och tjänstemän grundar sig på 
ömsesidig lojalitet och ömsesidigt förtroende. Tjänstemannen ska 
vara diskret när det gäller såväl arbetsgivarens som 
kundföretagets affärsangelägenheter som prissättningar, 
datasystem, undersökningar, driftsförhållanden och dylikt.
3.2 Konkurrerande verksamhet 
En tjänsteman får inte utföra arbete eller direkt eller indirekt 
bedriva ekonomisk verksamhet för ett företag som konkurrerar 
med arbetsgivaren. Tjänstemannen får inte heller åta sig uppdrag 
eller bedriva verksamhet som kan inverka menligt på arbetet i 
tjänsten. Den som avser att åta sig uppdrag, annan bisyssla av 
mera omfattande slag eller bedriva verksamhet som kan 
konkurrera med kundföretaget ska därför först samråda med 
arbetsgivaren. 
3.3 Förtroendeuppdrag
En tjänsteman har rätt att ta emot statliga, kommunala och 
fackliga förtroendeuppdrag.

§ 7 Beredskapstjänst 
7.1 Definition 
Med beredskap avses tid då tjänstemannen inte har 
arbetsskyldighet men måste vara anträffbar för att kunna 
utföra arbete när det uppstår ett behov.
Anmärkning:
Med beredskapstjänst avses inte tid då uppdragskonsult saknar 
uppdrag men finns tillgänglig för besked om nytt uppdrag.
7.2 Lokala avtal 
De lokala parterna kan träffa överenskommelse om beredskap där 
till exempel beredskapstjänster och ersättningsformer anpassas 
efter lokala förutsättningar.

7.3 Beredskapstjänst
Beredskapstjänst A innebär att tjänstemannen via ett mobilt 
verktyg eller liknande ska vara anträffbar för att inställa sig i

inställa sig på någon angiven plats. 
Beredskapstjänst B innebär att tjänstemannen ska inställa sig på 
arbetsstället eller av arbetsgivaren annan angiven plats för att 
utföra arbete.
Beredskapstjänst C innebär att tjänstemannen ska inställa sig i 
hemmet för att utföra arbete.

plats. Ersättning utgår dock enligt beredskapstjänst C.

§ 8 Restidsersättning
8.1 Rätten till restidsersättning
Tjänstemän har rätt till restidsersättning enligt 8.3 med följande 
undantag: 
1 Arbetsgivaren och den tjänsteman som har träffat 
överenskommelse om kompensation för övertid enligt 
4.4, kan komma överens om att bestämmelserna om 
restidsersättning inte ska gälla.
2 Arbetsgivare och tjänstemän kan komma överens om att 
kompensation för restid ska ges i annan form, t ex genom 
att förekomsten av restid beaktas när lönen fastställs.
3 Tjänstemän med arbete som normalt medför tjänsteresor i 
betydande omfattning, har rätt till restidsersättning endast 
om arbetsgivaren och tjänstemannen kommit överens om 
detta. 
8.2 Restid 
Restid är den tid under en beordrad tjänsteresa som går åt för att 
resa till bestämmelseorten.
För uppdragskonsult ska inte resor till och från kunduppdrag, som 
ligger inom tjänstemannens uppdragsområde, utgöra restid enligt 
denna paragraf. 
För tjänsteman med entreprenaduppdrag alternativt 
projektuppdrag ska inte resor till och från kundföretag som 
utgör tjänstemannens fasta tjänstgöringsställe, utgöra restid 
enligt denna paragraf. 
Vid beräkning av restid som ger rätt till ersättning tas endast 
sådan restid med som ligger före eller efter tjänstemannens 
ordinarie arbetstid. 
Om restiden ligger såväl före som efter den ordinarie arbetstiden 
en viss dag ska de båda tidsperioderna räknas ihop. Endast fulla 
halvtimmar tas med vid beräkningen.

§ 9 Semester 
9.1 Allmänna bestämmelser
Semester utgår enligt gällande lag med följande tillägg och 
undantag. 
9.2 Intjänandeår och semesterår
Intjänandeåret räknas fr o m den 1 april t o m den 31 mars året 
därpå.
Semesteråret är den därpå följande 12-månadersperioden.
Arbetsgivaren kan komma överens med en enskild tjänsteman 
eller med den lokala tjänstemannaparten om att intjänandeåret 
och/eller semesteråret ska förskjutas till andra tidpunkter eller 
sammanfalla helt. 
När intjänandeår och semesterår sammanfaller ska erhållen 
semesterlön betraktas som à-contoutbetalning och avräknas från 
såväl semesterersättning som lön. Tjänsteman som erhållit fler 
betalda semesterdagar än intjänade ska återbetala för mycket 
utbetald semesterlön/tillägg. Motsvarande lönekorrigering görs 
om sysselsättningsgraden ändrats under semesteråret.
Löneavräkning ska inte göras vid anställningens upphörande om 
det sker på grund av;
1. tjänstemannens sjukdom eller
2. tjänsteman som frånträder sin anställning under förhållanden 
som avses i 4 § tredje stycket första meningen i lagen om 
anställningsskydd eller
3. uppsägning från arbetsgivarens sida, som beror på förhållande 
som inte hänför sig till tjänstemannen personligen. 
Anmärkning 
Det är viktigt att arbetsgivaren är tydlig med vilket intjänande- och semesterår som tillämpas.

Den tjänsteman som blir sjuk och därför inte kan tjänstgöra ska

tjänstemannen skulle ha arbetat.

Arbetsgivaren beslutar om förläggning av en ledig dag.

§ 1 Avtalets omfattning 
1.1 Tillämpningsområde
Detta avtal gäller tjänstemän som omfattas av Bemanningsavtalet. 
Dessa tjänstemän undantas från tillämpningen av arbetstidslagen 
(SFS 1982:673) i sin helhet. 
Parterna är eniga om att detta avtal ligger inom ramen för rådets 
direktiv 2003/88/EG som syftar till att bereda arbetstagarna 
säkerhet och hälsa vid arbetstidens förläggning.
Med begreppet tjänstemannaklubb i detta avtal avses den lokala 
fackliga organisationen. 
1.2 Undantag 
Bestämmelserna i §§ 2 – 5 gäller ej för tjänstemän som utför 
arbete under sådana förhållanden att det inte kan anses som 
arbetsgivarens skyldighet att vaka över hur arbetet är anordnat 
eller har förtroendet att själva disponera sin arbetstid.
1.3 Individuellt överenskomna undantag
Tjänstemän, som träffar överenskommelse om att kompensation 
för övertidsarbete ska ersättas med längre semester och/eller 
högre lön, kan träffa överenskommelse om att de ska vara 
undantaga från tillämpningen av 2 – 5 §§ i detta avtal 
(bestämmelser om ordinarie arbetstid, övertid, jourtid samt 
anteckningar om övertid och jourtid). 
§ 2 Ordinarie arbetstid 
2.1 Längd och begränsningsperiod
Den ordinarie arbetstiden får inte överstiga 40 timmar i 
genomsnitt per helgfri vecka under en begränsningsperiod om tre 
månader.
För tjänstemän i intermittent treskiftarbete får den ordinarie 
arbetstiden inte överstiga 38 timmar i genomsnitt per helgfri 
vecka och år.

[Sida 66]

För tjänstemän i kontinuerligt treskiftarbete får den ordinarie 
arbetstiden inte överstiga 36 timmar i genomsnitt per helgfri 
vecka och år.
2.2 Överenskommelse om annan begränsningsperiod
Lokal överenskommelse
Skriftlig överenskommelse om en begränsningsperiod om högst 
tolv månader kan träffas mellan arbetsgivaren och 
tjänstemannaklubben. En sådan överenskommelse kan gälla för 
en enskild tjänsteman eller för en grupp av tjänstemän. 
Uppsägning av sådan överenskommelse ska göras minst tre 
månader före giltighetstidens utgång.
Enskild överenskommelse
Arbetsgivaren och den enskilde tjänstemannen kan när det 
föreligger särskilda omständigheter träffa överenskommelse om 
en begränsningsperiod om högst fyra månader eller om annan 
omfattning av den ordinarie arbetstiden. Om begräns- ningsperioden bestäms till längre tid än två månader får en sådan 
enskild överenskommelse sägas upp en månad före 
begränsningsperiodens utgång. 
Anmärkning:
De centrala parterna är ense om att det är möjligt att tillämpa 
olika lång arbetstid under olika delar av året.
2.3 Arbetstidens förläggning
Vid arbetstidens förläggning ska hänsyn tas såväl till 
verksamhetens behov som till tjänstemannens behov och 
önskemål. Inriktningen ska vara att så långt möjligt beakta 
tjänstemannens möjligheter att förena arbete med familjeliv och 
socialt liv i övrigt. 
Den enskilde tjänstemannen har rätt att få sina önskemål om 
arbetstidens längd och förläggning prövade av arbetsgivaren. Om 
tjänstemannens önskemål inte kan tillgodoses ska arbetsgivaren 
på begäran ange skälen för detta. Den enskilde tjänstemannens 
önskemål ska även vägas mot andra tjänstemäns behov och 
önskemål.

Vid ändring av tjänstemannens arbetstid ska arbetsgivaren 
informera tjänstemannen inom en månad innan ändringen 
genomförs.
2.3.1 Arbetstidsförläggning för uppdragskonsulter
För uppdragskonsult förläggs den ordinarie arbetstiden enligt 
respektive uppdrag. Besked om arbetstidens förläggning ska ske i 
så god tid som möjligt.
§ 3 Övertid
3.1 Övertidsarbete
Med övertidsarbete avses arbete som har utförts utöver den 
ordinarie arbetstiden för tjänstemannen om
övertidsarbetet har beordrats på förhand eller
övertidsarbetet har godkänts i efterhand av arbetsgivaren.
Som övertidsarbete räknas inte den tid som går åt för att utföra 
nödvändigt förberedelse- och avslutningsarbete som normalt 
ingår i tjänstemannens arbete.
Vid beräkning av fullgjord övertid tas endast fulla halvtimmar 
med.
Om övertidsarbetet har utförts såväl före som efter den ordinarie 
arbetstiden en viss dag, ska de båda övertidsperioderna räknas 
ihop.
Arbete som deltidsanställd utför utöver sin ordinarie arbetstid upp 
till dagligt arbetstidsmått för heltidsanställd tjänsteman räknas 
inte av från övertidsutrymmet.
Enskild överenskommelse om annan begränsningsperiod
Arbetsgivare och tjänsteman kan träffa överenskommelse om att 
övertiden ska beräknas efter en annan begränsningsperiod. 
Ersättning för övertid ska då utgå såsom vid ”övertidsarbete på 
annan tid” enligt Bemanningsavtalet. En sådan enskild 
överenskommelse gäller tills vidare med tre månaders 
uppsägningstid.

[Sida 68]
66 
3.2 Allmän övertid
När det finns särskilda behov får allmän övertid tas ut med högst 
200 timmar per kalenderår. Vid beräkning av övertid ska ledighet 
som förläggs till arbetstagarens ordinarie arbetstid eller jourtid 
likställas med fullgjord arbetstid.
3.3 Återföring av övertid
Om övertidsarbete ersätts med kompensationsledighet enligt 
Bemanningsavtalet återförs motsvarande antal timmar till 
övertidsutrymmet enligt 3.2 ovan (allmän övertid).
Under kalenderåret får högst 100 timmar på detta sätt återföras 
till övertidsutrymmet, såvida inte arbetsgivaren och 
tjänstemannaklubben enas om annat.
Exempel: 
En tjänsteman utför övertidsarbete, fyra timmar, en vardagskväll. 
Dessa övertidstimmar räknas av från övertidsutrymmet enligt 3.2. 
Överenskommelse träffas om att tjänstemannen ska kompenseras
med ledig tid (kompensationsledighet) under sex timmar (4 
timmar x 1,5 tim = sex timmar kompensationsledighet). 
När kompensationsledigheten har tagits ut återförs de fyra 
övertidstimmarna som har kompenserats genom ledigheten till 
övertidsutrymmet enligt 3.2.
3.4 Extra övertid
Utöver vad som sagts ovan kan, när det finns synnerliga skäl, 
extra övertid tas ut under kalenderåret med högst 100 timmar 
efter överenskommelse mellan arbetsgivaren och 
tjänstemannaklubben.
3.5 Nödfall
Om en natur- eller olyckshändelse eller någon annan därmed 
jämförlig omständlighet, som inte kunnat förutses, vållat avbrott i 
verksamheten eller medfört överhängande fara för sådant avbrott 
eller skada på liv, hälsa eller egendom, ska övertid som fullgjorts 
med anledning därav inte beaktas vid beräkning av övertid enligt 
3.2 (allmän övertid) och 3.4 ovan (extra övertid).

§ 4 Jourtid 
4.1 Omfattning av jourtid 
Om det på grund av verksamhetens natur är nödvändigt att 
tjänstemannen står till arbetsgivarens förfogande på arbetsstället 
för att utföra arbete när det uppstår behov, får jourtid tas ut med 
högst 48 timmar under en tid av fyra veckor eller 50 timmar 
under en kalendermånad. Som jourtid anses inte tid då 
tjänstemannen utför arbete för arbetsgivarens räkning.
4.2 Lokal överenskommelse om annan begränsnings- period 
Arbetsgivaren och tjänstemannaklubben kan träffa en skriftlig 
överenskommelse om annan begränsningsperiod av jourtid för en 
viss tjänsteman eller grupp av tjänstemän.
En överenskommelse enligt föregående stycke gäller tills vidare 
med tre månaders uppsägningstid.
§ 5 Anteckning av övertid och jourtid
Arbetsgivaren ska föra de anteckningar som krävs för beräkning 
av övertid enligt § 3 och jourtid enligt § 4. Tjänstemannen, 
tjänstemannaklubben eller representanter för den centrala 
arbetstagarparten har rätt att ta del av dessa anteckningar.
Anmärkning:
Även för tjänstemän som är undantagna från §§ 2-5 är det av 
ömsesidigt intresse för arbetsgivaren och tjänstemannaklubben 
att ha en uppgift om den totala arbetstidens omfattning för dessa 
tjänstemän.
Tjänstemannen bör fortlöpande lämna uppgift om arbetstidens 
omfattning till arbetsgivaren. Detta ska ske på sådant sätt som 
tjänstemannen och arbetsgivaren finner lämpligt. Om 
tjänstemannaklubben så begär ska denna få del av dessa 
uppgifter. 
§ 6 Sammanlagd arbetstid 
Den sammanlagda arbetstiden får uppgå till högst 48 timmar i 
genomsnitt per vecka under en begränsningsperiod om fyra 
månader.

Beräkningsperioder längre än fyra månader förutsätter att berörda 
arbetstagare kompenseras med ledighet eller ges lämpligt skydd.
Vid beräkning av den sammanlagda arbetstiden ska semester och 
sjukfrånvaro under tid då arbetstagaren annars skulle ha arbetat

I den sammanlagda arbetstiden ingår ordinarie arbetstid, övertid

Med natt avses en period om minst sju timmar som omfattar

Arbetstiden för nattarbetande tjänstemän får under varje period

Nattarbetande vars arbete innebär särskilda risker eller stor fysisk

§ 8 Rast och måltidsuppehåll
8.1 Rast 
När arbetsdagen är längre än fem timmar har tjänstemannen rätt 
till rast. 
Avvikelse får göras genom lokal överenskommelse. Sådan 
avvikelse förutsätter att berörda tjänstemän kompenseras med 
ledighet eller ges lämpligt skydd. 
Arbetsgivaren ska på förhand ange rasternas längd och 
förläggning så noga som omständigheterna medger.
Rasternas antal, längd och förläggning ska vara tillfredsställande 
med hänsyn till arbetsförhållandena. Under rast har 
tjänstemannen rätt att lämna arbetsplatsen eftersom rasten inte är 
betald arbetstid. 
Anmärkning:
En god arbetsmiljö förutsätter att det, utöver rasterna, är möjligt 
att ta pauser under arbetsdagen. 
8.2 Måltidsuppehåll
Rast får bytas mot måltidsuppehåll på arbetsplatsen om det är 
nödvändigt med hänsyn till arbetsförhållandena eller med hänsyn 
till sjukdomsfall eller annan händelse som inte har kunnat 
förutses av arbetsgivaren. Sådant måltidsuppehåll räknas in i 
arbetstiden. 
§ 9 Vila 
9.1 Dygnsvila 
Tjänstemannen ska beredas minst elva timmars sammanhängande 
vila per 24-timmarsperiod. Vila bör vara förlagd till natt, varvid 
avses att perioden kl 00 – 05 ska ingå.
Avvikelse får göras tillfälligtvis, om det föranleds av något 
särskilt förhållande som inte har kunnat förutses av arbetsgivaren, 
under förutsättning att tjänstemannen kompenseras med 
motsvarande ledighet.

Avvikelse får även göras genom lokal överenskommelse, under 
förutsättning att tjänstemannen kompenseras med ledighet eller 
ges lämpligt skydd.

Avvikelse från dygnsvilan förutsätter att tjänstemannen ges 
förlängd viloperiod timme mot timme svarande mot avvikelsen. 
Den förlängda viloperioden ska om möjligt förläggas i anslutning 
till det arbetspass som avbrutit viloperioden. 
Om arbetsgivaren beslutar att förlägga motsvarande viloperiod

9.2 Veckovila 
Tjänstemannen ska beredas minst 36 timmars sammanhängande

Avvikelse får göras tillfälligtvis, om det föranleds av något 
särskilt förhållande som inte har kunnat förutses av arbetsgivaren, 
under förutsättning att tjänstemannen kompenseras med 
motsvarande ledighet. Ledigheten ska om möjligt förläggas till 
veckoslut. 
I lokal överenskommelse kan bestämmas att vilan ska beräknas 
som ett genomsnitt under en period om två veckor. 
Annan avvikelse från första stycket får göras genom lokal 
överenskommelse, under förutsättning att tjänstemannen 
kompenseras med ledighet eller ges lämpligt skydd. 
Om arbetsgivaren beslutar att förlägga motsvarande viloperiod 
till arbetstid ska löneavdrag ej göras.

Bilaga 4 
Avtal om förhandlingsordning vid rättstvister
Omfattning 
Förhandlingsordningen omfattar samtliga tjänstemän som är 
anställda i företag som är bundna av kollektivavtal om allmänna 
anställningsvillkor med undantag för tjänstemän som med hänsyn 
till arbetsuppgifter och anställningsvillkor får anses ha 
företagsledande eller därmed jämförlig ställning.
Förhandlingspreskription
Om en part vill yrka skadestånd eller annan fullgörelse enligt lag, 
kollektivavtal eller enligt enskilt avtal, ska parten, om inte annan 
ordning anges i det aktuella kollektivavtalet, begära förhandling 
inom fyra månader från det parten fått kännedom om den 
omständighet som anspråket grundas på. Förhandlingen måste 
dock begäras senast två år efter det att denna omständighet 
inträffat. 
Om en part inte begär förhandling inom föreskriven tid, förlorar 
parten rätten till förhandling.
Anmärkning 
Parterna är överens om att samtliga tvister där 
anställningsförhållandet ingår som en nödvändig förutsättning 
för ett rättsanspråk omfattas av förhandlingsordningen. 
Arbetsgivare som avser att rikta rättsliga anspråk på 
kollektivavtalsbunden organisation eller medlem där 
anställningsförhållandet utgjort en nödvändig förutsättning 
måste först iaktta förhandlingsordningen.
Enskild tjänsteman har möjlighet att välja att väcka talan utan 
föregående förhandling enligt förhandlingsordning eller utan att 
fullfölja i central förhandling enligt förhandlingsordningen.
Om en tvistefråga grundar sig på lagen om anställningsskydd, 
eller grundar sig på fråga enligt kollektivavtalad 
anställningsform, ska lagen om anställningsskydds tidsfrister 
gälla i stället för fristerna i denna förhandlingsordning med de

[Sida 88]

tillägg som framkommer i det följande avseende frister som ska 
iakttas mellan lokal och central förhandling.
Lokal förhandling
En förhandling ska i första hand fullgöras mellan de lokala 
parterna (arbetsgivaren och den lokala fackliga organisationen). 
Förhandlingen ska påbörjas snarast möjligt och senast inom två 
veckor från den dag då förhandlingsbegäran bekräftats, om inte 
parterna har kommit överens om annat.
Central förhandling
Efter avslutad lokal förhandling ska den part som påkallat den 
lokala förhandlingen och som vill fullfölja ärendet hänskjuta 
frågan till central förhandling.
Begäran om central förhandling ska vara skriftlig och göras hos 
motpartens organisation inom följande tider från den dag då den 
lokala förhandlingen avslutats;
1. inom två veckor vid tvisteförhandling som gäller rättstvist om 
ogiltigförklaring av en uppsägning eller ett avskedande eller 
förklaring att visstidsanställning är otillåten och att 
anställningen ska gälla tills vidare och
2. inom två månader i övriga rättstvister
Försummas detta förlorar parten rätten till förhandling.
Central förhandling ska påbörjas snarast möjligt och senast inom 
två veckor från den dag då förhandlingsbegäran bekräftats, om 
inte parterna har kommit överens om annat.
Rättsligt avgörande
Om en rättstvist som rör lag, kollektivavtal eller enskilt avtal har 
varit föremål för central förhandling utan att kunna lösas, får part 
hänskjuta tvisten till rättsligt avgörande inom tre månader från

Bilaga 5 
Avtal om kompetensutveckling 
1 Inriktning 
Konkurrensförmågan hos företagen inom tjänstesektorn är allt 
mer beroende av kvalificerade medarbetare. För att verksamheten 
ska utvecklas är det viktigt med en kontinuerlig och planerad 
kompetensutveckling av medarbetarna. 
Kompetens är förmågan att klara av en uppgift. För att klara 
uppgiften behövs flera egenskaper hos individen.
Kompetens är ett komplext begrepp som innebär en mångfald av 
de mänskliga resurserna. - Kunskaper 
Veta fakta och kunna metoder - Färdigheter
Kunna göra, hantera verktyg
- Kontakter 
Social förmåga, kontaktnät, inflytande
- Attityder/värdering
Vilja göra, anse riktigt, ta ansvar
- Erfarenheter 
Lära av misstag och framgång
- Handledning/Ledarskap 
Utvecklingen kan i hög grad ske direkt på arbetsplatsen genom en 
flexibel och stimulerande arbetsorganisation där teori och praktik 
blandas. 
En fortlöpande utveckling av företag och medarbetare skapar 
förutsättningar för lönsamhet och tryggare anställning.
Den planerade kompetensutvecklingen ska ske utöver den 
kompetensutveckling som sker i samband med uppdrag hos 
kundföretag.

[Sida 91]
89 
2. Rätt och ansvar
Alla medarbetare har såväl rätt till som eget ansvar för att kontinuerligt utvecklas i arbetet. Företaget ska skapa förutsättningar 
för detta. Kvinnor och män ska ges samma möjlighet till 
kompetensutveckling. 
Med kompetensutveckling menas alla åtgärder som bidrar till att 
öka en eller flera delar av individernas kompetens. För att 
kompetensutveckling ska vara möjlig krävs att goda 
förutsättningar finns vad gäller t ex arbetsorganisation, ledarskap 
och teknik. 
3. Kompetensutveckling i samverkan 
Utformningen av kompetensutvecklingen är en ledningsuppgift. 
Kompetensutveckling utgår från en långsiktig verksamhetsanalys, 
genomförd av företaget efter samråd med den lokala fackliga 
representanten i företaget. I analysen förutsätts varje 
medarbetares medverkan och engagemang. 
Planer för kompetensutveckling utformas och följs upp 
kontinuerligt med hänsyn till konkurrens- och 
omvärldssituationen.
Kartläggningen av den enskilde medarbetarens utvecklingsbehov 
och planeringen av de åtgärder som är lämpliga sker i samverkan 
med medarbetaren. 
Utvecklingssamtal och arbetsplatsträffar ska ligga till grund för 
planering av kompetensutvecklingen. 
4. Kostnader 
Av arbetsgivaren beordrad kompetensutveckling och i 
utvecklingssamtal överenskommen kompetensutveckling 
betraktas som arbete och ska ersättas enligt gällande

Verksamheten med uppdragskonsulter inom 
bemanningsbranschen är beroende av att företagen kan boka ut de 
anställda hos kundföretag. En hög utbokningsgrad är den enskilt 
viktigaste faktorn för företagets lönsamhet. För tjänstemännen är 
det avgörande för anställningstryggheten att de företag de arbetar 
vid är lönsamma. Det finns därför ett gemensamt intresse för 
anställda i företag anslutna till Kompetensföretagen att öka 
utbokningsgraden. Detta gäller inte bara de tjänstemän som 
arbetar i uppdragsverksamheten utan också övriga anställda i 
företaget. 
För att utbokning ska kunna ske av redan anställd personal är det 
också av avgörande betydelse att de anställda har den kompetens 
som efterfrågas. För uppdragskonsulter är det därför av stor vikt 
att de ständigt utvecklar sin kompetens. 
De lokala parterna ska gemensamt finna former för en samverkan 
för att nå en så hög utbokningsgrad som möjligt. För detta 
ändamål ska de lokala parterna på sätt som de finner lämpligt 
bilda samverkansgrupper. 
Samverkansgruppen ska: - verka för en hög utbokningsgrad
- utreda och föreslå åtgärder som ökar 
utbokningsgraden - utreda och föreslå åtgärder för en breddad kompetens
- särskilt bevaka vilka åtgärder som behövs för de som 
har en låg utbokningsgrad - informera anställda om vad de kan göra för att öka sin 
egen och andras utbokningsgrad. 
Samverkansgrupper kan vara företagsövergripande och/eller 
lokal. Grupperna kan bildas för en ort eller för tjänstemän med 
samma typ av uppdrag. De lokala parterna ska gemensamt finna 
lämpliga former för sin samverkan.

Alla medarbetare bidrar till tillväxten i ett företag. En för- utsättning för en framgångsrik verksamhet i företaget är en 
värdefull och engagerad insats av medarbetare på alla nivåer i

Lönebildningen ska vara en positiv kraft i företagets verksamhet 
och skapa förutsättningar för att individer utvecklas och 
stimuleras till goda insatser. Härigenom kan lönebildningen bidra 
till ökad produktivitet, effektivitet och lönsamhet. För att 
möjliggöra en positiv löneutveckling och trygghet i anställningen 
fordras att alla medarbetare bidrar genom en aktiv medverkan i 
företagens förändringsarbete. 
Medarbetarens utbildning och kompetensutveckling är en 
betydelsefull del av företagets långsiktiga planering och 
produktivitetsutveckling samt utgör ett led i utvecklingen av 
arbetsprocesser och medarbetare. Det är därför angeläget att alla 
medarbetare aktivt medverkar i sin utbildning och utveckling. 
Ett förtroendefullt samarbete mellan chef och medarbetare är av 
stor betydelse för lönebildningen och för medarbetarnas 
personliga utveckling.

Bilaga 7 
Parternas gemensamma uttalande för en 
attraktivare städbransch
Det är parternas gemensamma uppfattning att förläggningen av 
arbetstiden är en avgörande faktor för en attraktivare bransch. 
Genom förläggningen av arbetstiden möjliggörs en god 
arbetsmiljö och förebygger arbetskriminalitet i branschen. 
Städning som sker under normal kontorstid minskar förekomsten 
av delade skift, ökar möjligheten till heltidsanställningar, 
underlättar integration, skapar större trygghet för de anställda och 
ger en förbättrad arbetsmiljö.
För personer av annan etnisk härkomst än svensk är städyrket ofta 
en väg in på arbetsmarknaden. Därför har städbranschen en viktig 
roll att fylla när det gäller de utlandsföddas integration i 
samhället. Städning på dagtid underlättar integrationen genom att 
möjliggöra personliga möten vilket understödjer språkinlärning 
och kompetensutveckling. 
Majoriteten av de anställda är kvinnor. Att förlägga arbetet på 
dagtid skapar större trygghet i resandet till och från arbetet. 
Städning på dagtid underlättar även för de anställda att kombinera 
yrkesliv med fritid och familjeliv. 
Erfarenheten inom branschen visar att städning dagtid påverkar 
kvaliteten på städtjänsterna och förbättrar förhållandet mellan 
kund och leverantör på ett positivt sätt.
Dagstädning, heltidsanställningar och sammanhängande skift är 
ett centralt instrument på vägen mot förbättrade arbetsvillkor för 
städare. Städning på dagtid synliggör städarens arbete vilket ökar 
den sociala medvetenheten om branschen och dess relevans för
samhället.
Att erbjuda arbete på dagtid, heltidsanställning och 
sammanhängande skift kan hjälpa till att övervinna den växande 
personalbristen och höja yrkets attraktivitet. Det möjliggör för 
den anställde att kunna försörja sig och att kunna kombinera 
arbete med fritid och familjeliv. Det skulle höja attraktiviteten i 
branschen, minska svårigheter att rekrytera och medföra minskad 
personalomsättning.

Parterna är överens om att införa introduktionsanställning som en 
bilaga i branschavtalet Serviceentreprenad med 
Fastighetsanställdas förbund och Seko.
§ 1 Avtalets syfte
Servicebranschen är en integrationsmotor och en bransch som 
delvis lider av kompetensbrist varpå behovet av nya medarbetare 
är stort. Syftet med avtalet är att säkra servicebranschens 
kompetensförsörjningsbehov och ge en möjlighet till 
färdighetsträning och höjd kompetens, utveckla yrkesrollerna för 
de anställda i servicebranschen samt att stärka branschen i dess 
helhet. Introduktionsanställning ska leda fram till ny välutbildad 
arbetskraft och bidra till utveckling av företagen och branschen 
som sådan.
Syftet med introduktionsanställningen är att det ska leda till en 
tillsvidareanställning. 
§ 2 Förutsättningar
Avtal om introduktionsanställning kan tillämpas av arbetsgivare 
anslutna till Almega Tjänsteförbunden, Serviceföretagen, som är 
bundna av Serviceentreprenadavtalet. Avtalet kan tillämpas vid 
anställning av medarbetare som har max 6 månaders tidigare 
erfarenhet från städbranschen. 
Om en arbetsgivare har genomfört uppsägningar på grund av 
arbetsbrist, får introduktionsanställning inte användas på samma 
driftsenhet och inom samma avtalsområde förrän 6 månader har 
passerat sedan uppsägningarna.
I ett led att sträva efter förbättrade arbetsvillkor och göra 
städbranschen mer attraktiv så är heltidsanställningar och 
sammanhängande skift önskvärt. Sysselsättningsgraden kan vara 
på deltid men som lägst på en sysselsättningsgrad om 77,5%, om 
lokala parter inte kommer överens om annat.

Arbetsgivare eller anställd kan avbryta en 
introduktionsanställning i förtid. Vill endera part avbryta

§ 7 Introduktionsanställningens innehåll
Hela anställningen är en introduktion för arbeten i branschen där 
den anställde utför de arbetsuppgifter som finns på arbetsplatsen 
inom ramen för yrket. Introduktionen bör också innehålla 
färdighetsträning genom att den anställdes arbetsuppgifter ska 
vara varierande och utmanande. 
Inför introduktionsanställningen ska arbetsgivaren göra en 
övergripande kompetenskartläggning för att identifiera lämpligt 
utbildningsbehov vilket sedermera kan komma att omprövas 
under introduktionsanställningens gång och vartefter behovet 
förändras. Kompetenskartläggning omsätts i en utbildningsplan. 
Utbildningsplanen ska innehålla SRY, eller motsvarande, samt 
möjlighet till språkutveckling (SFI eller annan språkutbildning i 
svenska) i de fall där bedömningen är att det behövs. 
Utbildningen görs under arbetstid. 
Kompetenskartläggningen bör redovisas i samband med den 
lokala förhandlingen.
§ 8 Handledare
Företaget ska i huvudsak utse en handledare till den 
introduktionsanställde. Handledaren erhåller ett handledartillägg 
om 57 kr/dag för de tillfällen då handledning behövs. Varje 
handledare kan handleda tre introduktionsanställda samtidigt om 
inte annat överenskommes. 
Handledartillägget räknas upp, som övriga tillägg, vid 
lönerevisionstidpunkten för Serviceentreprenadavtalet, tidigast 
från och med 1 juni 2027.
§ 9 Tjänstgöringsintyg
Efter genomgången introduktionsanställning ska 
tjänstgöringsintyg utfärdas som innefattar uppgift om 
anställningstid, vilka arbetsuppgifter den anställde har haft samt 
vilka utbildningsinsatser som den anställde har deltagit i. Intyget 
ska innehålla vitsord om den introduktionsanställde så önskar det. 
§ 10 Lokal facklig förhandling och facklig information
Innan införandet av introduktionsanställningar ska Företaget 
förhandla med lokal facklig organisation. Förhandlingen bör ske

Lokala parter kan komma överens om att få tillämpa avtalet för

§ 3 Anställning
Mom 1 Anställningsformer
Istället för 5 och 6 §§ i lagen om anställningsskydd gäller följande:
Anställning gäller tillsvidare om inte annat avtalats enligt nedanstående: 
Arbetsgivaren och arbetstagaren kan träffa överenskommelse om 
anställning för viss tid. Sådant anställningsavtal ska vara skriftligt och får 
inte överstiga 6 månader, men kan uppgå till 12 månader om det godkänns 
av den lokala arbetstagarorganisationen. 
Ny visstidsanställning, enligt ovan, kan träffas efter 6 månader från det att 
senaste visstidsanställningen slutade eller tidigare efter lokal 
överenskommelse. 
Överenskommelse om visstidsanställning kan träffas med den som är 
studerande och med avtals- och ålderspensionär. Studerande ska skriftligen 
ha styrkt att de är studerande.
Om arbetstagare särskilt begär det kan anställning på viss tid ske för att 
erbjuda möjlighet till återkommande korta anställningar. Detta avser 
arbetstagare med annan huvudsaklig sysselsättning som önskar tillfälligt 
extraarbete.
Anmärkning:
Om den fackliga organisationen anser att missbruk av denna bestämmelse 
sker, äger den påkalla lokal respektive central förhandling i ärendet. Löses 
ej tvisten erfordras i fortsättningen överenskommelse med lokal facklig 
organisation omfattande det företag som tvisten gäller.
Att den som beviljats sjukersättning – oavsett omfattning på sjukersättning – kan komma ifråga för anställning enligt sjätte stycket (annan 
huvudsaklig sysselsättning) framgår av tolkningsöverenskommelse i 
Bilaga 5. 
Visstidsanställning kan avbrytas i förtid med en ömsesidig uppsägningstid 
om 14 dagar.

anställningsbevis kompletterat med särskilt intyg som styrker annan

Mom 4 Återkommande kortare anställningar
De företag som har många korta visstidsanställningar kan istället för att

1. I samband med att avtal om anställningsvillkoren skrivs med den 
anställde, fastställs perioden för återkommande kortare 
visstidsanställningar. Denna period får uppgå till högst sex månader.
2. Företaget redovisar omgående till berört arbetstagarförbund det avtal om

3. Efter avtalsperiodens slut redovisar företaget till den fackliga

I samband med anställningen ska frågan om tillgänglighet fastställas 
skriftligt och regleras i anställningsbeviset. Detta ska ske med

innebär att den anställde ska vara anträffbar.

normalt rese- och pendlingsavstånd beräknat med för regionen vanligen

Tjänstgöringsområdet ska anges som ett geografiskt område genom

eller liknande. Tjänstgöringsområdet bör inte vara större än att resa från 
bemanningsföretagets kontor till arbetsplatsen blir längre än 75 km. 
Facklig organisation kan efter förhandling säga upp företagets rätt att 
fastställa tjänstgöringsområdet för de av förhandlingen berörda anställda. 
Inför förhandlingen ska hänsyn tas i varje enskilt fall till det som anses 
vara normalt rese- och pendlingsavstånd beräknat med för regionen 
vanligen fungerande transportmedel. Om överenskommelse inte kan träffas 
ska primärkommun, eller i storstadsområdena Stockholm, Göteborg samt 
Malmö, med direkt angränsande kommuner, vara tjänstgöringsområde för 
berörda anställda.

Mom 11 
De lokala parterna ska vid aktualiserad personalinskränkning värdera 
företagets krav och behov i bemanningshänseende. Om dessa behov enligt 
parternas gemensamma uppfattning inte kan tillgodoses med tillämpning 
av lag ska fastställandet av turordning ske genom avtalsturlista. 
De lokala parterna ska därvid göra ett urval av de arbetstagare som ska 
sägas upp så att företagets behov av kompetens särskilt beaktas liksom 
företagets möjligheter att bedriva konkurrenskraftig verksamhet och 
därmed bereda fortsatt anställning.
De lokala parterna kan också med avvikelse från bestämmelserna i 25 –
27 §§ anställningsskyddslagen överenskomma om turordning vid

överenskommelser.
Enas inte de lokala parterna, äger förbundsparterna, om endera begär det, 
träffa överenskommelse i enlighet med ovan angivna riktlinjer.
Det förutsätts att arbetsgivaren inför behandlingen av frågorna som här 
berörs tillhandahåller den lokala respektive den centrala avtalsparten 
relevant faktaunderlag.

Mom 12 
Om avtal om turordning vid uppsägning på grund av arbetsbrist inte kan 
träffas får arbetsgivaren vid berörd driftsenhet och avtalsområde undanta 
tre arbetstagare. De sålunda undantagna har företräde till fortsatt 
anställning.
Arbetsgivare som endast har en driftsenhet kan vid tillämpning av första 
stycket istället välja att undanta totalt fyra arbetstagare för samtliga 
avtalsområden.
Vad avser situationen att flera driftsenheter sammanlagts till en gemensam 
turordning genom tillämpning av 22 § tredje stycket 
anställningsskyddslagen, ska antal vid tillämpning av första stycket vara tre 
arbetstagare plus en arbetstagare per driftsenhet som omfattas av 
sammanläggningen utöver den första driftsenheten, per avtalsområde.
Alternativt med regleringen i första, andra och tredje stycket får en 
arbetsgivare vid berörd driftsenhet och avtalsområde undanta 15 procent av 
de anställda som slutligen får avsluta sin anställning på grund av 
arbetsbristen, innan lagturlistan fastställs. Undantag enligt detta stycke får 
högst omfatta tio procent av de anställda vid berörd driftsenhet eller 
driftsenheter, per avtalsområde.
En arbetsgivare som vid uppsägning på grund av arbetsbrist undantagit en 
eller flera arbetstagare enligt första, andra, tredje eller fjärde stycket får 
inte vid berörd driftsenhet och avtalsområde undanta ytterligare 
arbetstagare vid uppsägning som sker inom tre månader därefter.
Anmärkning
Denna bestämmelse ersätter bestämmelsen i 22 § andra stycket 
anställningsskyddslagen, dvs, det s.k. tvåundantaget.
Med avtalsområde avses i denna bestämmelse kategoriklyvningen mellan 
arbetare och tjänstemän.
Vad som utgör driftsenhet regleras inte i denna bestämmelse. Definitionen 
av vad som är en driftsenhet finns i 22 § tredje stycket 
anställningsskyddslagen, vilken bestämmelse är dispositiv.
Med begreppet anställda som slutligen får avsluta sin anställning på grund 
av arbetsbristen avses samtliga anställda vilkas anställning avslutas på 
grund av arbetsbristen. Med detta avses utöver den som sägs upp av

§ 8 Arbetstid 
Mom 1 Arbetstid under utbokad tid 
Under all tid då arbetstagaren är utbokad tillämpas de på den aktuella 
arbetsplatsen gällande arbetstidsbestämmelserna. Arbetstiden förläggs i 
enlighet med vad som gäller för motsvarande yrkesgrupper hos kunden. 
I de fall kundens verksamhet genom lag eller kollektivavtal är helt eller 
delvis undantagen från nattarbetsförbudet är även motsvarande arbetsuppgifter som utförs av de utbokade arbetstagarna undantagna.
Mom 2 Arbetstid under ej utbokad tid 
Ordinarie arbetstid uppgår för heltidsanställd till 40 tim per helgfri vecka i 
genomsnitt per 4-veckorsperiod. Efter lokal överenskommelse kan längre 
begränsningsperioder tillämpas.
Under de perioder då arbetstagaren inte är utbokad förläggs den ordinarie 
arbets- och utbildningstiden mellan 07.00 och 17.00, om inte annat 
överenskommes mellan arbetsgivaren och den lokala fackliga 
organisationen.

§ 9 Arbetstidsbestämmelser
Följande regler ska tillämpas vid arbete på det egna företaget, mellan 
uppdrag och vid arbete på kundföretag som saknar kollektivavtal.
Mom 1 Dygnsvila 
Varje arbetstagare ska ha minst elva timmars sammanhängande viloperiod 
under varje 24 timmars period (dygnsvila). 
Mom 2 Veckovila 
Varje arbetstagare ska ha minst trettiosex timmars sammanhängande 
viloperiod under varje period om sju dagar (veckovila). 
Veckovilan förläggs så långt som möjligt till veckoslut.
Mom 3 Sammanlagd arbetstid 
Den sammanlagda arbetstiden under varje period om sju dagar får uppgå 
till högst 48 timmar i genomsnitt under en beräkningsperiod om 12 
månader. I den sammanlagda arbetstiden ska ordinarie arbetstid, övertid 
och jourtid inräknas.
Vid beräkning av den sammanlagda arbetstiden ska perioder av årlig betald 
semester och sjukfrånvaro inräknas i tiden för det maximala 
arbetstidsmåttet. 
Mom 4 Raster och måltidsuppehåll
Rast ska förläggas så att arbetstagen inte utför arbete mer än sex timmar i 
följd. Med rast förstås sådant avbrott i den dagliga arbetstiden under vilken 
arbetstagaren inte är skyldig att kvarstanna på arbetsplatsen. Arbetsgivaren 
ska på förhand ange rasternas längd och förläggningen så noga som 
omständigheterna medger.
Raster får bytas mot måltidsuppehåll vid arbetsplatsen. Sådant 
måltidsuppehåll ingår i arbetstiden.
Mom 5 Paus 
Arbetsgivaren ska ordna arbete så att arbetstagaren kan ta de pauser som 
behövs utöver rasterna. Om arbetsförhållandena kräver det, kan i stället 
särskilda arbetspauser läggas ut. Pauser inräknas i arbetstiden.

Alla arbetstagare ska ha ledigt för nattvila. I ledigheten ska tiden mellan 
klockan 24.00 och klockan 05.00 ingå.

allmänhetens behov eller andra särskilda omständigheter måste bedrivas

§ 11 Helglön 
Mom 1 Rätt till helglön
Helglön utges vid tillsvidareanställning och vid sådana tidsbegränsade 
anställningar som pågått längre tid än tre månader. För att arbetstagaren 
ska ha rätt till helglön krävs att anställningen består efter helgen.
Helglön betalas inte till arbetstagare, som är avlönad per vecka eller längre 
tidsenhet. 
För helg som infaller under semester utges helglön under nämnda förutsätt- ningar. Under annan ledighet utges helglön under förutsättning att 
ledigheten varar högst fyra veckor.
Arbetstagare som under ledighet överstigande fyra veckor bereds arbete i 
samband med helg, är inte berättigad till helglön.
Helglön utges inte om frånvaro utan giltig orsak förekommit, helt eller 
delvis, under arbetsdag närmast före eller efter helgen. Helglön utges inte 
heller vid frånvaro utan giltig orsak under helgen avseende arbetstagare 
med ordinarie arbetstid på helgen. Vid semester och annan ledighet, 
förskjuts nämnda dagar i motsvarande mån.
Mom 2 Helglönedagar
Helglön utges för följande dagar: nyårsdagen, trettondagen, långfredagen, 
annandag påsk, första maj, Kristi himmelsfärdsdag, nationaldagen, 
midsommarafton, julafton, juldagen, annandag jul och nyårsafton.
Detta gäller under förutsättning att dagen infaller på annan veckodag än 
lördag och söndag.

Mom 1 Rätt till sjuklön
Sjuklön utges enligt lagen om sjuklön för lön som den anställde gått miste 
om på grund av sjukfrånvaron.
Vid frånvaro på grund av sjukdom, olycksfall eller arbetsskada ska arbetstagaren omgående göra anmälan till arbetsgivaren. Arbetstagaren har inte 
rätt till sjuklön för tid innan sådan anmälan gjorts.
Arbetstagaren ska så snart som möjligt meddela arbetsgivaren när han 
räknar med att kunna återgå i arbete. Sådant meddelande ska lämnas senast 
dagen före återgång. Samma gäller om arbetstagaren blir arbetsoförmögen 
på grund av olycksfall eller arbetsskada.

varit sjuk, uppgifter om i vilken omfattning hans arbetsförmåga varit

§ 23 Förhandlingsordning
Beträffande partsställning se bilaga 1.
Mom 1 Förhandlingspreskription
Om en part vill yrka skadestånd eller annan fullgörelse enligt lag, 
kollektivavtal eller enligt enskilt avtal, ska parten begära förhandling inom 
fyra månader från det parten fått kännedom om den omständighet som 
kravet grundas på. Förhandlingen måste dock begäras senast två år efter 
det att denna omständighet inträffat.
Om en part inte begär förhandling inom föreskriven tid, förlorar parten 
rätten till förhandling.
Mom 2 Lokal förhandling
En förhandling ska i första hand fullgöras mellan de lokala parterna 
(arbetsgivaren och den lokala fackliga organisationen hos denne). 
Förhandlingen ska påbörjas snarast möjligt och senast inom två veckor från 
den dag då den har begärts, om inte parterna har kommit överens om annat. Mom 3 Central förhandling
Efter avslutad lokal förhandling ska den part som vill fullfölja ärendet 
hänskjuta frågan till central förhandling.
Begäran om central förhandling ska vara skriftlig och göras hos motpartens 
organisation inom två månader från den dag då den lokala förhandlingen 
har avslutats. Försummas detta förlorar parten rätten till förhandling.
Central förhandling ska påbörjas snarast möjligt och senast inom tre veckor

Bilaga 3 
Kompetensutveckling 
Förutsättningar
Den allt hårdare internationella konkurrensen i kundföretagen kräver en 
målmedveten satsning på att utveckla kompetensen hos de anställda. Snabb 
produktionsutveckling ställer krav på nya kompetenser hos den som verkar 
i industrisektorn. Ökad fokusering på kunder och marknad ställer krav på 
ökad flexibilitet. Övergång från regelstyrning till målstyrning och 
kvalitetssäkring ställer krav på förändrad arbetsorganisation. 
Ett kontinuerligt förändringsarbete i dessa avseenden förutsätter att såväl 
företagets som de anställdas utvecklingsbehov identifieras. Härvid har 
cheferna en viktig uppgift att översätta företagets behov till den egna 
arbetsgruppen och dess medlemmar. 
Behov 
Alla anställda bör ges möjlighet att genom olika insatser utveckla den 
kompetens som behövs i nya eller förändrade arbetsuppgifter.
Det bör också beaktas att enskilda anställda har idéer utifrån sina 
perspektiv om sina egna och företagets utvecklingsbehov. Det kan vara 
fråga om att utveckla kunskaper och förmåga som på sikt kan gynna både 
den enskilde och företaget.
Utveckling i arbetet sker genom kombinationer av insatser som berör 
arbetsinnehåll, arbetssätt, arbetsorganisation, teknikstöd och kompetens.
Ansvar 
Det är företagens ansvar att genomföra utvecklingsinsatser av personal, 
organisation och teknik. Samtidigt åvilar det den enskilde anställde att ta 
initiativ och känna engagemang och ansvar för sin kompetensutveckling.
Dialog 
En viktig grund för utvecklingen av de anställdas och företagets samlade 
kompetens är dialog mellan chef och medarbetare. Det är i dialogen som 
företagets utvecklingsprogram och dess genomförande kan göras känt. 
Dialogen kan också utgöra riktningsvisare för den enskilde anställdes 
engagemang, reflexioner och planer. Dialogen kan skapas genom t ex

[Sida 42]
Bilaga 3 
40 
löpande planerings- och utvecklingssamtal. Dessutom är det viktigt att i 
arbetslagen diskutera och planera för förändring.
Erfarenheten visar att väl fungerande dialoger förutsätter insatser i 
företagen i form av utbildning av både chefer och medarbetare i 
kommunikation, målformulering, uppföljning av resultat etc. Dialogen ska 
föras i positiv anda och syfta till en god utveckling för de anställda och 
företaget.
Samverkan 
Det är parternas uppfattning att genomförande av dialog och kompetensutveckling i företagen samt stöd till enskilda anställdas initiativ till egen utveckling bör anpassas till varje enskilt företags situation och utgå från 
företagets affärsidé och långsiktiga visioner. 
Formerna för dialog med de anställda, planering, genomförande och 
uppföljning av olika utvecklingsinsatser bör diskuteras och träffas 
överenskommelse om mellan de lokala parterna. 
Lönebildningen
Enskilda anställdas kompetensutveckling bör utgöra en viktig del i 
lönebildningen i företagen.
