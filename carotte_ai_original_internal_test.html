      legend.appendChild(h("span",{style:{fontWeight:"700",color:MUT,marginRight:"4px"}},"Färgkodning:"));
      [
        {color:"#fca5a5",label:"0-20% (lågt)"},
        {color:"#fcd34d",label:"20-28% (acceptabelt)"},
        {color:"#86efac",label:"28%+ (bra)"}
      ].forEach(item=>{
        const w=h("span",{style:{display:"inline-flex",alignItems:"center",gap:"6px"}});
        w.appendChild(h("span",{style:{width:"10px",height:"10px",borderRadius:"50%",background:item.color,display:"inline-block"}}));
        w.appendChild(h("span",{},item.label));
        legend.appendChild(w);
      });
      wrap.appendChild(legend);
    } // end tbFranPris-läge

    // ── LÄGE: Jämför kandidater
    if(S.tbMode==="kalkyl"){

    // ── Passdetaljer
    const passGrid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px",marginBottom:"24px",background:CRD,borderRadius:"12px",padding:"16px 18px",border:`1px solid ${BD}`}});
    passGrid.appendChild(h("div",{style:{fontSize:"11px",fontWeight:"700",color:MUT,textTransform:"uppercase",letterSpacing:"0.4px",gridColumn:"1/-1",marginBottom:"4px"}},"Passdetaljer"));
    function passField(label,key,ph,tip){
      const w=h("div",{style:{display:"flex",flexDirection:"column",gap:"5px"}});
      const l=h("label",{style:{fontSize:"11px",fontWeight:"700",color:MUT,textTransform:"uppercase",letterSpacing:"0.4px"}},label);
      if(tip){const t=h("span",{style:{fontSize:"10px",color:DIM,fontWeight:"400",textTransform:"none",letterSpacing:"0",marginLeft:"5px"}},tip);l.appendChild(t);}
      const inp=h("input",{type:"text",inputmode:"decimal",placeholder:ph,id:"tb-pass-"+key,
        style:{background:"#060e1c",border:`1px solid ${BD}`,borderRadius:"7px",padding:"8px 10px",color:TXT,fontSize:"13px",width:"100%"}});
      inp.value=S[key]||"";
      inp.oninput=e=>{S[key]=e.target.value;draw();};
      w.appendChild(l);w.appendChild(inp);return w;
    }
    passGrid.appendChild(passField("Timmar per pass","tbTimmar","Ex: 6.5","(decimaler ok)"));
    passGrid.appendChild(passField("Antal pass","tbPass","Ex: 10",""));
    passGrid.appendChild(passField("Önskad TB %","tbMalTB","Ex: 30",""));
    wrap.appendChild(passGrid);

    // ── Kandidatkort
    const candHeader=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}});
    candHeader.appendChild(h("div",{style:{fontSize:"11px",fontWeight:"700",color:MUT,textTransform:"uppercase",letterSpacing:"0.4px"}},"Kandidater"));
    if(S.tbCands.length<4){
      const addBtn=h("button",{style:{fontSize:"12px",fontWeight:"600",color:tbColor,background:"transparent",border:`1px solid ${tbColor}`,borderRadius:"7px",padding:"4px 12px",cursor:"pointer"},
        onClick:()=>{const nc={id:"c"+Date.now(),name:"Kandidat "+"ABCDE"[S.tbCands.length],lon:"",pris:"",extra:""};set({tbCands:[...S.tbCands,nc],tbAnalys:null});}
      },"+ Kandidat");
      candHeader.appendChild(addBtn);
    }
    wrap.appendChild(candHeader);

    const cardRow=h("div",{style:{display:"flex",gap:"14px",marginBottom:"24px",flexWrap:"wrap"}});
    S.tbCands.forEach((c,ci)=>{
      const card=h("div",{style:{flex:"1",minWidth:"200px",maxWidth:"280px",background:CRD,border:`1px solid ${BD}`,borderRadius:"12px",padding:"16px 16px"}});
      // Kort-rubrik + ta bort
      const ch=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}});
      const nameInp=h("input",{type:"text",placeholder:"Kandidatnamn",id:`tb-cand-${c.id}-name`,
        style:{background:"transparent",border:"none",color:TXT,fontSize:"13px",fontWeight:"700",width:"100%",outline:"none"}});
      nameInp.value=c.name||"";
      nameInp.oninput=e=>{const nc=[...S.tbCands];nc[ci]={...nc[ci],name:e.target.value};set({tbCands:nc,tbAnalys:null});};
      ch.appendChild(nameInp);
      if(S.tbCands.length>1){
        const xb=h("button",{style:{background:"none",border:"none",color:DIM,fontSize:"16px",cursor:"pointer",flexShrink:"0"},
          onClick:()=>{const nc=S.tbCands.filter((_,i)=>i!==ci);set({tbCands:nc,tbAnalys:null});}
        },"×");
        ch.appendChild(xb);
      }
      card.appendChild(ch);
      function candInput(label,key,ph){
        const w=h("div",{style:{marginBottom:"10px"}});
        w.appendChild(h("div",{style:{fontSize:"10px",fontWeight:"700",color:DIM,textTransform:"uppercase",letterSpacing:"0.4px",marginBottom:"4px"}},label));
        const inp=h("input",{type:"text",inputmode:"decimal",placeholder:ph,id:`tb-cand-${c.id}-${key}`,
          style:{background:"#060e1c",border:`1px solid ${BD}`,borderRadius:"7px",padding:"7px 10px",color:TXT,fontSize:"13px",width:"100%"}});
        inp.value=c[key]||"";
        inp.oninput=e=>{const nc=[...S.tbCands];nc[ci]={...nc[ci],[key]:e.target.value};set({tbCands:nc,tbAnalys:null});};
        w.appendChild(inp);return w;
      }
      card.appendChild(candInput("Lön / timme (kr)","lon","Ex: 180"));
      card.appendChild(candInput("Pris mot kund / timme (kr)","pris","Ex: 425"));
      card.appendChild(candInput("Extra kostnad / timme (kr, valfri)","extra","Ex: 15"));
      cardRow.appendChild(card);
    });
    wrap.appendChild(cardRow);

    // ── Beräkningar
    const timmar=parseFloat(S.tbTimmar)||0;
    const pass=parseFloat(S.tbPass)||1;
    const malTB=parseFloat(S.tbMalTB)||30;

    function calcCand(c){
      const lon=parseFloat(c.lon)||0;
      const pris=parseFloat(c.pris)||0;
      const extra=parseFloat(c.extra)||0;
      const kost=lon*1.6+extra;
      const tb=pris-kost;
      const tbPct=pris>0?tb/pris*100:null;
      const tbPass=timmar>0?tb*timmar:null;
      const totalTB=tbPass!=null?tbPass*pass:null;
      const be=kost;
      const malPris=malTB<100?kost/(1-malTB/100):null;
      return {lon,pris,extra,kost,tb,tbPct,tbPass,totalTB,be,malPris,ok:lon>0&&pris>0};
    }
    const calcs=S.tbCands.map(calcCand);
    const anyOk=calcs.some(c=>c.ok)&&timmar>0;

    if(anyOk){
      // ── Sammanfattningskort
      const okCalcs=calcs.map((c,i)=>({...c,idx:i,name:S.tbCands[i].name||`Kandidat ${i+1}`})).filter(c=>c.ok);
      const best=okCalcs.length>1?okCalcs.reduce((a,b)=>a.tb>b.tb?a:b):okCalcs[0];
      const summCard=h("div",{style:{background:`linear-gradient(135deg,#0f1e35 0%,#162240 100%)`,border:`1px solid ${best.tbPct>=malTB?"#22c55e44":"#f59e0b44"}`,borderRadius:"14px",padding:"18px 22px",marginBottom:"20px",display:"flex",gap:"24px",flexWrap:"wrap",alignItems:"center"}});
      const summLeft=h("div",{style:{flex:"1",minWidth:"180px"}});
      summLeft.appendChild(h("div",{style:{fontSize:"11px",fontWeight:"700",color:MUT,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"6px"}},"Bäst lönsamhet"));
      summLeft.appendChild(h("div",{style:{fontSize:"22px",fontWeight:"700",color:TXT,marginBottom:"4px"}},best.name));
      summLeft.appendChild(h("div",{style:{fontSize:"13px",color:MUT}},`${best.tb.toFixed(0)} kr/h · ${best.tbPct!=null?best.tbPct.toFixed(1)+"% TB":"–"}`));
      summCard.appendChild(summLeft);
      if(timmar>0){
        const summMid=h("div",{style:{display:"flex",gap:"20px",flexWrap:"wrap"}});
        [{lbl:"TB detta pass",val:best.tbPass!=null?best.tbPass.toFixed(0)+" kr":"–"},{lbl:`Total TB (${pass} pass)`,val:best.totalTB!=null?best.totalTB.toFixed(0)+" kr":"–"}].forEach(({lbl,val})=>{
          const b=h("div",{style:{textAlign:"center"}});
          b.appendChild(h("div",{style:{fontSize:"20px",fontWeight:"700",color:tbColor}},val));
          b.appendChild(h("div",{style:{fontSize:"11px",color:MUT,marginTop:"3px"}},lbl));
          summMid.appendChild(b);
        });
        summCard.appendChild(summMid);
      }
      wrap.appendChild(summCard);

      // ── Visuella marginalbars
      const barsBox=h("div",{style:{background:CRD,border:`1px solid ${BD}`,borderRadius:"12px",padding:"16px 20px",marginBottom:"16px"}});
      barsBox.appendChild(h("div",{style:{fontSize:"11px",fontWeight:"700",color:MUT,textTransform:"uppercase",letterSpacing:"0.4px",marginBottom:"14px"}},"Marginalöversikt"));
      okCalcs.forEach(c=>{
        const pct=c.tbPct||0;
        const barColor=pct>=malTB?"#22c55e":pct>=15?"#f59e0b":"#ef4444";
        const barPct=Math.min(100,Math.max(0,pct));
        const row=h("div",{style:{marginBottom:"12px"}});
        const labelRow=h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"5px"}});
        labelRow.appendChild(h("span",{style:{fontSize:"12px",fontWeight:"600",color:TXT}},c.name));
        labelRow.appendChild(h("span",{style:{fontSize:"12px",fontWeight:"700",color:barColor}},pct.toFixed(1)+"%"));
        row.appendChild(labelRow);
        const track=h("div",{style:{height:"8px",background:"#182844",borderRadius:"4px",position:"relative",overflow:"visible"}});
        const fill=h("div",{style:{height:"100%",width:barPct+"%",background:barColor,borderRadius:"4px",transition:"width .3s"}});
        track.appendChild(fill);
        // Mållinje
        const goalX=Math.min(100,malTB);
        const goalLine=h("div",{style:{position:"absolute",top:"-3px",bottom:"-3px",left:goalX+"%",width:"2px",background:"rgba(255,255,255,0.25)",borderRadius:"1px"}});
        const goalLabel=h("div",{style:{position:"absolute",top:"-18px",left:goalX+"%",transform:"translateX(-50%)",fontSize:"9px",color:DIM,whiteSpace:"nowrap"}},"mål "+malTB+"%");
        track.appendChild(goalLine);track.appendChild(goalLabel);
        row.appendChild(track);
        barsBox.appendChild(row);
      });
      wrap.appendChild(barsBox);

      // ── Resultattabell
      const resBox=h("div",{style:{background:CRD,border:`1px solid ${BD}`,borderRadius:"12px",padding:"18px 20px",marginBottom:"16px"}});
      resBox.appendChild(h("div",{style:{fontSize:"11px",fontWeight:"700",color:MUT,textTransform:"uppercase",letterSpacing:"0.4px",marginBottom:"14px"}},"Nyckeltal"));

      const colW=`${Math.floor(55/S.tbCands.length)}%`;
      const tbl=h("div",{style:{display:"grid",gridTemplateColumns:`200px ${S.tbCands.map(()=>colW).join(" ")}${S.tbCands.length>1?" 120px":""}`,gap:"0",fontSize:"13px"}});

      function tblHeader(txt,center){
        return h("div",{style:{padding:"7px 10px",fontWeight:"700",color:"#8aa3c9",fontSize:"11px",textTransform:"uppercase",letterSpacing:"0.4px",borderBottom:`1px solid ${BD}`,textAlign:center?"center":"left"}},txt);
      }
      function tblCell(txt,bold,color,center){
        return h("div",{style:{padding:"7px 10px",color:color||TXT,fontWeight:bold?"700":"400",borderBottom:`1px solid #182844`,textAlign:center?"center":"left",fontSize:"13px"}},txt);
      }

      tbl.appendChild(tblHeader("Nyckeltal"));
      S.tbCands.forEach((c,i)=>tbl.appendChild(tblHeader(c.name||`Kandidat ${i+1}`,true)));
      if(S.tbCands.length>1) tbl.appendChild(tblHeader("Skillnad",true));

      const rows=[
        {label:"Kostnad / timme",fmt:c=>c.ok?c.kost.toFixed(0)+" kr":"–",diff:(a,b)=>b.ok&&a.ok?(b.kost-a.kost).toFixed(0)+" kr":null},
        {label:"TB / timme",fmt:c=>c.ok?c.tb.toFixed(0)+" kr":"–",diff:(a,b)=>b.ok&&a.ok?(b.tb-a.tb).toFixed(0)+" kr":null},
        {label:"TB %",fmt:c=>{if(!c.ok)return"–";const p=c.tbPct;const col=p>=malTB?"#22c55e":p>=15?"#f59e0b":"#ef4444";return h("div",{style:{color:col,fontWeight:"700",textAlign:"center"}},p.toFixed(1)+"%");},diff:(a,b)=>b.ok&&a.ok&&a.tbPct!=null&&b.tbPct!=null?(b.tbPct-a.tbPct).toFixed(1)+" pp":null},
        {label:`TB / pass (${timmar||"?"}h)`,fmt:c=>c.ok&&timmar>0?c.tbPass.toFixed(0)+" kr":"–",diff:(a,b)=>b.ok&&a.ok&&timmar>0?(b.tbPass-a.tbPass).toFixed(0)+" kr":null},
        {label:`Total TB (${pass} pass)`,fmt:c=>c.ok&&timmar>0?c.totalTB.toFixed(0)+" kr":"–",diff:(a,b)=>b.ok&&a.ok&&timmar>0?(b.totalTB-a.totalTB).toFixed(0)+" kr":null,bold:true},
        {label:"Break-even pris",fmt:c=>c.ok?c.be.toFixed(0)+" kr/h":"–",diff:null},
        {label:`Pris för ${malTB||"?"}% TB`,fmt:c=>c.ok&&c.malPris?c.malPris.toFixed(0)+" kr/h":"–",diff:null},
      ];

      rows.forEach(row=>{
        tbl.appendChild(tblCell(row.label,row.bold));
        calcs.forEach((c,i)=>{
          const val=row.fmt(c,i);
          if(typeof val==="string"){tbl.appendChild(tblCell(val,row.bold,null,true));}
          else{const cel=h("div",{style:{padding:"7px 10px",borderBottom:`1px solid #182844`,display:"flex",justifyContent:"center",alignItems:"center"}});cel.appendChild(val);tbl.appendChild(cel);}
        });
        if(S.tbCands.length>1){
          if(row.diff&&calcs.length>=2){
            const d=row.diff(calcs[0],calcs[1]);
            if(d!==null){const num=parseFloat(d);const col=num>0?"#22c55e":num<0?"#ef4444":MUT;tbl.appendChild(tblCell((num>0?"+":"")+d,false,col,true));}
            else tbl.appendChild(tblCell("–",false,DIM,true));
          } else tbl.appendChild(tblCell("–",false,DIM,true));
        }
      });
      resBox.appendChild(tbl);
      wrap.appendChild(resBox);

      // ── Kontextuell insikt (skillnad i perspektiv)
      if(S.tbCands.length>1&&calcs[0].ok&&calcs[1].ok&&timmar>0){
        const diff=Math.abs(calcs[0].totalTB-calcs[1].totalTB);
        const better=calcs[0].totalTB>calcs[1].totalTB?S.tbCands[0].name||"Kandidat A":S.tbCands[1].name||"Kandidat B";
        const worse=calcs[0].totalTB>calcs[1].totalTB?S.tbCands[1].name||"Kandidat B":S.tbCands[0].name||"Kandidat A";
        const higherLon=Math.max(calcs[0].lon,calcs[1].lon);
        const eqHours=higherLon>0?(diff/(higherLon*1.6)).toFixed(1):null;
        const insightBox=h("div",{style:{background:"#08111f",border:`1px solid #2a4872`,borderRadius:"10px",padding:"14px 18px",marginBottom:"16px",display:"flex",gap:"12px",alignItems:"flex-start"}});
        insightBox.appendChild(h("span",{style:{fontSize:"18px",flexShrink:"0"}},"💡"));
        const insightText=h("div",{style:{fontSize:"13px",color:"#94b8d8",lineHeight:"1.65"}});
        let insight=`${better} ger ${diff.toFixed(0)} kr mer i total TB under perioden jämfört med ${worse}.`;
        if(eqHours) insight+=` Det motsvarar ungefär ${eqHours} timmars lönekostnad.`;
        insightText.textContent=insight;
        insightBox.appendChild(insightText);
        wrap.appendChild(insightBox);
      }

      // ── Affärsanalys-knapp
      const analBtn=h("button",{style:{padding:"10px 22px",borderRadius:"8px",background:S.tbAnalysLoading?"#2d4060":tbColor,border:"none",color:S.tbAnalysLoading?DIM:"#fff",fontWeight:"600",fontSize:"13px",cursor:S.tbAnalysLoading?"not-allowed":"pointer"},
        disabled:S.tbAnalysLoading,onClick:doTBAnalys
      },S.tbAnalysLoading?"Analyserar...":"Generera affärsanalys →");
      wrap.appendChild(analBtn);

      if(S.tbAnalys){
        const abox=h("div",{style:{marginTop:"16px",background:"#060e1c",border:`1px solid ${BD}`,borderRadius:"10px",padding:"18px 20px",fontSize:"13px",lineHeight:"1.75",color:TXT,whiteSpace:"pre-wrap"}});
        if(S.tbAnalys.status==="loading"){
          abox.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"10px",color:MUT}},
            h("div",{style:{width:"14px",height:"14px",border:`2px solid ${tbColor}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}),
            "Genererar analys..."
          ));
        } else {
          abox.textContent=S.tbAnalys.text;
          const copyBtn=h("button",{style:{marginTop:"12px",display:"block",padding:"7px 16px",borderRadius:"7px",background:"#1a2d4a",border:"none",color:MUT,fontSize:"12px",fontWeight:"600"},
            onClick:()=>{navigator.clipboard.writeText(S.tbAnalys.text);copyBtn.textContent="✓ Kopierad!";copyBtn.style.background="#10b981";copyBtn.style.color="#fff";}
          },"Kopiera analys");
          abox.appendChild(copyBtn);
        }
        wrap.appendChild(abox);
      }
    } else if(!S.tbCands.some(c=>c.lon||c.pris)&&!timmar){
      // Tom state
      const emptyBox=h("div",{style:{textAlign:"center",padding:"48px 24px",color:MUT}});
      emptyBox.appendChild(h("div",{style:{fontSize:"36px",marginBottom:"12px"}},"📊"));
      emptyBox.appendChild(h("div",{style:{fontSize:"14px",fontWeight:"600",color:"#8aa3c9",marginBottom:"8px"}},"Fyll i passdetaljer och kandidatuppgifter"));
      emptyBox.appendChild(h("div",{style:{fontSize:"12px",color:DIM,maxWidth:"320px",margin:"0 auto",lineHeight:"1.7"}},"Resultaten beräknas automatiskt. Jämför upp till fyra kandidater sida vid sida och se vilket val som ger bäst affär."));
      wrap.appendChild(emptyBox);
    } else if(S.tbCands.some(c=>c.lon||c.pris)&&!timmar){
      wrap.appendChild(h("div",{style:{color:"#f59e0b",fontSize:"12px",marginTop:"4px",padding:"10px 14px",background:"#1a1200",border:"1px solid #3d2a00",borderRadius:"8px"}},"⚠️ Ange antal timmar per pass för att se resultat."));
    }
    } // end kalkyl-läge

    // ── LÄGE: Vad kostar en anställd?
    if(S.tbMode==="lonekostnad"){
      if(!S.lkTyp) S.lkTyp="tim";
      const isMan=S.lkTyp==="manad";
      const timmar=parseFloat(S.lkTimmar)||165;
      const bruttoRaw=parseFloat(S.lkBrutto)||0;
      const bruttoMan=isMan?bruttoRaw:bruttoRaw*timmar;
      const bruttoTim=isMan?(bruttoRaw/timmar):bruttoRaw;
      const semPct=parseFloat(S.lkSem!=null?S.lkSem:"12");
      const agPct=parseFloat(S.lkAg!=null?S.lkAg:"31.42");
      const kavPct=parseFloat(S.lkKav!=null?S.lkKav:"13");

      const semKr=bruttoMan*(semPct/100);
      const lkBas=bruttoMan+semKr;
      const agKr=lkBas*(agPct/100);
      const kavKr=bruttoMan*(kavPct/100);
      const totalMan=lkBas+agKr+kavKr;
      const totalTim=timmar>0?totalMan/timmar:0;
      const faktor=bruttoMan>0?totalMan/bruttoMan:0;

      const sec=h("div",{style:{maxWidth:"520px"}});

      // Lönetyp toggle
      const typRow=h("div",{style:{display:"flex",gap:"6px",marginBottom:"16px"}});
      ["tim","manad"].forEach(t=>{
        const sel=S.lkTyp===t;
        typRow.appendChild(h("button",{style:{padding:"7px 18px",borderRadius:"7px",background:sel?tbColor:"transparent",border:`1px solid ${sel?tbColor:BD}`,color:sel?"#fff":MUT,fontSize:"12px",fontWeight:"600",cursor:"pointer",transition:"all .15s"},
          onClick:()=>{S.lkTyp=t;draw();}
        },t==="tim"?"Timlön":"Månadslön"));
      });
      sec.appendChild(typRow);

      // Inputfält
      const mkInput=(label,val,key,suffix,extra)=>{
        const row=h("div",{style:{marginBottom:"12px"}});
        row.appendChild(h("label",{style:{display:"block",fontSize:"11px",fontWeight:"700",color:MUT,marginBottom:"4px",letterSpacing:"0.3px",textTransform:"uppercase"}},label));
        const iw=h("div",{style:{display:"flex",alignItems:"center",gap:"6px"}});
        const inp=h("input",{type:"text",inputMode:"decimal",id:"lk_"+key,style:{...IS,maxWidth:"180px"},placeholder:"0"});
        inp.value=val||"";
        inp.oninput=e=>{S[key]=e.target.value;draw();};
        iw.appendChild(inp);
        if(suffix)iw.appendChild(h("span",{style:{fontSize:"12px",color:DIM}},suffix));
        if(extra)iw.appendChild(extra);
        row.appendChild(iw);
        return row;
      };

      sec.appendChild(mkInput("Bruttolön",S.lkBrutto,"lkBrutto",isMan?"kr/mån":"kr/tim"));
      if(!isMan) sec.appendChild(mkInput("Timmar per månad",S.lkTimmar||"165","lkTimmar","tim/mån"));

      // Justerbar procentsatser
      const pctRow=h("div",{style:{display:"flex",gap:"16px",marginBottom:"16px",flexWrap:"wrap"}});
      const mkPct=(label,val,key,def)=>{
        const col=h("div",{style:{flex:"1",minWidth:"140px"}});
        col.appendChild(h("label",{style:{display:"block",fontSize:"11px",fontWeight:"700",color:MUT,marginBottom:"4px",letterSpacing:"0.3px",textTransform:"uppercase"}},label));
        const iw=h("div",{style:{display:"flex",alignItems:"center",gap:"6px"}});
        const inp=h("input",{type:"text",inputMode:"decimal",id:"lk_"+key,style:{...IS,maxWidth:"80px",textAlign:"right"},placeholder:def});
        inp.value=val!=null?val:"";
        inp.oninput=e=>{S[key]=e.target.value;draw();};
        iw.appendChild(inp);
        iw.appendChild(h("span",{style:{fontSize:"12px",color:DIM}},"%"));
        col.appendChild(iw);
        return col;
      };
      pctRow.appendChild(mkPct("Semesterersättning",S.lkSem,"lkSem","12"));
      pctRow.appendChild(mkPct("Arbetsgivaravgifter",S.lkAg,"lkAg","31.42"));
      pctRow.appendChild(mkPct("Avgifter kollektivavtal",S.lkKav,"lkKav","13"));
      sec.appendChild(pctRow);

      // Resultat
      if(bruttoRaw>0){
        const res=h("div",{style:{background:"#142036",border:`1px solid ${BD}`,borderRadius:"12px",padding:"20px",marginTop:"8px"}});
        res.appendChild(h("div",{style:{fontSize:"12px",fontWeight:"700",color:"#8aa3c9",marginBottom:"14px",textTransform:"uppercase",letterSpacing:"0.5px"}},"Kostnadssammanställning"));

        const mkRow=(label,value,accent,bold)=>{
          const r=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:bold?"none":`1px solid ${BD}`}});
          r.appendChild(h("span",{style:{fontSize:"13px",color:accent?TXT:MUT}},label));
          r.appendChild(h("span",{style:{fontSize:"13px",fontWeight:bold?"700":"500",color:accent?tbColor:TXT,fontVariantNumeric:"tabular-nums"}},value));
          return r;
        };

        const fmt=n=>Math.round(n).toLocaleString("sv-SE")+" kr";
        const fmtTim=n=>n.toFixed(2).replace(".",",")+" kr";

        res.appendChild(mkRow("Bruttolön"+(isMan?" (månad)":" ("+timmar+" tim × "+fmtTim(bruttoTim)+")"),fmt(bruttoMan)));
        res.appendChild(mkRow("Semesterersättning ("+semPct.toFixed(1).replace(".",",")+"%)",fmt(semKr)));
        res.appendChild(mkRow("Arbetsgivaravgifter ("+agPct.toFixed(2).replace(".",",")+"%)",fmt(agKr)));
        res.appendChild(mkRow("Avgifter kollektivavtal ("+kavPct.toFixed(1).replace(".",",")+"%)",fmt(kavKr)));

        // Separator
        res.appendChild(h("div",{style:{height:"1px",background:tbColor,opacity:"0.3",margin:"8px 0"}}));

        // Total
        const totalRow=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"8px 0"}});
        totalRow.appendChild(h("span",{style:{fontSize:"15px",fontWeight:"700",color:TXT}},"Total kostnad/månad"));
        totalRow.appendChild(h("span",{style:{fontSize:"18px",fontWeight:"700",color:tbColor,fontVariantNumeric:"tabular-nums"}},fmt(totalMan)));
        res.appendChild(totalRow);

        // Per timme + faktor
        const extraRow=h("div",{style:{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"12px",marginTop:"8px",padding:"10px 12px",background:"rgba(249,115,22,0.08)",borderRadius:"8px"}});
        extraRow.appendChild(h("div",{style:{fontSize:"12px",color:MUT}},
          h("span",{style:{color:DIM}},"Per timme: "),
          h("span",{style:{fontWeight:"600",color:TXT}},fmtTim(totalTim))
        ));
        extraRow.appendChild(h("div",{style:{fontSize:"12px",color:MUT}},
          h("span",{style:{color:DIM}},"Påslagsfaktor: "),
          h("span",{style:{fontWeight:"600",color:TXT}},"×"+faktor.toFixed(2).replace(".",","))
        ));
        res.appendChild(extraRow);

        // Förklaring
        res.appendChild(h("div",{style:{fontSize:"11px",color:DIM,marginTop:"12px",lineHeight:"1.6",fontStyle:"italic"}},"Påslagsfaktorn visar hur mycket dyrare en anställd är jämfört med bruttolönen. En faktor på ×1,48 innebär att varje lönekrona kostar 1,48 kr totalt."));

        sec.appendChild(res);
      }

      wrap.appendChild(sec);
    } // end lönekostnad-läge

    main.appendChild(wrap);
    root.appendChild(main);_restoreFocus();return;
  }

  // Always-form (städkalkyl) – form at top, dolt när konversationen är igång
  if(a.mode==="always-form"){
    const hasActiveConv = ms.length > 0;
    if(!hasActiveConv){
    const fp=h("div",{style:{padding:"18px 24px",background:PNL,overflowY:"auto",flex:"1",minHeight:"0"}});
    const grid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",maxWidth:"860px"}});
    a.fields.forEach(f=>{
      const w=fld(f);
      if(f.type==="textarea"||f.id==="krav"||f.fullWidth)w.style.gridColumn="1 / -1";
      grid.appendChild(w);
    });

    // Floorplan upload – obligatoriskt
    const fpWrap=h("div",{style:{gridColumn:"1 / -1",marginTop:"4px"}});
    const fpLbl=h("div",{style:{fontSize:"11px",fontWeight:"700",color:MUT,marginBottom:"8px",letterSpacing:"0.4px",textTransform:"uppercase"}},
      "Planritningar (obligatoriskt)",
      S.floorplans.length>0?h("span",{style:{color:"#f59e0b",marginLeft:"6px",fontWeight:"400",textTransform:"none"}},`${S.floorplans.length} fil${S.floorplans.length>1?"er":"" } uppladdad${S.floorplans.length>1?"e":""}`):h("span",{style:{color:"#ef4444",marginLeft:"6px",fontWeight:"400",textTransform:"none"}},"krävs för analys"));
    const fpInput=h("input",{type:"file",accept:"image/*,.pdf",multiple:"true",style:{display:"none"}});
    fpInput.onchange=e=>{if(e.target.files.length)handleFloorplanUpload(Array.from(e.target.files));};
    const fpContainer=h("div",{style:{display:"flex",flexDirection:"column",gap:"8px"}});

    // Show uploaded floor plans
    S.floorplans.forEach((fp,i)=>{
      const row=h("div",{style:{display:"flex",alignItems:"center",gap:"10px",background:"#1a1500",border:"1px solid #3d2a00",borderRadius:"8px",padding:"10px 14px"}});
      row.appendChild(h("span",{style:{fontSize:"16px"}},"🗺️"));
      row.appendChild(h("div",{style:{flex:"1"}},
        h("div",{style:{fontSize:"12px",fontWeight:"600",color:"#fbbf24"}},`Våning/plan ${i+1}`),
        h("div",{style:{fontSize:"11px",color:DIM,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"280px"}},fp.name)
      ));
      row.appendChild(h("button",{
        style:{background:"none",border:"none",color:DIM,fontSize:"16px",cursor:"pointer",padding:"0 4px",flexShrink:"0"},
        onClick:()=>{S={...S,floorplans:S.floorplans.filter(f=>f.id!==fp.id)};draw();}
      },"×"));
      fpContainer.appendChild(row);
    });

    // Add button / empty state
    const addBtn=h("div",{
      style:{display:"flex",alignItems:"center",gap:"10px",border:`2px dashed ${BD}`,borderRadius:"8px",padding:"10px 14px",cursor:"pointer",transition:"border-color .15s"},
      onClick:()=>fpInput.click()
    });
    addBtn.appendChild(h("span",{style:{fontSize:"16px"}},"📐"));
    addBtn.appendChild(h("div",{style:{flex:"1"}},
      h("div",{style:{fontSize:"13px",color:MUT,fontWeight:"500"}},S.floorplans.length===0?"Lägg till planritning":"Lägg till fler våningar / plan"),
      h("div",{style:{fontSize:"11px",color:DIM}},"PNG, JPG eller PDF – en fil per våning")
    ));
    addBtn.appendChild(h("span",{style:{fontSize:"12px",color:MUT,background:"#283d58",padding:"4px 10px",borderRadius:"6px",border:`1px solid ${BD}`,flexShrink:"0"}},"+ Välj fil"));
    fpContainer.appendChild(addBtn);

    fpWrap.appendChild(fpLbl);fpWrap.appendChild(fpInput);fpWrap.appendChild(fpContainer);
    grid.appendChild(fpWrap);

    // Felmeddelande
    if(S.formError){
      const errBox=h("div",{style:{gridColumn:"1 / -1",padding:"10px 14px",background:"#3d0a0a",border:"1px solid #7f1d1d",borderRadius:"8px",color:"#fca5a5",fontSize:"12px"}},S.formError);
      grid.appendChild(errBox);
    }

    const bw=h("div",{style:{gridColumn:"1 / -1",marginTop:"4px"}});
    bw.appendChild(h("button",{style:{padding:"10px 22px",borderRadius:"8px",background:S.loading?"#2d4060":a.color,border:"none",color:S.loading?DIM:"#fff",fontWeight:"600",fontSize:"13px"},disabled:S.loading,onClick:submitForm},S.loading?"Analyserar...":a.cta));
    grid.appendChild(bw);fp.appendChild(grid);main.appendChild(fp);
    }
  }

  // Chat messages
  const showChat=a.mode==="knowledge"||a.mode==="iso"||a.mode==="kollektivavtal"||(a.mode==="always-form"&&ms.length>0);
  if(showChat){
    const ca=h("div",{style:{flex:"1",overflowY:"auto",padding:"20px 24px"}});
    if(!ms.length){
      const modeLabels={radgivare:"Ställ en fråga om ISO 9001, 14001 eller 45001 – eller om Carottes interna processer.",revisor:"Ange vilket område eller klausul du vill revidera, så sätter jag igång med frågorna.",avvikelse:"Beskriv avvikelsen kort, så guidar jag dig genom hela rapporten steg för steg.",revforberedelse:"Ange vilken revision du förbereder dig inför – heltäckande, eller fokuserad på ett specifikt område/klausul."};

      if(a.mode==="iso"&&!S.isoMode){
        // ISO mode picker cards
        const picker=h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:"32px",padding:"40px 24px"}});
        const title=h("div",{style:{textAlign:"center"}});
        title.appendChild(h("div",{style:{fontSize:"32px",marginBottom:"12px"}},"🏅"));
        title.appendChild(h("div",{style:{fontSize:"20px",fontWeight:"700",color:TXT,marginBottom:"6px"}},"Välj läge"));
        title.appendChild(h("div",{style:{fontSize:"13px",color:MUT,maxWidth:"420px",lineHeight:"1.6"}},"Välj hur du vill använda ISO-specialisten idag."));
        picker.appendChild(title);

        const cards=h("div",{style:{display:"flex",gap:"16px",flexWrap:"wrap",justifyContent:"center",maxWidth:"800px"}});
        const isoCards=[
          {id:"radgivare", label:"Rådgivare",     emoji:"🤝", desc:"Ställ frågor om ISO 9001, 14001 eller 45001 – eller Carottes interna processer."},
          {id:"revisor",   label:"Revisionsläge", emoji:"🔍", desc:"Simulerar en extern revisor. Ange område eller klausul så startar revisionen."},
          {id:"revforberedelse", label:"Förbered revision", emoji:"📋", desc:"Checklista och förberedelseplan inför kommande revision. Anpassad per klausul."},
          {id:"avvikelse", label:"Avvikelse",      emoji:"⚠️", desc:"Guidas steg för steg genom att skriva en komplett avvikelserapport."},
        ];
        isoCards.forEach(m=>{
          const card=h("button",{
            style:{
              display:"flex",flexDirection:"column",alignItems:"flex-start",
              width:"210px",padding:"20px 18px",borderRadius:"14px",
              border:"1px solid "+BD,background:CRD,
              cursor:"pointer",textAlign:"left",gap:"10px",
              transition:"border-color .2s, background .2s, transform .15s"
            },
            onClick:()=>{set({isoMode:m.id});if(!cid())newConv();}
          });
          card.onmouseenter=()=>{card.style.borderColor="#06b6d4";card.style.background="#071e2a";card.style.transform="translateY(-2px)";};
          card.onmouseleave=()=>{card.style.borderColor=BD;card.style.background=CRD;card.style.transform="translateY(0)";};
          const iconWrap=h("div",{style:{width:"44px",height:"44px",borderRadius:"10px",background:"rgba(219,105,35,0.15)",border:"1px solid rgba(219,105,35,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px"}},m.emoji);
          const labelEl=h("div",{style:{fontSize:"14px",fontWeight:"700",color:TXT}},m.label);
          const descEl=h("div",{style:{fontSize:"11px",color:MUT,lineHeight:"1.5"}},m.desc);
          card.appendChild(iconWrap);card.appendChild(labelEl);card.appendChild(descEl);
          cards.appendChild(card);
        });

        // Gap-analys card
        const gapCard=h("button",{
          style:{
            display:"flex",flexDirection:"column",alignItems:"flex-start",
            width:"210px",padding:"20px 18px",borderRadius:"14px",
            border:"1px solid #f59e0b",background:CRD,
            cursor:"pointer",textAlign:"left",gap:"10px",
            transition:"border-color .2s, background .2s, transform .15s"
          },
          onClick:triggerGapAnalysis
        });
        gapCard.onmouseenter=()=>{gapCard.style.background="#1a1200";gapCard.style.transform="translateY(-2px)";};
        gapCard.onmouseleave=()=>{gapCard.style.background=CRD;gapCard.style.transform="translateY(0)";};
        const gapIcon=h("div",{style:{width:"44px",height:"44px",borderRadius:"10px",background:"rgba(245,158,11,0.15)",border:"1px solid rgba(245,158,11,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px"}},"📊");
        const gapLabel=h("div",{style:{fontSize:"14px",fontWeight:"700",color:"#fbbf24"}},"Gap-analys");
        const gapDesc=h("div",{style:{fontSize:"11px",color:MUT,lineHeight:"1.5"}},"Analyserar er nulägesstatus mot ISO-kraven och identifierar förbättringsområden.");
        gapCard.appendChild(gapIcon);gapCard.appendChild(gapLabel);gapCard.appendChild(gapDesc);
        cards.appendChild(gapCard);

        picker.appendChild(cards);
        ca.appendChild(picker);
      } else if(a.mode==="kollektivavtal"&&!S.kaAvtal){
        // Full-screen avtal picker cards
        const picker=h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:"32px",padding:"40px 24px"}});
        const title=h("div",{style:{textAlign:"center"}});
        title.appendChild(h("div",{style:{fontSize:"32px",marginBottom:"12px"}},"📜"));
        title.appendChild(h("div",{style:{fontSize:"20px",fontWeight:"700",color:TXT,marginBottom:"6px"}},"Välj ett kollektivavtal"));
        title.appendChild(h("div",{style:{fontSize:"13px",color:MUT,maxWidth:"420px",lineHeight:"1.6"}},"Välj Tjänstemän, Serviceentreprenad, Arbetare eller Gröna riksavtalet för att starta. Du kan sedan ställa frågor om allt från övertid och OB till semester, uppsägning och lönenivåer."));
        picker.appendChild(title);

        const cards=h("div",{style:{display:"flex",gap:"16px",flexWrap:"wrap",justifyContent:"center",maxWidth:"860px"}});
        const avtalCards=[
          {id:"tjänstemän",   label:"Tjänstemän",        emoji:"👔",  desc:"Allmänna anställningsvillkor för tjänstemän"},
          {id:"serviceentreprenad", label:"Serviceentreprenad", emoji:"🧹", desc:"Städ- och serviceentreprenad – OB, lön, arbetstid"},
          {id:"arbetare",     label:"Arbetare",           emoji:"🍽️",  desc:"Hotell- och restaurangbranschen – löner och villkor"},
          {id:"gröna",        label:"Gröna riksavtalet",  emoji:"🌿",  desc:"Trädgård, park och kyrkogård – säsongsregler"},
        ];
        avtalCards.forEach(av=>{
          const card=h("button",{
            style:{
              display:"flex",flexDirection:"column",alignItems:"flex-start",
              width:"185px",padding:"20px 18px",borderRadius:"14px",
              border:"1px solid "+BD,background:CRD,
              cursor:"pointer",textAlign:"left",gap:"10px",
              transition:"border-color .2s, background .2s, transform .15s"
            },
            onClick:()=>{set({kaAvtal:av.id});if(!cid())newConv();}
          });
          card.onmouseenter=()=>{card.style.borderColor="#e879a0";card.style.background="#1a0d14";card.style.transform="translateY(-2px)";};
          card.onmouseleave=()=>{card.style.borderColor=BD;card.style.background=CRD;card.style.transform="translateY(0)";};

          const iconWrap=h("div",{style:{width:"44px",height:"44px",borderRadius:"10px",background:"rgba(219,105,35,0.15)",border:"1px solid rgba(219,105,35,0.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"22px"}},av.emoji);
          const labelEl=h("div",{style:{fontSize:"14px",fontWeight:"700",color:TXT}},av.label);
          card.appendChild(iconWrap);card.appendChild(labelEl);
          cards.appendChild(card);
        });
        picker.appendChild(cards);
        ca.appendChild(picker);
      } else {
        if(a.mode==="knowledge"){
          const kbEmpty=h("div",{style:{padding:"28px 4px"}});
          kbEmpty.appendChild(h("div",{style:{fontSize:"13px",color:MUT,marginBottom:"16px"}},"Skriv din fråga nedan, eller välj ett exempel att börja med:"));
          const examples=[
            "Vem är kontaktperson för porslin i Stockholm?",
            "Vad gäller för sparad semester?",
            "Hur fungerar visselblåsarfunktionen?",
            "Vilka maskiner erbjuder Sweet Coffee och vad kostar de?",
            "Vilka underleverantörer finns i Göteborg?",
            "Hur hanteras olycksfall på arbetsplatsen?",
            "Vad är Carottes kvalitetspolicy?",
            "Vilka jobbar på Carotte i Göteborg och hur når jag dem?",
          ];
          const grid=h("div",{style:{display:"flex",flexWrap:"wrap",gap:"8px"}});
          examples.forEach(q=>{
            const chip=h("button",{style:{padding:"8px 14px",borderRadius:"20px",border:`1px solid ${BD}`,background:CRD,color:MUT,fontSize:"12px",cursor:"pointer",textAlign:"left",transition:"border-color .15s,color .15s,background .15s"},
              onClick:()=>{if(!cid())newConv();set({chatIn:q});setTimeout(()=>doChat(),50);}
            },q);
            chip.onmouseenter=()=>{chip.style.borderColor="#8b5cf6";chip.style.color=TXT;chip.style.background="#0f0a1f";};
            chip.onmouseleave=()=>{chip.style.borderColor=BD;chip.style.color=MUT;chip.style.background=CRD;};
            grid.appendChild(chip);
          });
          kbEmpty.appendChild(grid);
          ca.appendChild(kbEmpty);
        } else {
          ca.appendChild(h("div",{style:{color:DIM,fontSize:"13px",textAlign:"center",marginTop:"32px"}},
            a.mode==="iso"?(S.isoMode?modeLabels[S.isoMode]:""):
            a.mode==="kollektivavtal"?("Ställ din fråga om "+{"tjänstemän":"Tjänstemännavtalet","serviceentreprenad":"Serviceentreprenadsavtalet","arbetare":"Arbetaravtalet","gröna":"Gröna riksavtalet"}[S.kaAvtal]+" nedan."):""  
          ));
        }
      }
    }
    ms.forEach((m,idx)=>ca.appendChild(msgBubble(m,a.emoji,activeId,idx)));
    if(S.loading)ca.appendChild(loadingBubble(a.emoji));
    const anchor=h("div",{id:"bottom"});
    ca.appendChild(anchor);
    main.appendChild(ca);
    requestAnimationFrame(()=>document.getElementById("bottom")?.scrollIntoView({behavior:"smooth"}));
  }

  // Chat input
  const showInput=a.mode==="knowledge"||a.mode==="iso"||a.mode==="kollektivavtal"||(a.mode==="always-form"&&ms.length>0);
  if(showInput){
    // För kalkyl: visa hantering av planritningar ovanför input
    if(a.mode==="always-form"&&cv){
      const fpStrip=h("div",{style:{padding:"8px 20px",borderTop:`1px solid ${BD}`,background:"#0a1322",display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}});
      fpStrip.appendChild(h("span",{style:{fontSize:"11px",color:DIM,fontWeight:"600",letterSpacing:"0.4px",textTransform:"uppercase"}},"Planritningar:"));
      const cvFps=cv.floorplans||[];
      cvFps.forEach((fp,i)=>{
        const chip=h("div",{style:{display:"flex",alignItems:"center",gap:"6px",background:"#1a1500",border:"1px solid #3d2a00",borderRadius:"6px",padding:"4px 8px",fontSize:"11px",color:"#fbbf24"}},
          "🗺️ "+(fp.name.length>28?fp.name.slice(0,28)+"…":fp.name)
        );
        const xBtn=h("button",{
          style:{background:"none",border:"none",color:DIM,fontSize:"14px",cursor:"pointer",padding:"0 2px",lineHeight:"1"},
          title:"Ta bort",
          onClick:()=>{
            if(!confirm("Ta bort \""+fp.name+"\" från konversationen? Den används inte i nästa fråga.")) return;
            const newConvs={...S.convs};
            newConvs[S.agentId]=(newConvs[S.agentId]||[]).map(c=>c.id===cv.id?{...c,floorplans:(c.floorplans||[]).filter(f=>f.id!==fp.id)}:c);
            set({convs:newConvs});
          }
        },"×");
        chip.appendChild(xBtn);
        fpStrip.appendChild(chip);
      });
      // Bifoga-knapp
      const newFpInput=h("input",{type:"file",accept:"image/*,.pdf",multiple:"true",style:{display:"none"}});
      newFpInput.onchange=async e=>{
        const files=Array.from(e.target.files||[]);
        if(!files.length)return;
        const added=[];
        for(const file of files){
          const sizeMB=file.size/1024/1024;
          if(sizeMB>20){
            alert(`"${file.name}" är ${sizeMB.toFixed(1)} MB – för stor. Filer över 20 MB ger fel. Komprimera filen och försök igen.`);
            continue;
          }
          if(sizeMB>8){
            if(!confirm(`"${file.name}" är ${sizeMB.toFixed(1)} MB – större än rekommenderat. Vill du fortsätta?`))continue;
          }
          const b64=await readFileAsBase64(file);
          added.push({id:uid(),name:file.name,data:b64,type:file.type||"image/png"});
        }
        if(!added.length)return;
        const newConvs={...S.convs};
        newConvs[S.agentId]=(newConvs[S.agentId]||[]).map(c=>c.id===cv.id?{...c,floorplans:[...(c.floorplans||[]),...added]}:c);
        set({convs:newConvs});
      };
      fpStrip.appendChild(newFpInput);
      fpStrip.appendChild(h("button",{
        style:{background:"transparent",border:`1px dashed ${BD}`,color:MUT,fontSize:"11px",fontWeight:"600",padding:"4px 10px",borderRadius:"6px",cursor:"pointer"},
        onClick:()=>newFpInput.click()
      },"+ Bifoga fler / ersätt"));
      if(cvFps.length===0){
        fpStrip.appendChild(h("span",{style:{fontSize:"11px",color:"#f87171",fontStyle:"italic"}},"Inga ritningar bifogade – lägg till minst en innan du frågar igen."));
      }
      main.appendChild(fpStrip);
    }
    const ib=h("div",{style:{padding:"12px 20px",borderTop:`1px solid ${BD}`,background:PNL,display:"flex",gap:"10px",alignItems:"flex-end"}});
    const ta=h("textarea",{style:{...IS,flex:"1",resize:"none"},placeholder:a.mode==="knowledge"?"Skriv din fråga... (Enter skickar)":"Följdfråga... (Enter skickar, Shift+Enter ny rad)",rows:"2"});
    ta.value=S.chatIn;
    const isoColor="#06b6d4";
    const sendColor=a.mode==="iso"?isoColor:OR;
    const sb=h("button",{style:{padding:"10px 18px",borderRadius:"8px",background:S.chatIn.trim()&&!S.loading?sendColor:"#283d58",border:"none",color:S.chatIn.trim()&&!S.loading?"#fff":DIM,fontWeight:"600",fontSize:"13px",flexShrink:"0",height:"42px"},disabled:!S.chatIn.trim()||S.loading,onClick:doChat},"Skicka");
    ta.oninput=e=>{
      S.chatIn=e.target.value;
      const ok=S.chatIn.trim()&&!S.loading;
      sb.disabled=!ok;sb.style.background=ok?sendColor:"#283d58";sb.style.color=ok?"#fff":DIM;
    };
    ta.onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();doChat();}};
    ib.appendChild(ta);ib.appendChild(sb);main.appendChild(ib);
  }

  root.appendChild(main);
  _restoreFocus();
}

draw();
</script>
</body>
</html>
