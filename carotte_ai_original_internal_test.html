Avtal om allmänna anställningsvillkor 
1 Kap Avtalets giltighetsområde 
1 § Allmänt 
Detta avtal gäller för medlemmar i HRF och medlemsföretag i Visita och reglerar allt 
arbete inom avtalsområdet. 
Arbetsgivarna förbinder sig att tillämpa avtalet för samtliga arbetstagare inom avtalsområdet. 
Löne- och anställningsvillkor under utbildningstid regleras i utbildningsavtalet samt i 
löneavtalet. 
2 Kap Anställnings ingående och upphörande 
Beträffande regler för upphörande av anställning hänvisas till lagen (1982:80) om anställningsskydd, LAS. För i 3–4 §§ angivna anställningsformer gäller utöver LAS, i förekommande fall avtalets regler. 
2 § Anställning tillsvidare 
1. Anställnings ingående 
Anställning gäller tillsvidare om ej annat avtalats. Provanställning som inte avslutas eller 
avbryts övergår i tillsvidareanställning. 
2. Anställnings upphörande 
Anmärkning: 
LAS reglerar följande vad avser uppsägningstider vid arbetsgivares och 
arbetstagares uppsägning.

[Sida 10]
8 
För anställningsavtal som har ingåtts den 1 januari 1997 eller senare gäller: 
För både arbetsgivare och arbetstagare gäller en minsta uppsägningstid av en månad. 
Arbetstagaren har rätt till en uppsägningstid av: 
– två månader, om den sammanlagda anställningstiden hos arbetsgivaren är minst två 
år men kortare än fyra år, 
– tre månader, om den sammanlagda anställningstiden är minst fyra år men kortare än 
sex år, 
– fyra månader, om den sammanlagda anställningstiden är minst sex år men kortare 
än åtta år, 
– fem månader, om den sammanlagda anställningstiden är minst åtta år men kortare 
än tio år, 
– sex månader om den sammanlagda anställningstiden är minst tio år. 
3 § Provanställning 
1. Ingående av provanställning 
Avtal om provanställning får tillämpas under högst sex månader. Vid frånvaro kan 
arbetsgivare och arbetstagare skriftligen överenskomma om en mot frånvaroperioden 
svarande förlängning av provanställningstiden. 
2. Upphörande av provanställning 
2.1 Upphörande under pågående provanställningsperiod 
Arbetsgivare som avser att ge arbetstagare besked om att en provanställning ska avbrytas i 
förtid ska underrätta arbetstagaren om detta minst 14 dagar i förväg. 
Vill arbetstagaren avbryta provanställningen i förtid ska arbetsgivaren underrättas minst 
14 dagar i förväg. 
2.2 Upphörande vid provanställningsperiodens slut 
Om arbetsgivare eller arbetstagare vill att provanställningen ska upphöra vid provanställningsperiodens slut utan att övergå i en tillsvidareanställning, ska arbetstagaren/arbetsgivaren underrättas 14 dagar före periodens slut. 
Anmärkning: 
Är arbetstagaren fackligt organiserad ska arbetsgivaren samtidigt med 
underrättelsen varsla (meddela) den lokala arbetstagarorganisationen som arbetstagaren tillhör.

4 § Tidsbegränsad anställning 
1. Ingående av tidsbegränsad anställning 
1.1 Tidsbegränsad anställning (arbetstid som ska schemaläggas) 
Avtal om tidsbegränsad anställning får, enligt lagen (1982:80) om anställningsskydd, 
LAS, träffas i följande fall: 
– för särskild visstidsanställning, 
– för vikariat, 
– för säsongsarbete, 
Anmärkning: 
Enligt 25 a § LAS har en deltidsanställd arbetstagare enligt vissa angivna förutsättningar företrädesrätt till högre sysselsättningsgrad. 
Tidsbegränsad anställning kan dessutom förekomma vid tillfälligt behov av 
arbetskraft enligt nedan. 
1.2 Anställning för enstaka dagar (arbetstid som inte går att schema-
 lägga) 
Förutsättningar för anställningsformen 
Avtal om anställning för enstaka dagar får ingås: 
 om arbetstiden inte går att schemalägga, 
 om det föranleds av arbetets oregelbundna beskaffenhet och 
 när arbetsgivaren har ett tillfälligt behov av arbetskraft 
Om det uppkommit frågor kring tillämpningen av anställningsformen har lokal facklig organisation rätt att påkalla förhandling och inom ramen för förhandlingen ta del av information om antalet arbetade timmar inom ramen för anställningsformen de senaste sex månaderna. Arbetsgivaren har att också redogöra för andelen arbetade timmar på enstaka dagar i förhållande till totalt antal arbetade timmar under perioden samt de övergripande förutsättningarna för tillsättningen av arbetspass på enstaka dagar. På begäran av lokal facklig organisation ska arbetsgivaren specificera timmarna per arbetstagare med angivande 
av anställnings-id. 
Anställningsformen 
Anställningsformen innebär att: 
– arbetsgivaren bara behöver erbjuda arbete när det finns behov av extra arbetskraft, 
– arbetstagaren kan acceptera eller avvisa erbjudet arbete, 
– vid anställning ska lägsta ersättningsgrundande arbetstid bestämmas 
– lägsta ersättningsgrundande arbetstid är tre timmar per dag, 
– i de fall arbetsgivaren erbjuder arbetstagare att bevista ett personalmöte är lägsta ersättningsgrundande tid en och en halv timme per dag. Varje påbörjad halvtimme betalas då som full halvtimme.

Turordning och erbjudande om anställning för enstaka dagar 
När anställning för enstaka dagar omfattat i genomsnitt minst 15 timmar per vecka under 
minst en tvåmånadersperiod har arbetsgivaren därefter skyldighet att erbjuda anställning 
för enstaka dagar i mån av tillgång. Om det finns flera som arbetat under denna anställningsform ska, om lokal facklig organisation eller anställd så begär, en turordningslista 
för sådan anställning upprättas. 
Rätt till annan anställning 
När anställning för enstaka dagar omfattat i genomsnitt minst 15 timmar per vecka under 
en period av tolv månader har arbetsgivaren därefter skyldighet att erbjuda annan anställning, om arbetstagare så begär. Sysselsättningsgraden för denna anställning beräknas på 
genomsnittligt arbetade timmar per vecka under tolvmånadersperioden. En förutsättning 
för arbete enligt ovan är att arbetstagaren har tillräckliga kvalifikationer för arbetsuppgifterna. Detta stycke gäller inte arbete i festvåning. 
Rätt till tillsvidareanställning 
Om det efter lokala parters överläggning och utredning klarläggs att det finns ett konstant 
arbetskraftsbehov som kan schemaläggas, ska arbetsgivaren erbjuda tillsvidareanställning. 
Temporärt undantag avseende rätten att använda anställningsformen ”anställning för enstaka dagar” 
De centrala parterna kan vid central förhandling komma överens om att ett bolag temporärt ska undantas från rätten att använda sig av anställningsformen anställning för enstaka 
dagar. 
Fråntagandet av ovanstående rätt kan aktualiseras om de centrala parterna bedömer att bolaget konsekvent och grovt bryter mot kollektivavtalets förutsättningar för att använda sig 
av anställningsformen. 
Fråntagande av rättigheten gäller under den tid och vid den/de enhet/er som parterna överenskommer. 
2. Upphörande av tidsbegränsad anställning 
Om anställningen ska upphöra före den tid som från början överenskommits gäller en 
uppsägningstid om 14 dagar för både arbetsgivare och arbetstagare. Vid arbetsgivarens 
uppsägning ska varsel (meddelande) lämnas till den lokala fackliga organisationen som 
arbetstagaren tillhör sju dagar före besked om uppsägning till arbetstagaren. 
Utöver ovanstående gäller vid icke tidsbestämt vikariat att anställningen upphör när ordinarie arbetstagare kommer tillbaka i tjänst. 
2.1 Prövotid vid tidsbegränsad anställning 
En tidsbegränsad anställning kan bringas att upphöra genom att arbetsgivaren eller arbetstagaren lämnar underrättelse därom. Anställningen upphör då 14 dagar efter det att någondera parten skriftligen underrättat motparten om sin avsikt att avbryta anställningen. 
Möjligheten att genom underrättelse bringa anställningen att upphöra gäller endast under 
de första sex veckorna av den aktuella tidsbegränsade anställningen.

Prövotid får inte tillämpas för en arbetstagare om 
- arbetstagaren har haft flera på varandra följande tidsbegränsade anställningar utan 
längre uppehåll emellan än fjorton dagar, 
- de tidsbegränsade anställningarna har avsett samma befattning och 
- de tidsbegränsade anställningarna sammanlagt har pågått i mer än sex månader. 
I detta fall gäller reglerna i p. 2, upphörande av tidsbegränsad anställning, ovan. 
Är arbetstagaren fackligt organiserad ska arbetsgivaren samtidigt med underrättelsen 
meddela den lokala arbetstagarorganisation som arbetstagaren tillhör. 
5 § Överenskommelse om turordning 
Vid uppsägning och återanställning kan lokal överenskommelse om turordning träffas 
med HRF. 
 6 § Omställningstid vid omorganisation 
1. Denna bestämmelse reglerar omställningstid för en arbetstagare om en arbetsgivare 
genomför en omorganisation som innebär att en anställning ändras endast i förhållande till sysselsättningsgraden. En förutsättning är att arbetsgivaren i en sådan situation erbjudit arbetstagaren fortsatt anställning med lägre sysselsättningsgrad enligt 
7 § anställningsskyddslagen och att sysselsättningsgraden som en konsekvens av 
detta minskas. 
2. En arbetstagare som får minskad sysselsättningsgrad enligt punkten 1 ovan har rätt 
till en omställningstid. Omställningstiden är lika lång som den uppsägningstid som 
skulle ha tillämpats om arbetstagaren i stället skulle ha sagts upp när omställningstiden inleddes. Omställningstiden börjar att löpa från dagen då arbetstagaren accepterar erbjudandet. 
3. Under omställningstiden utgår oförändrad lön och andra anställningsförmåner. 
 
4. Omställningstiden innebär att den lägre sysselsättningsgraden träder i kraft först när 
omställningstiden löpt ut. 
5. Vid erbjudande om omplacering till annan ledig tjänst eller till annan tjänst i turordning gäller reglerna enligt 7 § anställningsskyddslagen. 
6. Överenskommelse, lokal eller individuell, kan träffas om annan omställningstid. 
Lön och andra anställningsförmåner enligt punkt 3 följer då den enskilt överenskomna omställningstiden. 
Anmärkning 
Enligt medbestämmandelagen har arbetsgivaren en skyldighet att genomföra förhandlingar med lokal facklig organisation innan beslut fattas om viktigare förändringar av organisationen.

7 § Anställningsbevis 
I samband med att anställningsavtal träffas, ska arbetsgivaren utfärda anställningsbevis 
enligt bilaga eller anställningsbevis med motsvarande uppgifter. Om särskilda skäl föreligger kan dock anställningsbevis utfärdas senast sju dagar efter det att arbetstagaren har 
börjat arbeta. 
Vid överenskommelse om ändringar i anställningsförhållandet, t.ex. vid kortare eller 
längre anställningstid, ska nytt anställningsbevis utfärdas. 
Mall för anställningsbevis, se bilaga 1. 
8 § Intyg – betyg 
1. Intyg 
När arbetstagare slutar, eller så begär, ska arbetsgivaren utfärda tjänstgöringsintyg, vilket 
anger arbetsuppgifter och anställningstid. 
2. Betyg 
Om anställningen omfattat minst tre månader och arbetstagaren inom tre månader efter 
anställningens upphörande begär det, ska arbetsgivaren inom 14 dagar utfärda betyg. 
Betyget ska ange arbetsuppgifter, anställningstid och vitsord. 
3. Arbetsgivarintyg 
Arbetsgivaren ska på begäran utfärda arbetsgivarintyg för arbetslöshetskassa enligt 
fastställt formulär.

3 Kap Arbetstid 
9 § Arbetstid 
Arbetstidslagen (1982:673) gäller med nedanstående ändringar och tillägg. 
1. Ordinarie arbetstid per vecka och beräkningsperioder 
Ordinarie arbetstid för heltidsanställd är 40 timmar i genomsnitt per vecka. 
För arbetstagare som stadigvarande arbetar nattjänst i hotellreception och huvudsakligen 
har sin arbetstid mellan kl 00.00 och 07.00 är ordinarie arbetstid för heltidsanställd 38 
timmar i genomsnitt per vecka. 
Genomsnittet får beräknas på högst: 
- 8-veckors beräkningsperiod för timavlönade, vilket innebär 320 respektive 
304 timmar för heltidsanställda. 
- 16-veckors beräkningsperiod för månadsavlönade, vilket innebär 608 respektive 
640 timmar för heltidsanställda. 
- 26 veckors beräkningsperiod enligt förutsättningarna angivna i femte stycket, 
vilket innebär 1 040 respektive 988 timmar för heltidsanställda. 
För deltidsanställd reduceras antalet timmar med hänsyn till anställningens omfattning. 
Beräkningsperioden för den genomsnittliga ordinarie arbetstiden ska anges på gällande 
schema. Om beräkningsperiod inte anges sammanfaller beräkningsperiod med schemaläggningsperiod. 
Vid tillämpning av högst 26-veckors beräkningsperiod ska följande förutsättningar gälla: 
- att arbetstagare som omfattas har en sysselsättningsgrad om lägst 70 %, 
- att arbetstagare som omfattas har månadslön, 
- att arbetsgivaren ska presentera ett schema för hela beräkningsperioden, som kan 
ändras med 14 dagars framförhållning i enlighet med 10 § samt att 
- var fjärde vecka ska ordinarie ledighetsdagar förläggas till fredag-lördag eller 
lördag-söndag. Dessa ledighetsdagar får inte ensidigt ändras av arbetsgivaren. 
Anmärkningar: 
1. Arbetstagare som, enligt andra stycket ovan, till 50 % eller mer av sin avtalade 
arbetstid (heltid, halvtid o.s.v.) arbetar nattjänst ska erhålla arbetstidsförkortning. 
Arbetstidsförkortningen ska ställas i relation till avtalad arbetstid och inte till den 
procentuella fördelningen mellan dagtjänst och nattjänst. 
2. Arbetstagare som till mindre del än 50 % av sin avtalade arbetstid arbetar natttjänst ska erhålla natt-OB.

1.1 Årsarbetstidsavtal 
Efter överenskommelse med HRF tillämpas upp till 12 månaders beräkningsperiod för arbetstiden enligt årsarbetstidsavtal, se bilaga 2. 
Anmärkningar: 
1. Om överenskommelse inte kan träffas vid lokal eller central förhandling, kan 
ärendet överlämnas till parternas avtalsråd. 
2. Vid företag som tillämpar detta avtal utan att vara ansluten till arbetsgivarorganisation gäller ej bilaga 2. 
2. Sammanlagd arbetstid 
Anmärkning: 
Enligt 10 b § Arbetstidslagen (1982:673) får den sammanlagda arbetstiden under 
varje period om sju dagar uppgå till högst 48 timmar i genomsnitt under en beräkningsperiod om högst fyra månader. Vid beräkningen av den sammanlagda arbetstiden ska semester och sjukfrånvaro under tid då arbetstagaren annars skulle ha arbetat likställas med fullgjord arbetstid. 
Efter lokal överenskommelse med HRF kan upp till sex månaders beräkningsperiod tilllämpas. Överenskommelsen ska ange på vilket sätt kompensation ska ske. 
Anmärkning: 
Som arbetstid räknas all tid då arbete utförs eller då arbetstagaren står till arbetsgivarens förfogande på arbetsplatsen. 
3. Byte av arbetstid 
Arbetsgivare och arbetstagare kan överenskomma om byte av arbetstid inom ramen för 
schemalagd arbetstid. Därvid ska begränsningarna i gällande arbetstidsbestämmelser iakttas. 
Reglering av över-/undertid ska ske inom gällande schemaläggningsperiod. Vid lokal förhandling med HRF kan överenskommelse träffas om annan regleringsperiod. 
Anmärkning: 
När arbetstagare slutar sin anställning och har undertid får löneavdraget härför 
inte överstiga innestående löneförmåner.

4. Veckovila/ordinarie ledighetsdagar 
Anmärkning: 
Enligt 14 § Arbetstidslagen (1982:673) ska arbetstagarna ha minst 36 timmars 
sammanhängande ledighet under varje period om sju dagar (veckovila). 
Sjudagarsperioden ska bestämmas i förväg och tillämpas konsekvent. Vid ett 
avbrott t.ex. i samband med schemaändring kan perioden bytas, dock med beaktande av gällande viloperioder (11 timmars dygnsvila och 36 timmars veckovila). 
Arbetstiden ska normalt förläggas så att arbetstagaren erhåller i genomsnitt två ledighetsdagar per vecka, om möjligt som två sammanhängande 24-timmarsperioder. 
Minst varannan vecka ska ledighetsdagar omfatta fredag-lördag, lördag-söndag eller 
söndag-måndag. Vid företag som normalt sett bedriver verksamhet sju dagar per vecka 
gäller dock att var fjärde vecka ska ledigheten omfatta fredag-lördag eller lördag-söndag. 
Avsteg från förläggning av ordinarie ledighetsdagar, enligt stycke ett och två ovan, kan 
göras för arbetstagare med annan huvudsaklig sysselsättning, som primärt kan eller förväntas arbeta, fredagar, lördagar och/eller söndagar. Arbetstagare har rätt att avstå från sådant avsteg.   
 
Lokala parter kan ingå en överenskommelse om möjlighet till undantag från reglerna om 
ordinarie ledighetsdagar för arbetstagare med huvudsaklig sysselsättning hos arbetsgivaren. Sedan sådan lokal överenskommelse träffats kan på arbetstagarens initiativ skriftlig 
överenskommelse om avsteg från ordinarie ledighetsdagar, enligt stycke två och tre ovan, 
träffas mellan arbetsgivare och arbetstagare. Part kan vid var tidpunkt säga upp överenskommelsen med 14 dagars framförhållning.  
Om särskilda skäl föreligger kan dock ledighetsdagarna omfatta lördag-söndag eller 
söndag-måndag var tredje vecka. 
Anmärkningar: 
1. Vid förläggning av dubbelledighet ska där så är möjligt ledigheten förläggas till 
lördag-söndag. 
2. Vid företag där behov föreligger kan efter överenskommelse vid lokal förhandling 
med HRF sexdagarsvecka tillämpas. 
3. Undantaget för de som primärt arbetar eller förväntas arbeta fredagar, lördagar 
och/eller söndagar, syftar på arbetstagare som i huvudsak bara har möjlighet att 
arbeta på helger med anledning av annan huvudsaklig sysselsättning, t ex studier. 
4. Syftet med undantaget är att höja sysselsättningsgraden för den berörde arbetstagaren och/eller att möjliggöra helgvila i större omfattning för övrig personal.

5. Arbetstid per 24-timmarsperiod 
Arbetstiden per 24-timmarsperiod får inte överstiga 10 timmar. 10-timmarspass får inte 
förekomma oftare än 3 gånger per 2-veckorsperiod i genomsnitt. 
Efter överenskommelse med berörda arbetstagare eller genom överenskommelse vid lokal 
förhandling med HRF, kan avsteg göras från bestämmelsen ovan. 
Uppehållet mellan de schemalagda arbetspassen ska vara minst sex timmar, med undantag 
för reglerna om indelning i vakter, punkt 6. 
Anmärkning: 
24-timmarsperioderna ska bestämmas i förväg och tillämpas konsekvent. Vid ett avbrott t.ex. i samband med schemaändring kan perioden bytas, dock med beaktande 
av gällande viloperioder (11 timmars dygnsvila och 36 timmars veckovila). 
6. Indelning i vakter 
Arbetstiden per dag ska normalt vara sammanhängande. 
I syfte att minska behovet av deltidsanställningar kan arbetet delas upp i högst två vakter 
per dag (s.k. utgångsvakt). Utgångsvakt ska normalt inte förekomma mer än två gånger 
per vecka. Uppehållet mellan vakterna ska vara minst tre timmar om inte överenskommelse om annan tid träffas. 
För arbetstagare med nattjänst ska arbetstiden per dygn vara sammanhängande. 
Genom överenskommelse vid lokal förhandling med HRF, kan avsteg göras från 
bestämmelsen ovan. 
7. Dygnsvila 
Arbetstiden ska förläggas så att arbetstagare får rimlig dygnsvila, minst 11 timmar sammanhängande per 24-timmarsperiod. 
Genom överenskommelse vid lokal förhandling med HRF, kan avsteg göras från bestämmelsen ovan. Överenskommelsen ska ange på vilket sätt kompensation ska ske. 
Anmärkning: 
24-timmarsperioderna ska bestämmas i förväg och tillämpas konsekvent. Vid ett avbrott t.ex. i samband med schemaändring kan perioden bytas dock med beaktande 
av gällande viloperioder (11 timmar dygnsvila och 36 timmar veckovila).

9. Måltidsraster och måltidsuppehåll 
På företaget kan tillämpas måltidsraster eller måltidsuppehåll. 
Schemalagda måltidsraster räknas ej som arbetstid och kan fritt disponeras av arbetstagaren. 
Måltidsrast som arbetstagare inte har givits tillfälle att ta ut ska medföra övertidskompensation. 
När arbetsförhållandena på företaget eller på viss avdelning kräver det, kan istället måltidsuppehåll tillämpas. Måltidsuppehåll räknas som arbetstid och läggs ut efter läglighet. 
Måltidsrasternas sammanlagda längd får i genomsnitt vara högst en timme per dag. Vid 
en bruttoarbetstid om högst 4,5 timmar får måltidsrasten vara högst 30 minuter. 
För arbetstagare med nattjänst tillämpas alltid måltidsuppehåll. Med nattjänst avses att arbetstiden är utlagd mellan kl 00.00 och 07.00.

10§ Arbetstidsschema 
1. Arbetsgivaren ska i sin schemaplanering arbeta för att undvika schemaändringar. 
Arbetsgivaren får göra schemaändringar på grund av orsaker direkt kopplade till 
verksamheten. Innan arbetsgivaren fastställer/ändrar arbetstidsschema ska samråd 
ske med berörda arbetstagare. Samråd ska ske senast 14 dagar innan det börjar 
gälla, om inte annat överenskommits. Om invändning framförs mot förslag till 
schema och invändningen bekräftas genom underrättelse till arbetsgivaren av behörig facklig företrädare, ska arbetsgivaren begära lokal förhandling med HRF. 
Var fjärde vecka ska arbetsgivaren presentera, i enlighet med 10 § punkten 3, ett 
schema som utöver den fastslagna tvåveckorsperioden sträcker sig fyra veckor, eller 
den längre period som arbetsgivaren bestämmer, framåt i tiden. Ett sådant schema 
kan ändras med 14 dagars framförhållning i enlighet med 10 § punkten 1. 
Avsteg från andra stycket kan göras genom enskild överenskommelse eller genom 
lokal överenskommelse med HRF. Sådan överenskommelse får inte villkoras i samband med anställningens ingående. 
2. Om särskilda skäl föreligger får schemaförslag tillämpas innan förhandlingsskyldighet enligt punkt 1 fullgjorts. 
3. Skriftligt arbetstidsschema sätts upp, eller hålls tillgängligt på lämpligt ställe på arbetsplatsen. Arbetstagare som så begär ska erhålla schema i pappersform. Schemat 
för respektive arbetstagare ska ange: 
- arbetets början och slut, 
- rasternas längd och förläggning, 
- tillämplig beräkningsperiod för ordinarie arbetstid, samt 
- vilka 24-timmars och 7-dagarsperioder som tillämpas. 
11§ Övertidsarbete 
På arbetsgivarens begäran är arbetstagare skyldig att arbeta på övertid i den omfattning 
arbetstidslagen medger. Besked om övertidsarbete ska lämnas snarast möjligt. 
För att övertidskompensation ska utgå ska besked om övertidsarbete ha lämnats på förhand. Övertidsarbete kan också godkännas i efterhand, dock senast inom en månad efter 
löneutbetalningen för perioden.

Övertidsarbete kompenseras som huvudregel genom extra betalning enligt följande.

per vecka under gällande beräkningsperiod. 
Arbete utöver mertid är övertid.

16§ Permission 
1. Med permission menas kort ledighet med lön högst en dag. Vid nära anhörigs begravning kan permission dock också omfatta nödvändiga (högst två) resdagar. 
2. Permission kan beviljas i följande fall: 
 Eget bröllop 
 Egen 50-årsdag 
 Förstagångsbesök hos läkare eller tandläkare vid akut sjukdom eller olycksfall 
 Besök vid sjukvårdsinrättning efter remiss av företagsläkare eller annan av arbetsgivaren anvisad läkare 
 Nära anhörigs frånfälle 
 Nära anhörigs begravning även som därpå följande urnnedsättning 
 Plötsligt svårt sjukdomsfall hos hemmaboende nära anhörig. 
3. Som nära anhörig räknas make/maka, registrerad partner, barn, syskon, föräldrar, 
svärföräldrar och far- och morföräldrar samt den med vilken arbetstagaren stadigvarande sammanbor. 
4. Arbetstagare som arbetat del av dag och därefter måste lämna arbetsplatsen under 
återstoden av arbetsdagen på grund av arbetsskada, ska erhålla permission under 
denna tid. 
5. Ansökan om permission ska göras i så god tid som möjligt. Orsaken till permission

20§ Sjuklön 
1. Rätt till sjuklön 
Rätten till sjuklön regleras i lagen (1991:1047) om sjuklön, SjLL. 
Anmärkning: 
Enligt SjLL gäller rätten till sjuklön fr.o.m. den första anställningsdagen. 
Vid anställning för kortare tid än en månad utges dock sjuklön först efter tillträde 
och 14 dagars sammanhängande anställningstid. Om nyanställning påbörjas inom 
14 dagar från föregående anställnings upphörande medräknas tidigare anställningstid vid beräkning av kvalifikationstiden om 14 dagar. 
2. Sjukanmälan och sjukintyg 
2.1 Anmälan om sjukdom och återgång i arbete
Vid frånvaro på grund av sjukdom eller olycksfall ska arbetstagare omgående göra anmälan till arbetsgivaren. Vidare ska arbetstagaren så snart som möjligt meddela arbetsgivaren när återgång i arbete beräknas kunna ske. Sådant besked ska lämnas senast dagen före 
återgång. 
Arbetstagaren och arbetsgivaren ska medverka till att nödvändiga kontakter under sjukskrivning kan ske. I de fall arbetsgivaren har en skyldighet att tillhandahålla rehabilitering 
har arbetstagaren en skyldighet att medverka till sin rehabilitering. 
2.2 Försäkran och läkarintyg 
Skriftlig försäkran ska lämnas till arbetsgivaren om sjukdomens omfattning. Sjuklön utbetalas efter det att sådan försäkran lämnats. 
Vid frånvaro på grund av sjukdom som varar längre tid än sju dagar efter sjukanmälningsdagen är arbetstagaren skyldig, enligt SjLL, att uppvisa läkarintyg. 
Om skäl föreligger kan arbetsgivaren från tidigare dag begära läkarintyg utfärdat av anvisad läkare. Begäran kan ej avse förfluten tid. Läkarintyget bekostas då av arbetsgivaren. 
Arbetsgivaren ska på arbetstagarens begäran skriftligen motivera skälen för begäran av 
läkarintyg från tidigare dag. 
Anmärkning: 
Arbetsgivaren tillhandahåller formulär för försäkran. 
3. Inskränkningar i rätten till sjuklön 
Utöver vad som anges i 5 § SjLL gäller att, om den anställde har undantagits från sjukförmåner eller dessa har nedsatts enligt socialförsäkringsbalk (2010:110), arbetsgivaren inte 
är skyldig att utge sjuklön eller har rätt att nedsätta denna i motsvarande mån.

4. Sjuklönens storlek 
Sjuklönens storlek regleras i 6 § SjLL med anpassning för karens enligt 4.2 och 4.3. 
4.1 Beräkningsperiod 
Sjuklön beräknas på ordinarie lön – månadslön, timlön eller rörlig lön – för innevarande 
löneperiod eller på närmast föregående löneperiod. Beräkningsperiod bestäms fr.o.m. att 
detta avtal börjar tillämpas. Byte av beräkningsperiod får ske efter överenskommelse vid 
lokal förhandling med HRF. 
4.2 Karensperiod 
Sjuklöneperioden inleds med en karensperiod. Under karensperioden utges ingen sjuklön. 
Karensperioden uppgår till 20 % av arbetstagarens genomsnittliga veckoarbetstid. 
Anmärkning: 
1. Med genomsnittlig veckoarbetstid avses arbetstagarens arbetstid i timmar under 
en normalvecka. För anställda på enstaka dagar eller liknande eller med oregelbunden tjänstgöring beräknas ett snitt över en representativ period. 
2. Vid återinsjuknande inom fem kalenderdagar fortsätter samma karensperiod upp 
till 20 % av arbetstagarens genomsnittliga veckoarbetstid. 
3. Antalet karensperioder begränsas till tio under en tolvmånadersperiod. Karensperiod som sträcker sig över flera dagar i en och samma sjukperiod räknas som en 
(1) karensperiod. 
4.3 Sjuklön efter karensperiod till och med dag 14 
Sjuklön utgår efter karensperioden t o m dag 14 i sjukperioden. Under denna period utgår 
sjuklön enligt följande: 
4.3.1 Sjuklön utgår med 80 % av ordinarie månadslön dividerat med antalet arbetstimmar per kalendermånad för varje timme den anställde varit frånvarande från 
arbetet efter karensperioden t.o.m. dag 14, som skulle ha varit arbetsdagar i varje 
sjukfrånvaroperiod. Vid timlön utges 80 % av ordinarie timlön. 
4.3.2 För rörlig lön utgår sjuklön med 80 % av genomsnittlig rörlig lön beräknad på arbetad tid, utöver lön enligt punkt 4.3.1 för varje timme arbetstagaren varit frånvarande. Till anställd som skulle ha arbetat på obekväm arbetstid utgår sjuklön med 
80 % av den OB-ersättning arbetstagaren gått miste om.

Fr.o.m. den 15:e dagen tillämpas avdragsreglerna för månadslön i 18§.

Ingress 
Företag inom Visitas och HRFs avtalsområden är mycket olika till storlek och karaktär. 
Företagen har också starkt varierande beläggning och omsättning samt skiftande typer av 
uppdrag. 
Parterna förklarar sig positiva till att branschens företag inom ramen för gällande lagar 
och avtal får möjlighet att reglera arbetstidsfrågor så att respektive företags särskilda förutsättningar beaktas. Parterna bedömer att sådana lösningar är till gagn både för anställda 
och företag. Ökad produktivitet och flexibilitet bidrar till ökad lönsamhet. En väg till detta 
kan vara att skapa längre beräkningsperioder. Syftet med sådana är bl.a. att skapa fler heltidstjänster och därmed minska behovet av deltids- och extra anställningar, dels förlänga 
säsongsanställningar och dels ge förutsättningar för ökad kontinuitet och kvalitet i företagens verksamhet. Parternas avsikt är att både anställda och företag ska finna former för 
utveckling. 
Parterna förklarar sig även positiva till att de lokala parterna träffar avtal om flextidssystem. Riktlinjer utfärdas av de centrala parterna. 
Huvudregeln är att alla Visita-anslutna företag efter lokal förhandling ska kunna omfattas 
av detta avtal. 
Vid avgörande av om arbetstidsavtal enligt denna bilaga ska upprättas kan exempelvis 
följande kriterier beaktas: 
– variation i beläggning 
– variation i öppethållande avseende året, dagar i veckan och sett över dygnet m.m. 
– variation i omsättning, t.ex. kvartalsvis.

Bilaga 7 
Överenskommelse om riktlinjer för kompetensutveckling 
Inriktning 
Konkurrensförmågan hos företagen inom hotell- och restaurangbranschen blir allt mer beroende av kvalificerade medarbetare. För att verksamheten ska utvecklas är det även viktigt med en kontinuerlig och planerad kompetensutveckling av medarbetarna. 
Utvecklingen kan i hög grad ske direkt på arbetsplatsen genom en flexibel och stimulerande arbetsorganisation där teori och praktik blandas. 
En fortlöpande utveckling av företag och medarbetare skapar förutsättningar för lönsamhet och tryggare anställning. 
Rätt och ansvar 
Alla medarbetare har såväl rätt till, som eget ansvar för, att kontinuerligt utvecklas i arbetet. Kvinnor och män ska ges samma möjlighet till kompetensutveckling. 
Utforma i samverkan 
Utformningen av kompetensutvecklingen är en ledningsuppgift. Kompetensutveckling utgår från en långsiktig verksamhetsanalys, genomförd av företaget efter samråd med den 
lokala fackliga organisationen/fackligt ombud i företaget. I analysen förutsätts varje medarbetares medverkan och engagemang. Vid analysen fastställs planer för kompetensutveckling, vilka utformas och följs upp kontinuerligt med hänsyn till konkurrens- och omvärldssituationen. 
Kartläggningen av den enskilde medarbetarens utvecklingsbehov och planeringen av de 
åtgärder som är lämpliga sker i samverkan med medarbetaren. 
Utvecklingssamtal och arbetsplatsträffar rekommenderas som grund för planering av 
kompetensutvecklingen. 
Kostnader 
Den kompetensutveckling som behövs för att klara nuvarande och kommande arbetsuppgifter i företaget ska ske på betald arbetstid. 
Stimulera och premiera 
Kompetensutveckling måste uppmärksammas, stimuleras och premieras. Vid lönesättningen bör det vara naturligt att koppling sker till resultat och kompetens.

Parterna har en gemensam uppfattning att bemanningsföretag kan vara ett komplement till 
ett företags ordinarie verksamhet. Parterna har därför, med beaktande av de förutsättningar som gäller inom avtalsområdet, träffat överenskommelse om regler vid anlitande 
av bemanningsföretag när det finns personer som har företrädesrätt till återanställning efter uppsägning på grund av arbetsbrist. 
1 § Inhyrning i samband med företrädesrätt till återanställ-
 ning 
Denna reglering avser inhyrning i samband med företrädesrätt till återanställning beroende på tillsvidareanställdas uppsägning på grund av arbetsbrist. 
När det finns före detta arbetstagare som är uppsagda på grund av arbetsbrist och som har 
företrädesrätt till återanställning gäller följande räknat från den dag då uppsägningstiden 
löper ut för de arbetstagare som har längst uppsägningstid (LAS 11 § stycke 1). 
Arbetsgivare som avser att anlita bemanningsföretag för tid överstigande fem veckor härefter ska uppta förhandling med lokal facklig organisation i syfte att uppnå enighet. I förhandlingen anges skälen för att anlita bemanningsföretag. Förhandlingen ska även klargöra i fall arbetsgivarens krav kan tillgodoses genom återanställning av arbetstagare med 
återanställningsrätt under förutsättning att arbetstagaren har tillräckliga kvalifikationer. 
Om företaget fattat beslut om nedläggning av en driftsenhet eller flytt av hela eller delar 
av verksamheten gäller inte några begränsningar mot inhyrning av arbetskraften från bemanningsföretag under den tid beslutet om nedläggning eller flytt verkställs. Nedläggningsprocessen ska i normalfallet inte överskrida sex månader. 
Kan de lokala parterna inte enas kan arbetsgivaren snarast påkalla central förhandling efter avslutad lokal förhandling. Central förhandling ska äga rum inom tio dagar från påkallandet. De centrala parterna ska verka för en lösning av förhandlingsfrågan vilken beaktar 
både företagets behov och arbetstagarnas berättigade intressen. 
Vid oenighet i den centrala förhandlingen kan arbetsgivarsidan inom tre arbetsdagar från 
förhandlingens avslutande, hänskjuta saken till nämnd enligt 2 § Nämnden för inhyrning. 
Underlåter arbetsgivarsidan att påkalla central förhandling eller hänskjuta saken till 
nämnd, kan inhyrning inte vidtas alternativt ska den avslutas inom fjorton dagar.

1. Med bemanningsföretag avses bemanningsföretag enligt lagen (1993:440) om

Parterna är ense om att inrätta en nämnd för inhyrning enligt nedan. 
Förfarandet i nämnden ska vara förenklat och snabbt. 
Nämnden ska bestå av tre ledamöter, en från Hotell- och restaurangfacket, en från Visita 
och en opartisk ordförande som parterna utser gemensamt bland ordinarie domare i 
Arbetsdomstolen, Svea Hovrätt eller Högsta Domstolen. Den opartiska ordföranden arvoderas av parterna med lika delar. 
Nämnden ska meddela beslut skyndsamt och som regel senast inom tre veckor från påkallandet. Ett beslut kan ske även om endera parten inte efterkommit en begäran att inkomma

Arbetsgivare som följer nämndens utlåtande och förfarandet enligt ovan kan inte bli

Avtal om löner m.m. 
 1 § Allmänt 
Vid företag, som under avtalstiden ansluter sig till Visita och vid arbetsplats, som under 
avtalstiden övertas av företag som är bundet av detta avtal, gäller att arbetstagares sammantagna löneförmåner inte får sänkas på grund av att detta avtal börjar gälla. 
Kvinnor och män ska ha lika lön för arbete av lika värde. 
 2 § Principer för lönesättning 
Riktlinjer för lönesättning på företaget 
Utveckling på företagsnivå av lönepolitik och lönesystem avser att stimulera teknisk och 
arbetsorganisatorisk utveckling, att öka arbetstagarnas kompetens, att utveckla arbetsinnehåll, att öka servicegrad, kvalitet och kundorientering samt att öka företagens konkurrenskraft, produktivitet och lönsamhet. 
Arbetsgivaren och arbetstagarna har ett gemensamt ansvar för att alla arbetstagare ges 
möjlighet till ökad kompetens och utveckling i arbetet. 
En förutsättning för detta är ett målmedvetet arbete på företaget för att skapa för alla arbetstagare gemensamma och av alla arbetstagare kända utgångspunkter för såväl arbetsorganisationen som för lönesystemet. Sådant arbete sker i samverkan mellan de lokala parterna. 
I samband med de lokala förhandlingarna ska de lokala parterna kartlägga och analysera 
lönesituationen på arbetsplatsen. Kartläggningen och analysen ska genomföras så att kravet på den enskildes integritet tillgodoses. Kartläggningen och analysen ska också innefatta frågan huruvida omotiverade skillnader i fråga om löneläge och löneutveckling föreligger. 
Principer för lokal och individuell lönesättning 
Individuell lönesättning används för att verka stimulerande på arbetstagarna. Syftet är att 
skapa en process där arbetstagarens resultat och löneutveckling knyts samman så att det 
positiva sambandet mellan resultat, motivation och lön uppnås. 
Riktlinjer för individuell lönesättning och checklista vid förhandling om pottfördelning 
framgår av bilaga A och B.

4. Beräkning av yrkesvana 
Yrkesvana förvärvas genom arbete inom hotell- och restaurangområdet och genom motsvarande arbete på fartyg, inom storhushåll eller liknande och genom utbildning inom hotell- och restaurangområdet samt annan utbildning som bedöms vara likvärdig. 
Ett utbildningsår motsvarar ett yrkesvaneår. 
Yrkesvana i lönegrupp 2 förvärvas genom allt arbete inom lönegrupp 1. 
Yrkesvana i lönegrupp 1 förvärvas genom arbete som är likvärdigt med den befattning 
som arbetstagaren ska tillträda. 
Om arbete utförts under minst ett års tid, får ett yrkesvaneår tillgodoräknas även i följande 
fall 
a) om deltidsarbete om minst 75 % utförts eller 
b) när arbete omfattande minst 1 300 timmar utförts. 
För att få tidigare yrkesvana tillgodoräknad ska arbetssökande i samband med att överenskommelse om anställning träffas, visa betyg eller intyg.

Bilaga A 
Riktlinjer för individuell lönesättning 
Riktlinjerna är tänkta att stimulera arbetsgivarna att använda möjligheten till individuell 
fördelning samt att vägleda i detta arbete. Fördelen med en individuell lönesättning är att 
den verkar stimulerande på arbetstagarna i och med att var och en bedöms efter sin egen 
förmåga och sina egna insatser. För att den individuella lönesättningen ska få denna verkan är det viktigt att arbetsgivarens kriterier för lönesättning görs kända för arbetstagarna. 
Ett hjälpmedel i detta kan vara att upprätta en policy för vad som styr lönesättningen, 
d.v.s. vilka kriterier som är viktiga i bedömningen. För att lönesättningen ska bli väl fungerande i det individuella företaget är det dock viktigt att lönepolicyn anpassas till det 
egna företaget. 
Checklista vid förhandling om pottfördelning 
Som hjälp till de lokala parterna har kollektivavtalsbärande centrala parter tagit fram en 
checklista, som innehåller vad arbetsgivaren har att göra; se bilaga B. 
Förankring av lönepolicyn 
För att den individuella lönesättningen ska få de positiva effekter som beskrivits ovan, är 
det viktigt att den är väl förankrad på arbetsplatsen. Förankringen av lönepolicyn sker 
lämpligen vid arbetsplatsträffar och vid utvecklingssamtal med de enskilda arbetstagarna. 
Genom att diskutera kriterier för lönepolicyn vid utvecklingssamtal med enskilda arbetstagare, får arbetsgivaren en direkt koppling till arbetstagarens behov av och önskemål om 
vidareutbildning eller annan kompetensutveckling. En inventering görs av arbetstagarens 
kunskaper och av arbetsgivarens behov. 
Inför att en arbetsgivare vill börja tillämpa individuell lönefördelning ska arbetsgivaren 
påkalla MBL-förhandling. Vid förhandlingen ska arbetsgivaren redogöra för: 
- lönekriterier och eventuell viktning av dessa, 
- hur förankringen av löneprocessen är tänkt att ske på arbetsplatsen, 
- en tidsplan för arbetet, inklusive tidsperiod för medarbetarsamtal. 
Individsamtal bör vara en naturlig del av lönefördelningsprocessen. Det är viktigt med en 
tydlighet beträffande vem hos arbetsgivaren som ska genomföra individsamtalen och att 
denne person har kunskap att genomföra sådana samtal. Det är arbetsgivarens ansvar att 
informera arbetstagarna om utfallet av lönefördelningen. Vid behov bör även utfallet motiveras för den enskilde arbetstagaren. 
De lönekriterier som arbetstagarna ska bedömas enligt ska vara tydliga och anpassade till 
verksamhetens krav. Lönekriterierna ligger till grund för vilken löneökning som ska utgå 
vid lönerevisionen. Bästa resultat för ökat engagemang och främjandet av arbetstagarnas 
utveckling uppnås om kriterierna fastställs på den enskilda arbetsplatsen. I framtagandet 
av lokala riktlinjer kan följande frågor vara till hjälp:

[Sida 65]
63 
Vad ska vi kännetecknas av för att bli framgångsrika? Hur ska vi nå ökad lönsamhet? 
Vilka krav ställer det på arbetstagarna? 
Exempel på lämpliga kriterier: 
1. Personliga 
2. Yrkesmässiga 
3. Ansvar 
4. Utveckling 
1. Personliga 
Kriteriet avser att kunna värdera sådana individrelaterade faktorer som tillför företaget ett 
mervärde. Exempel: förmåga till personlig effektivitet, mångkunnighet och flexibilitet, 
förmåga att ta ansvar för verksamheten, förmåga till helhetssyn, idérikedom, initiativförmåga, pedagogiska färdigheter, samarbetsförmåga och förmåga att entusiasmera andra. 
2. Yrkesmässiga 
Kriteriet avser att mäta kunskaper, färdigheter och erfarenheter som är direkt kopplade till 
yrkesrollen. Exempel: god branschkännedom, språkkunskaper, pedagogiska färdigheter, 
noggrannhet och servicekänsla. Använder arbetstagaren sina kunskaper, färdigheter och 
erfarenheter för att förbättra förutsättningarna för verksamheten? Delar arbetstagaren med 
sig av sina kunskaper och erfarenheter? 
3. Ansvar 
Kriteriet avser att mäta ansvar som ingår i befattningen. Här kan faktorer som arbetsuppgifternas svårighetsgrad och ansvar som därav följer vägas in. Tar arbetstagaren ansvar 
för ålagda arbetsuppgifter och fattade beslut? Exempel på ansvar inom befattningen är inköp, beställning, kvalitetskontroll, planering, jour och arbetsledning. Kriteriet avser även 
att mäta ansvar som normalt inte ingår i befattningen, men som avgränsar sig till den egna 
arbetsinsatsen. Det kan handla om att ta ansvaret för ett speciellt arbetsområde eller en arbetsuppgift som t.ex. säkerhet och arbetsmiljö. 
4. Utveckling 
Kriteriet avser att mäta arbetstagarens utveckling av kunskaper och färdigheter, relevanta 
för verksamheten. Exempel: att arbetstagaren utvecklar sin skicklighet genom utbildning 
eller praktik.

Som hjälp till de lokala parterna har kollektivavtalsbärande centrala parter tagit fram en

1. Att arbetsgivaren har tagit fram lönekriterier. 
2. Att arbetsgivaren har informerat de anställda om att företaget tillämpar individuell 
lönefördelning och vilka lönekriterier som används. 
Har arbetstagarna informerats om 
- att ni använder er av individuell fördelning, 
- vad lönefördelningen styrs av och 
- hur löneprocessen ser ut? 
3. Att arbetsgivaren genomfört individsamtal. 
Har ni samtalat med arbetstagaren och återkopplat er syn på prestationen? 
4. Att arbetsgivaren har tillhandahållit uppgifter till den lokala fackliga organisationen om 
- Företagets lönekriterier 
- Poängsättning eller annat jämförbart bedömningssystem 
- Beräkningsunderlag (hur potten beräknats) 
- Fördelningsunderlag (hur potten fördelats) 
- Yrkesbenämning (exempelvis kock) 
- Lön innan revision 
- Fördelning av pott 
- Föreslagen ny lön efter revision 
- Sysselsättningsgrad 
- Anställningsår 
-Yrkesvaneår (över/under 6 år) 
- Ålder 
- Kön 
- Anställnings-id 
5. Pottens storlek beräknats enligt löneavtalet. Potten kan inte användas för höjning 
- till 6 års yrkesvana, 
- enligt åldersstegen för ungdomar eller 
- vid byte mellan lönegrupperna.

let _recorder=null, _recChunks=[], _recStart=null, _recTimer=null;
let _lastFormScroll=0;

async function startRecording(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    _recChunks=[];
    _recorder=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported("audio/webm;codecs=opus")?"audio/webm;codecs=opus":"audio/webm"});
    _recorder.ondataavailable=e=>{if(e.data.size>0)_recChunks.push(e.data);};
    _recorder.onstop=()=>{stream.getTracks().forEach(t=>t.stop());};
    _recorder.start(1000);
    _recStart=Date.now();
    S={...S,recording:true,recDuration:0};
    draw();
    _recTimer=setInterval(()=>{S={...S,recDuration:Math.floor((Date.now()-_recStart)/1000)};draw();},1000);
  }catch(err){
    console.error("Mic error:",err);
    alert("Kunde inte starta mikrofonen. Kontrollera att du tillåtit mikrofonen i webbläsaren.");
  }
}

async function stopRecording(){
  if(!_recorder||_recorder.state!=="recording")return;
  clearInterval(_recTimer);
  return new Promise(resolve=>{
    _recorder.onstop=async()=>{
      _recorder.stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(_recChunks,{type:_recorder.mimeType||"audio/webm"});
      _recChunks=[];
      _recorder=null;
      S={...S,recording:false,transcribing:true,recDuration:0};
      draw();
      try{
        const text=await transcribeAudio(blob);
        const prev=S.form.transkription||"";
        S={...S,transcribing:false,form:{...S.form,transkription:prev?(prev+"\n\n"+text):text}};
        draw();
      }catch(err){
        console.error("Transcription error:",err);
        S={...S,transcribing:false};
        draw();
        alert("Transkribering misslyckades: "+err.message);
      }
      resolve();
    };
    _recorder.stop();
  });
}

async function transcribeAudio(blob){
  const key=S.openaiKey||"";
  if(!key){throw new Error("Ingen OpenAI API-nyckel angiven. Lägg till den under Inställningar (⚙️).");}
  const fd=new FormData();
  fd.append("file",blob,"interview.webm");
  fd.append("model","whisper-1");
  fd.append("language","sv");
  fd.append("response_format","text");
  const r=await fetch("https://api.openai.com/v1/audio/transcriptions",{
    method:"POST",
    headers:{"Authorization":"Bearer "+key},
    body:fd
  });
  if(!r.ok){
    const errText=await r.text().catch(()=>"");
    if(r.status===401) throw new Error("OpenAI API-nyckeln är ogiltig. Kontrollera den under Inställningar.");
    throw new Error("OpenAI-fel ("+r.status+"): "+errText.slice(0,200));
  }
  return (await r.text()).trim();
}

function fmtRecTime(secs){
  const m=Math.floor(secs/60).toString().padStart(2,"0");
  const s=(secs%60).toString().padStart(2,"0");
  return m+":"+s;
}

  const arr=loadFeedback();
  const byAgent={};
  arr.forEach(f=>{
    const k=f.mode?f.agent+" / "+f.mode:f.agent;
    if(!byAgent[k]) byAgent[k]={up:0,down:0,comments:[]};
    if(f.rating==="up") byAgent[k].up++;
    else byAgent[k].down++;
    if(f.comment) byAgent[k].comments.push({comment:f.comment,timestamp:f.timestamp,rating:f.rating,preview:f.msgPreview});
  });
  return {total:arr.length,byAgent,raw:arr};
}

const PW_HASH="9175834d6532348281fcb48c78d04235314e27cebee74e82bad46cef2998ab99";
async function checkPassword(pw){
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(pw));
  const hex=[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
  if(hex===PW_HASH){localStorage.setItem("carotte_auth","ok");set({locked:false});}
  else{set({pwError:true});}
}

// ── API ──────────────────────────────────────────────────────────
async function callAI(messages,sys,tools,model){
  const API_KEY="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";
  const hdrs={"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true","x-api-key":S.apiKey||API_KEY};
  const useModel=model||DEFAULT_MODEL;
  // Prompt caching: lagra stora system-promptar i ephemeral cache (1h TTL).
  // 90% rabatt på cached input. Aktiveras endast för promptar över ~5000 chars
  // för att säkerställa att vi når token-minimum för cache.
  const systemBlocks = typeof sys==="string" && sys.length>5000
    ? [{type:"text",text:sys,cache_control:{type:"ephemeral"}}]
    : sys;
  const body={model:useModel,max_tokens:8000,system:systemBlocks,messages};
  if(tools && tools.length) body.tools = tools;
  const bodyStr=JSON.stringify(body);
  const sizeMB=(bodyStr.length/1024/1024).toFixed(1);
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:hdrs,body:bodyStr
    });
    if(!r.ok){
      const e=await r.json().catch(()=>({}));
      const errMsg=e.error?.message||`HTTP ${r.status}`;
      if(r.status===413||/too large|size/i.test(errMsg)){
        throw new Error(`Förfrågan är för stor (${sizeMB} MB). Försök komprimera planritningen eller använd en bildversion istället för PDF.`);
      }
      if(r.status===401){throw new Error("API-nyckeln är ogiltig eller har gått ut. Kontakta admin.");}
      if(r.status===429){throw new Error("För många förfrågningar – vänta en stund och försök igen.");}
      throw new Error(errMsg);
    }
    const d=await r.json();
    return d.content.filter(b=>b.type==="text").map(b=>b.text).join("\n");
  }catch(err){
    // Nätverksfel innan svar
    if(err.message==="Failed to fetch"||err.name==="TypeError"){
      throw new Error(`Anslutningen misslyckades (payload ${sizeMB} MB). Vanliga orsaker:\n• Bifogade filer är för stora – försök komprimera PDF eller använd JPG/PNG\n• Nätverksavbrott – kontrollera anslutningen\n• Webbläsaren kan blockera stora requests – prova ladda om sidan\n\nTekniskt fel: ${err.message}`);
    }
    throw err;
  }
}

const MENU_URLS={
  werket:"https://carotte.se/restauranger/jonkoping-werket/dagens-lunch/",
  lappstiftet:"https://carotte.se/restauranger/lappstiftet/dagens-lunch/",
  gardet:"https://carotte.se/restauranger/meny-carotte-gardet/",
  agdas:"https://agdasstockholm.se/restaurang",
  bangbang:"https://carotte.se/restauranger/bangbangbangers/"
};
function detectRestaurant(text){
  const t=text.toLowerCase();
  if(t.includes("werket")||t.includes("jönköping"))return"werket";
  if(t.includes("läppstiftet")||t.includes("lappstiftet"))return"lappstiftet";
  if(t.includes("gärdet")||t.includes("gardet"))return"gardet";
  if(t.includes("agdas"))return"agdas";
  if(t.includes("bang"))return"bangbang";
  if(t.includes("meny")||t.includes("lunch")||t.includes("mat")||t.includes("äter"))return"werket";
  return null;
}
async function fetchMenuText(restaurant){
  try{
    const url=MENU_URLS[restaurant];
    const resp=await fetch(url,{mode:"cors"});
    if(!resp.ok)return null;
    const html=await resp.text();
    // Extrahera bara texten (ta bort HTML-taggar)
    const tmp=document.createElement("div");
    tmp.innerHTML=html;
    // Ta bort script/style
    tmp.querySelectorAll("script,style,nav,header,footer").forEach(el=>el.remove());
    return tmp.innerText.replace(/\s+/g," ").slice(0,3000);
  }catch{return null;}
}

async function send(content,convId,agentId,history){
  const uMsg={role:"user",content};
  const isFirst=history.length===0;
  updMsgs(convId,agentId,m=>[...m,uMsg],isFirst?content.slice(0,42):null);
  S={...S,loading:true};draw();
  try{
    let sys=agentId==="iso"?SP[`iso_${S.isoMode||"radgivare"}`]:SP[agentId];
    if(agentId==="iso"&&S.isoDocs.length>0)
      sys+="\n\n"+S.isoDocs.filter(d=>d.content).map(d=>`=== ${d.name} ===\n${d.content}`).join("\n\n");
    if(agentId==="kunskapsbank"&&S.docs.length>0)
      sys+="\n\n"+S.docs.filter(d=>d.content).map(d=>`=== ${d.name} ===\n${d.content}`).join("\n\n");
    if(agentId==="kollektivavtal"&&S.kaAvtal&&KA_AVTAL[S.kaAvtal])
      sys=SP.kollektivavtal.replace("{AVTAL_TEXT}",KA_AVTAL[S.kaAvtal]);
    const apiMsgs=[...history,uMsg].map(m=>({role:m.role,content:m.content}));
    const reply=await callAI(apiMsgs,sys,null,pickModel(agentId,S.isoMode));
    updMsgs(convId,agentId,m=>[...m,{role:"assistant",content:reply}]);
  }catch(e){
    updMsgs(convId,agentId,m=>[...m,{role:"assistant",content:`⚠️ ${e.message}`,error:true}]);
  }finally{set({loading:false});}
}

      : "\n\nAnalysera planritningarna ovan. Om det finns flera våningar, summera total yta och gör kalkylen för hela fastigheten.")}
  ]};

    const apiMsgs=[...history.map(m=>({role:m.role,content:m.content})),uMsg];
    let finalApiMsgs=apiMsgs;
    if(agentId==="kunskapsbank"){
      const menuQ=detectRestaurant(content);
      const isMenuQ=typeof content==="string"&&(content.toLowerCase().includes("meny")||content.toLowerCase().includes("lunch")||content.toLowerCase().includes("mat")||content.toLowerCase().includes("serveras")||content.toLowerCase().includes("äter")||content.toLowerCase().includes("imorgon"));
      if(menuQ&&isMenuQ){
        const fetched=await fetchMenuText(menuQ);
        const today=new Date().toLocaleDateString("sv-SE",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
        const extra=fetched
          ?`\n\n[LIVE MENYDATA HÄMTAD ${today} från ${MENU_URLS[menuQ]}]:\n${fetched}`
          :`\n\n[OBS: Kunde inte hämta aktuell meny live. Dagens datum: ${today}. Hänvisa användaren till ${MENU_URLS[menuQ]} för veckans meny.]`;
        const lastMsg=finalApiMsgs[finalApiMsgs.length-1];
        finalApiMsgs=[...finalApiMsgs.slice(0,-1),{...lastMsg,content:lastMsg.content+extra}];
      }
    }
    const txt=await callAI(finalApiMsgs,sys,null,pickModel(agentId,S.isoMode));
    updMsgs(convId,agentId,m=>[...m,{role:"assistant",content:txt}]);
  }catch(e){
    updMsgs(convId,agentId,m=>[...m,{role:"assistant",content:`⚠️ ${e.message}`,error:true}]);
  }finally{set({loading:false});}
}

function readFileAsBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=e=>resolve(e.target.result.split(',')[1]);
    r.onerror=reject;
    r.readAsDataURL(file);
  });
}

async function handleFloorplanUpload(files){
  for(const file of files){
    if(!file)continue;
    const sizeMB=file.size/1024/1024;
    if(sizeMB>20){
      alert(`"${file.name}" är ${sizeMB.toFixed(1)} MB – för stor. Filer över 20 MB ger fel. Komprimera filen (t.ex. via smallpdf.com eller spara som JPG) och försök igen.`);
      continue;
    }
    if(sizeMB>8){
      if(!confirm(`"${file.name}" är ${sizeMB.toFixed(1)} MB – större än rekommenderat. Större filer ökar risk för fel och tar längre tid. Vill du fortsätta?`))continue;
    }
    const b64=await readFileAsBase64(file);
    const entry={id:uid(),name:file.name,data:b64,type:file.type||'image/png'};
    S={...S,floorplans:[...S.floorplans,entry]};
  }
  draw();
}

async function submitKalkylForm(){
  const aid="kalkyl";

  // Tillämpa default-värden för fält som har det men där användaren inte fyllt i
  const effectiveForm={...S.form};
  a.fields.forEach(f=>{
    if(f.default!=null && !String(effectiveForm[f.id]||"").trim()){
      effectiveForm[f.id]=String(f.default);
    }
  });
  S.form=effectiveForm;

  // Bygg text-innehåll från formulärfälten

    .filter(f=>f.type!=="file"&&f.type!=="section")
    .filter(f=>{const v=S.form[f.id];return v&&typeof v==="string"&&v.trim();})

  // Display-version av meddelandet (text + notering om bilagor)
  const fpNote="\n\n📐 "+S.floorplans.length+" planritning"+(S.floorplans.length>1?"ar":"")+" bifogad"+(S.floorplans.length>1?"e":"");

  const currentConv=conv();

  const convId=useExisting?currentConv.id:uid();

async function sendKalkylChat(text,convId,history,floorplans){
  const aid="kalkyl";
  updMsgs(convId,aid,m=>[...m,{role:"user",content:text}]);
  S={...S,loading:true};draw();

  try{
    const sys=SP[aid];

    // Återanslut planritningarna till första user-meddelandet i historiken
    const apiMsgs=[];
    let firstUserHandled=false;
    history.forEach(m=>{
      if(!firstUserHandled&&m.role==="user"){
        const content=[];
        floorplans.forEach((f,i)=>{
          const isImage=f.type&&f.type.startsWith("image/");
          content.push({
            type:isImage?"image":"document",
            source:{type:"base64",media_type:f.type||"application/pdf",data:f.data}
          });
          content.push({type:"text",text:`(Planritning ${i+1} av ${floorplans.length}: ${f.name})`});
        });
        content.push({type:"text",text:typeof m.content==="string"?m.content:""});
        apiMsgs.push({role:"user",content});
        firstUserHandled=true;
      }else{
        apiMsgs.push({role:m.role,content:m.content});
      }
    });
    apiMsgs.push({role:"user",content:text});

    const reply=await callAI(apiMsgs,sys,null,pickModel(aid));
    updMsgs(convId,aid,m=>[...m,{role:"assistant",content:reply}]);
    S={...S,loading:false};draw();
  }catch(err){
    console.error("sendKalkylChat error:",err);
    // Ta bort det misslyckade user-meddelandet och återställ texten i input så användaren kan justera och försöka igen
    updMsgs(convId,aid,m=>m.slice(0,-1));
    S={...S,loading:false,chatIn:text};draw();
    // Visa felet som en separat error-bubble
    updMsgs(convId,aid,m=>[...m,{role:"assistant",content:"⚠️ "+err.message+"\n\nDitt meddelande finns kvar i textrutan – justera och försök igen.",error:true}]);
    draw();
  }
}

  const textContent=textParts.join("\n");
  console.log("textContent=", textContent.slice(0,100));
  // Samla bifogade filer
  const fileFields = a.fields.filter(f=>f.type==="file"&&S.form[f.id]&&S.form[f.id].data);

  // Uppdatera UI direkt – om detta inte syns är draw() trasig
  S={...S,formError:null,loading:true,formResult:{...S.formResult,[aid]:{status:"loading",text:""}}};
  draw();
  console.log("draw() called, should show spinner");

  try{
    const sys=SP[aid]||"Du är en hjälpsam assistent.";

    let userContent;
    if(fileFields.length>0){
      userContent=[];
      fileFields.forEach(f=>{
        const file=S.form[f.id];
        const isImage = file.type&&file.type.startsWith("image/");

          type: isImage?"image":"document",

        });
        userContent.push({type:"text",text:"(Ovanstående fil är: "+f.label+" - "+file.name+")"});
      });
      userContent.push({type:"text",text:textContent});
    } else {
      userContent = textContent;
    }
    const reply=await callAI([{role:"user",content:userContent}],sys,tools,pickModel(aid));
    console.log("reply received, length=", reply.length);
    // Spara som en konversation så den hittas under Tidigare
    const title = aid==="annons"

          : "Genererat dokument";
    const newConv = {id:uid(), title:title, form:{...S.form}, result:{status:"done",text:reply}, messages:[], timestamp:Date.now()};
    const newConvs = {...S.convs};
    newConvs[aid] = [newConv, ...(newConvs[aid]||[])];

    S={...S,loading:false,convs:newConvs,active:newActive,formResult:{...S.formResult,[aid]:{status:"done",text:reply}}};

    S={...S,loading:false,formResult:{...S.formResult,[aid]:{status:"error",text:"⚠️ Fel: "+err.message}}};
    draw();
  }
}

async function doChat(){

  const convId=cid(),history=msgs().slice();

// ── DOM HELPERS ───────────────────────────────────────────────────
function h(tag,props,...kids){
  const e=document.createElement(tag);
  if(props){
    Object.entries(props).forEach(([k,v])=>{
      if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
      else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
      else if(k==="html")e.innerHTML=v;
      // Boolean attrs: only set if truthy, remove if falsy
      else if(typeof v==="boolean"){if(v)e.setAttribute(k,"");else e.removeAttribute(k);}
      else if(v!=null)e.setAttribute(k,String(v));
    });
  }
  kids.flat(9).forEach(c=>{
    if(c==null)return;
    e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return e;
}

function fld(f){
  // Sektionsrubrik – ren visuell uppdelning av formuläret
  if(f.type==="section"){
    return h("div",{style:{marginTop:f.first?"4px":"24px",marginBottom:"12px",paddingBottom:"8px",borderBottom:`1px solid ${BD}`}},
      h("div",{style:{fontSize:"10px",fontWeight:"700",color:"#8aa3c9",letterSpacing:"0.8px",textTransform:"uppercase"}},f.label)
    );
  }
  // showIf – dölj fältet om villkor inte uppfylls
  if(f.showIf){
    const depVal=S.form[f.showIf.field]||"";
    if(!f.showIf.values.includes(depVal))return null;
  }
  // Checkbox – toggle med label
  if(f.type==="checkbox"){
    const isOn=S.form[f.id]==="true";
    const wrap=h("div",{style:{marginBottom:"14px"}});
    const row=h("div",{style:{display:"flex",alignItems:"flex-start",gap:"10px",cursor:"pointer",padding:"10px 12px",borderRadius:"8px",background:isOn?"#1a2d48":"transparent",border:`1px solid ${isOn?"#2a4872":BD}`,transition:"all .15s"},
      onClick:()=>{S.form={...S.form,[f.id]:isOn?"false":"true"};draw();}
    });

      card.appendChild(hdr);
