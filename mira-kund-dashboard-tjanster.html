<!--
  MIRA – KUND-DASHBOARD TJÄNSTE-GRID  (live fetch mot Render, alt a)
  ------------------------------------------------------------------
  Klistras in i ett HTML-element i Bubble på kundens dashboard-sida,
  OVANFÖR KPI-blocket. Visar Mira-abonnemang + facility-tjänster som
  tiles. Aktiva tiles visar månadskostnad; inaktiva visar
  "Läs mer →" + "Aktivera" — båda öppnar popup.

  KOPPLING I BUBBLE (bara två fält):
    #mira_company_id    = Current User's Company's unique id  (value="")
    #mira_company_name  = Current User's Company's name        (value="")
    #mira_api_host      = https://mira-exchange.onrender.com   (value="", redan ifyllt)

  FLÖDE:
    1. Blocket fetchar GET {host}/services/dashboard?company_id={id}
       → { catalog: [...], active: {slug: {...}} }
       Bubble privacy rules på Contract/Erbjudande säkrar isolering.
    2. Klick på inaktiv tile / "Läs mer" → popup öppnas med
       hero + radioval + qty + total. Innehållet uppdateras
       LIVE när användaren byter Erbjudande (description_long,
       includes, image, terms hämtas från valt Erbjudande).
    3. "Aktivera X →" POST:ar till /services/request-activation
       som återanvänder forfragan/create-kedjan (Comission +
       notify-mail + iOS-push). Kund får bekräftelse-modal.

    Saknar company_id → demo-läge (statisk fallback för preview).
-->

  function el(id){ return document.getElementById(id); }
  function txt(id){ var e=el(id); if(!e) return ''; var v=(e.value!=null?e.value:e.textContent)||''; return v.trim(); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function num(v){ return (v===null||v===undefined||isNaN(v))?0:Number(v); }
  function fmtKr(v){
    var n=Math.round(num(v));
    if(n>=1000000) return (n/1000000).toFixed(1).replace('.',',')+' Mkr';
    return n.toLocaleString('sv-SE')+' kr';
  }

  var CATALOG = [], ACTIVE = {}, modal = { slug:null, optionId:null, qty:1, busy:false, imageIdx:0 };

  function renderStars(rating){
    var full = Math.round(num(rating));
    var h = '';
    for (var i=1; i<=5; i++) h += '<span'+(i>full?' class="off"':'')+'>★</span>';
    return '<div class="mt-social-stars">'+h+'</div>';
  }

  function renderSocialBlock(item){
    var hasRating = item.rating != null && num(item.rating) > 0;
    var hasQuote  = item.testimonial && item.testimonial.quote;
    if (!hasRating && !hasQuote) return '';
    var rateRow = hasRating
      ? '<div class="mt-social-rate">'+
          renderStars(item.rating)+
          '<span class="mt-social-val">'+num(item.rating).toFixed(1)+'</span>'+
          (item.rating_count ? '<span class="mt-social-cnt">av '+num(item.rating_count)+' kunder</span>' : '')+
        '</div>'
      : '';
    var quoteRow = hasQuote
      ? '<div class="mt-social-quote">"'+esc(item.testimonial.quote)+'"</div>'+
        ((item.testimonial.author || item.testimonial.role)
          ? '<div class="mt-social-by">— <b>'+esc(item.testimonial.author||'')+'</b>'+
              (item.testimonial.role ? ', '+esc(item.testimonial.role) : '')+
            '</div>'
          : '')
      : '';
    return '<div class="mt-social">'+rateRow+quoteRow+'</div>';
  }

  function renderOnboardingBlock(item){
    var steps = Array.isArray(item.onboarding) ? item.onboarding.filter(function(s){return s && (s.title||s.desc);}) : [];
    if (!steps.length) return '';
    return '<div><div class="mt-section-h">Så kommer ni igång</div>'+
      '<div class="mt-onboard">'+
        steps.map(function(step,i){
          var weekHtml = step.week ? '<span>'+esc(step.week)+'</span>' : '';
          return '<div class="mt-onb-step">'+
            '<div class="mt-onb-n">'+(i+1)+'</div>'+
            '<div class="mt-onb-tx">'+
              '<div class="mt-onb-t">'+esc(step.title||'')+weekHtml+'</div>'+
              (step.desc ? '<div class="mt-onb-d">'+esc(step.desc)+'</div>' : '')+
            '</div>'+
          '</div>';
        }).join('')+
      '</div></div>';
  }

  function tileImageOf(item, act){
    if (act && act.option_id) {
      var ao = (item.options||[]).find(function(o){return o.id===act.option_id;});
      if (ao && ao.image) return ao.image;
    }
    var firstWithImage = (item.options||[]).find(function(o){return !!o.image;});
    if (firstWithImage) return firstWithImage.image;
    return item.image || '';
  }

  function tileHero(item, isActive, isPremium, act){
    var img = tileImageOf(item, act);
    var bg = img
      ? "background-image:url('"+esc(img)+"')"
      : "background:linear-gradient(135deg,"+esc(item.color_from||item.icon_color||'#3c3489')+" 0%,"+esc(item.color_to||'#1c1638')+" 100%)";
    var pill = isPremium ? '<span class="mt-pill premium">Premium</span>'
             : isActive  ? '<span class="mt-pill active">Aktiv</span>'
             : '<span class="mt-pill off">'+(item.category==='facility'?'Förslag':'Inte aktiv')+'</span>';
    var icon = img ? '' : (ICONS[item.icon]||ICONS.sparkle);
    return '<div class="mt-hero'+(img?' mt-hero-img':'')+'" style="'+bg+'">'+icon+pill+'</div>';
  }

  function renderTile(item){
    var act = ACTIVE[item.slug];
    var isActive = !!act, isPremium = item.category==='platform' && isActive;
    var cls = 'mt-tile' + (isActive?' active':' off') + (isPremium?' premium':'');

    var subtitle = isActive ? (act.info || item.subtitle || '') : (item.subtitle || '');
    var foot;
    if (isPremium) {
      foot = '<div class="mt-foot-incl">Ingår i avtalet</div>';
    } else if (isActive) {
      foot = '';
    } else {
      foot = '<div class="mt-foot-link" data-act="open" data-slug="'+esc(item.slug)+'">Läs mer →</div>';
    }

    return '<div class="'+cls+'" data-act="open" data-slug="'+esc(item.slug)+'">'+
      tileHero(item, isActive, isPremium, act)+
      '<div class="mt-body">'+
        '<div class="mt-name">'+esc(item.name)+'</div>'+
        '<div class="mt-sub">'+esc(subtitle)+'</div>'+
        foot+
      '</div>'+
    '</div>';
  }

  function renderGrid(){
    var total = 0, activeCnt = 0, suggestCnt = 0;
    CATALOG.forEach(function(it){
      var a = ACTIVE[it.slug];
      if (a) { activeCnt++; total += num(a.monthly_cost); }
      else { suggestCnt++; }
    });
    el('mt-cnt').textContent = '· '+activeCnt+' av '+CATALOG.length+' aktiva';
    el('mt-sum').innerHTML = fmtKr(total)+'/mån' + (suggestCnt>0 ? ' · <b>+'+suggestCnt+' möjliga att aktivera</b>' : '');
    el('mt-grid').innerHTML = CATALOG.map(renderTile).join('');
  }

  function curOpt(){
    var item = CATALOG.find(function(x){return x.slug===modal.slug;});
    if (!item) return null;
    return (item.options||[]).find(function(o){return o.id===modal.optionId;}) || (item.options||[])[0] || null;
  }

  function renderModal(){
    var item = CATALOG.find(function(x){return x.slug===modal.slug;});
    if (!item) return;
    var opt = curOpt();
    var isActive = !!ACTIVE[item.slug];
    var isPremium = item.category==='platform' && isActive;

    // ── Kolumn 1: visuell — bild + bildspel-thumbs ──
    var images = [];
    if (opt && opt.image) images.push(opt.image);
    if (opt && Array.isArray(opt.gallery)) opt.gallery.forEach(function(g){ if (g && images.indexOf(g)<0) images.push(g); });
    if (item.image && images.indexOf(item.image)<0) images.push(item.image);
    var idx = Math.min(Math.max(modal.imageIdx||0, 0), Math.max(images.length-1, 0));
    var heroImg = images[idx] || '';
    var visualBg = heroImg
      ? "background-image:url('"+esc(heroImg)+"')"
      : "background:linear-gradient(160deg,"+esc(item.color_from||item.icon_color||'#3c3489')+" 0%,"+esc(item.color_to||'#1c1638')+" 55%,#0a0820 100%)";
    var thumbsHtml = images.length > 1
      ? '<div class="mt-mthumbs">'+
          images.map(function(img,i){
            return '<div class="mt-mthumb'+(i===idx?' on':'')+'" data-act="thumb" data-i="'+i+'" style="background-image:url(\''+esc(img)+'\')"></div>';
          }).join('')+
        '</div>'
      : '';
    var visualCol = '<div class="mt-mvisual" style="'+visualBg+'">'+thumbsHtml+'</div>';

    // ── Kolumn 2: info — rubrik, beskrivning, fakta-chips, ingår, villkor ──
    var descLong = (opt && opt.description_long) || item.description_long || (opt && opt.desc) || '';
    var terms = (opt && opt.terms) || item.terms || '';
    var chips = [];
    if (opt && opt.target_group)  chips.push('<span class="mt-mchip">'+esc(opt.target_group)+'</span>');
    if (opt && opt.logistics)     chips.push('<span class="mt-mchip">'+esc(opt.logistics)+'</span>');
    if (opt && opt.capacity)      chips.push('<span class="mt-mchip">Max <b>'+num(opt.capacity)+'</b></span>');
    var chipsHtml = chips.length ? '<div class="mt-mchips">'+chips.join('')+'</div>' : '';

    var includes = (opt && opt.includes && opt.includes.length) ? opt.includes : (item.includes||[]);
    var inclHtml = includes.length
      ? '<div><div class="mt-section-h acc">Ingår</div><ul class="mt-incl">'+
          includes.map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+
        '</ul></div>'
      : '';

    var infoCol =
      '<div class="mt-minfo">'+
        '<h3>'+esc(item.name)+'</h3>'+
        (descLong ? '<div class="mt-desc">'+esc(descLong)+'</div>' : '')+
        chipsHtml +
        renderSocialBlock(item)+
        inclHtml +
        renderOnboardingBlock(item)+
        (terms ? '<div class="mt-terms-mid">'+esc(terms)+'</div>' : '')+
      '</div>';

    // ── Kolumn 3: actions — pris, nivå, antal, total, CTA ──
    var optsHtml = (item.options||[]).map(function(o){
      var on = o.id===modal.optionId;
      var p = num(o.price)>0 ? fmtKr(o.price) : 'Ingår';
      var u = o.unit||'';
      return '<div class="mt-opt'+(on?' on':'')+'" data-act="opt" data-id="'+esc(o.id)+'">'+
        '<div class="mt-disc"></div>'+
        '<div class="mt-opt-tx"><div class="mt-opt-n">'+esc(o.name)+'</div><div class="mt-opt-d">'+esc(o.desc||'')+'</div></div>'+
        '<div class="mt-opt-p">'+p+(u?'<span style="font-size:10px;font-weight:400;color:rgba(255,255,255,0.40);margin-left:2px">'+esc(u)+'</span>':'')+'</div>'+
      '</div>';
    }).join('');

    var qtyHtml = item.has_qty ? (
      '<div class="mt-qty">'+
        '<div class="mt-qty-l">'+esc(item.qty_label||'Antal')+'</div>'+
        '<div class="mt-qty-c">'+
          '<button class="mt-qty-b" data-act="qty" data-d="-1">−</button>'+
          '<div class="mt-qty-n">'+modal.qty+'</div>'+
          '<button class="mt-qty-b" data-act="qty" data-d="1">+</button>'+
        '</div>'+
      '</div>'
    ) : '';

    var unitPrice = opt ? num(opt.price) : 0;
    var unit = opt && opt.unit ? opt.unit : '/mån';
    var total = unitPrice * (item.has_qty ? modal.qty : 1);
    var totalLine = unitPrice>0
      ? fmtKr(total)+'<small> '+(unit==='/mån'?'/ mån':esc(unit))+'</small>'
      : 'Ingår';

    var ctaLabel = isPremium ? 'Uppgradera '+item.name+' →' : 'Aktivera '+item.name+' →';

    var actionsCol;
    if (isActive) {
      actionsCol =
        '<div class="mt-active-info"><b>Aktiv tjänst</b>Den här tjänsten ingår redan i ert avtal. Hör av er till oss om ni vill ändra nivå eller antal.</div>'+
        '<div class="mt-section-h">Nuvarande nivå</div>'+
        '<div class="mt-opts mt-disabled">'+optsHtml+'</div>'+
        (qtyHtml ? '<div class="mt-disabled">'+qtyHtml+'</div>' : '')+
        '<div style="margin-top:auto"><button class="mt-btn ghost" data-act="close" style="width:100%">Stäng</button></div>';
    } else {
      var priceHtml = unitPrice>0
        ? '<div class="mt-mprice-r">Från<b>'+fmtKr(unitPrice)+'<small>'+(unit==='/mån'?' / mån':' '+esc(unit))+'</small></b></div>'
        : '';
      actionsCol =
        priceHtml +
        '<div class="mt-section-h">Välj nivå</div>'+
        '<div class="mt-opts">'+optsHtml+'</div>'+
        qtyHtml +
        '<div class="mt-tot">'+
          '<div><div class="mt-tot-l">Totalt</div><div class="mt-tot-v">'+totalLine+'</div></div>'+
        '</div>'+
        '<div class="mt-btns">'+
          '<button class="mt-btn ghost" data-act="close">Avbryt</button>'+
          '<button class="mt-btn primary" data-act="submit"'+(modal.busy?' disabled':'')+'>'+esc(ctaLabel)+'</button>'+
        '</div>'+
        '<div class="mt-secondary-cta" data-act="advisor">Prata med en rådgivare först →</div>';
    }

    el('mt-modal').innerHTML =
      visualCol +
      infoCol +
      '<div class="mt-mright">'+
        '<button class="mt-mclose" data-act="close" aria-label="Stäng">✕</button>'+
        '<div class="mt-toast" id="mt-toast" style="position:absolute;left:22px;right:22px;bottom:14px"></div>'+
        actionsCol +
      '</div>';
  }

  function openModal(slug){
    var item = CATALOG.find(function(x){return x.slug===slug;});
    if (!item) return;
    var act = ACTIVE[slug];
    modal.slug = slug;
    if (act && act.option_id) {
      var match = (item.options||[]).find(function(o){return o.id===act.option_id;});
      modal.optionId = match ? match.id : ((item.options&&item.options[0])?item.options[0].id:null);
      modal.qty = num(act.qty) || item.qty_min || 1;
    } else {
      modal.optionId = (item.options&&item.options[0])?item.options[0].id:null;
      modal.qty = item.qty_min || 1;
    }
    modal.busy = false;
    modal.imageIdx = 0;
    renderModal();
    el('mt-gridview').style.display = 'none';
    el('mt-mask').classList.add('on');
    try { el('mt-mask').scrollIntoView({behavior:'smooth', block:'start'}); } catch(e){}
  }
  function closeModal(){
    el('mt-mask').classList.remove('on');
    el('mt-gridview').style.display = '';
    modal.slug = null;
    try { el('mt-gridview').scrollIntoView({behavior:'smooth', block:'start'}); } catch(e){}
  }

  function setToast(mode, text){
    var t = el('mt-toast'); if (!t) return;
    t.className = 'mt-toast show'+(mode==='err'?' err':'');
    t.textContent = text;
  }

  function submit(){
    var item = CATALOG.find(function(x){return x.slug===modal.slug;});
    if (!item) return;
    var host = txt('mira_api_host') || 'https://mira-exchange.onrender.com';
    var companyId = txt('mira_company_id');
    if (!companyId) {
      setToast('err','Saknar company_id — försök i live-läget.');
      return;
    }
    modal.busy = true; renderModal();
    fetch(host+'/services/request-activation', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        company_id: companyId,
        company_name: txt('mira_company_name'),
        service_slug: modal.slug,
        service_name: item.name,
        option_id: modal.optionId,
        qty: modal.qty,
        category_hint: item.category
      })
    })
    .then(function(r){ return r.json().catch(function(){return {ok:false};}); })
    .then(function(j){
      if (!j || !j.ok) {
        modal.busy = false; renderModal();
        setToast('err','Kunde inte skicka. Försök igen eller kontakta oss.');
        return;
      }
      el('mt-modal').innerHTML =
        '<div style="padding:48px 36px;text-align:center">'+
          '<div style="width:62px;height:62px;border-radius:50%;background:rgba(16,185,129,0.18);color:#10b981;display:inline-flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:18px">✓</div>'+
          '<div style="font-family:Georgia,serif;font-size:22px;font-weight:700;color:#fff;margin-bottom:10px">Förfrågan skickad</div>'+
          '<div style="font-size:13px;color:rgba(255,255,255,0.65);line-height:1.6;max-width:380px;margin:0 auto 22px">Vi har skapat en förfrågan för '+esc(item.name)+'. Carotte återkommer inom kort med bekräftelse och eventuella detaljer.</div>'+
          '<button class="mt-btn primary" style="padding:11px 28px;flex:none" data-act="close">Tillbaka</button>'+
        '</div>';
    })
    .catch(function(){
      modal.busy = false; renderModal();
      setToast('err','Nätverksfel. Försök igen.');
    });
  }

  document.addEventListener('click', function(ev){
    var t = ev.target.closest('[data-act]');
    if (!t) return;
    var act = t.getAttribute('data-act');
    if (act==='open') {
      var slug = t.getAttribute('data-slug') || (t.closest('[data-slug]')||{}).getAttribute && t.closest('[data-slug]').getAttribute('data-slug');
      if (slug) openModal(slug);
      ev.stopPropagation();
    } else if (act==='close') {
      closeModal();
    } else if (act==='opt') {
      modal.optionId = t.getAttribute('data-id');
      modal.imageIdx = 0;
      renderModal();
    } else if (act==='thumb') {
      modal.imageIdx = parseInt(t.getAttribute('data-i'),10) || 0;
      renderModal();
    } else if (act==='qty') {
      var item = CATALOG.find(function(x){return x.slug===modal.slug;});
      var d = parseInt(t.getAttribute('data-d'),10) || 0;
      var min = item.qty_min||1, max = item.qty_max||99;
      modal.qty = Math.max(min, Math.min(max, modal.qty + d));
      renderModal();
    } else if (act==='submit') {
      submit();
    } else if (act==='advisor') {
      var item = CATALOG.find(function(x){return x.slug===modal.slug;});
      var subj = encodeURIComponent('Rådgivning – ' + (item ? item.name : 'tjänst'));
      var body = encodeURIComponent('Hej!\n\nJag funderar på att aktivera ' + (item ? item.name : '') + ' och vill gärna prata med en rådgivare först.\n\nHälsningar,\n' + (txt('mira_company_name') || ''));
      window.location.href = 'mailto:hej@carotte.se?subject=' + subj + '&body=' + body;
    }
  });

  el('mt-mask').addEventListener('click', function(ev){
    if (ev.target === el('mt-mask')) closeModal();
  });
  document.addEventListener('keydown', function(ev){
    if (ev.key==='Escape' && el('mt-mask').classList.contains('on')) closeModal();
  });

  function setLoading(text){
    var grid = el('mt-grid');
    if (!grid) return;
    grid.innerHTML = '<div style="grid-column:1/-1;padding:24px 12px;text-align:center;font-size:12px;color:var(--t3)">'+esc(text||'Hämtar tjänster…')+'</div>';
  }
  function setError(text){
    var grid = el('mt-grid');
    if (!grid) return;
    grid.innerHTML = '<div style="grid-column:1/-1;padding:24px 12px;text-align:center;font-size:12px;color:#f87171">'+esc(text||'Kunde inte hämta tjänster')+'</div>';
  }

  function loadFromHost(){
    var host = txt('mira_api_host') || 'https://mira-exchange.onrender.com';
    var companyId = txt('mira_company_id');
    if (!companyId) {
      CATALOG = DEMO_CATALOG.slice();
      ACTIVE  = JSON.parse(JSON.stringify(DEMO_ACTIVE));
      renderGrid();
      return;
    }
    setLoading('Hämtar tjänster…');
    fetch(host+'/services/dashboard?company_id='+encodeURIComponent(companyId), {
      method:'GET', headers:{'Accept':'application/json'}
    })
    .then(function(r){ return r.json().catch(function(){return {ok:false};}); })
    .then(function(j){
      if (!j || !j.ok) { setError('Kunde inte hämta tjänster'); return; }
      CATALOG = Array.isArray(j.catalog) ? j.catalog : [];
      ACTIVE  = (j.active && typeof j.active === 'object') ? j.active : {};
      if (!CATALOG.length) { setError('Inga tjänster konfigurerade ännu'); return; }
      renderGrid();
    })
    .catch(function(){ setError('Nätverksfel — försök ladda om sidan'); });
  }

  loadFromHost();
})();
</script>
