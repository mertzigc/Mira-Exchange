<!--
  MIRA FM – FAKTURAMODUL (kund) – v2.2
  ──────────────────────────────────────────────────────────────
  ÄNDRINGAR från v2.1:
  - Visar ENBART innevarande år (dynamiskt via JS, inte hårdkodat).
  - Årsdropdown borttagen – ingen årsväxling, ingen flerårslogik.
  - Endpoint returnerar fortfarande alla år; vi filtrerar lokalt på THIS_YEAR.
  - available_years / highlighted_year från endpoint ignoreras numera.

  KONFIGURATION:
    #mira_company   value = Current User's Company's unique id
    #mira_endpoint  value = https://mira-exchange.onrender.com/api/invoices

  Lämnas #mira_company tomt visas DEMO-data.
-->

<div class="mfx-wrap">
<style>
  .mfx-wrap * { box-sizing: border-box; margin: 0; padding: 0; }
  .mfx-wrap {
    --bg:        #1e2235;
    --card:      #262b42;
    --panel:     #23283f;
    --input:     #2e3350;
    --deep:      #1a1f33;
    --acc:       #db6923;
    --acc-dk:    #b8571d;
    --acc-glow:  rgba(219,105,35,0.16);
    --line:      rgba(255,255,255,0.07);
    --line-md:   rgba(255,255,255,0.12);
    --t1:        rgba(255,255,255,0.92);
    --t2:        rgba(255,255,255,0.62);
    --t3:        rgba(255,255,255,0.40);
    --t4:        rgba(255,255,255,0.22);
    --paid:      #10b981;
    --paid-bg:   rgba(16,185,129,0.13);
    --open:      #e0a44b;
    --open-bg:   rgba(224,164,75,0.13);
    --over:      #f87171;
    --over-bg:   rgba(248,113,113,0.13);
    --serif:    'DM Serif Display', Georgia, serif;
    --body:     'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-family: var(--body);
    color: var(--t1);
    background: var(--bg);
    width: 100%;
    padding: 26px 24px 30px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Header ───────────────────────────────── */
  .mfx-head { margin-bottom: 22px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .mfx-head-text { flex: 1 1 auto; min-width: 0; }
  .mfx-title { font-family: var(--serif); font-size: 30px; line-height: 1.05; letter-spacing: -0.01em; }
  .mfx-title span { color: var(--acc); }
  .mfx-sub { font-size: 13px; color: var(--t3); margin-top: 4px; }

  /* ── KPI strip ────────────────────────────── */
  .mfx-kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 13px; margin-bottom: 20px; }
  .mfx-kpi {
    background: var(--card); border: 0.5px solid var(--line); border-radius: 11px;
    padding: 15px 16px 16px; position: relative; overflow: hidden;
  }
  .mfx-kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--acc); }
  .mfx-kpi.is-over::before { background: var(--over); }
  .mfx-kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.10em; color: var(--t3); margin-bottom: 10px; }
  .mfx-kpi-val { font-size: 27px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
  .mfx-kpi-val.acc { color: var(--acc); }
  .mfx-kpi-val.over { color: var(--over); }
  .mfx-kpi-val.paid { color: var(--paid); }
  .mfx-kpi-cur { font-size: 13px; font-weight: 500; color: var(--t3); margin-left: 5px; letter-spacing: 0; }
  .mfx-kpi-meta { font-size: 12px; color: var(--t3); margin-top: 8px; }

  /* ── Controls ─────────────────────────────── */
  .mfx-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .mfx-filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .mfx-filters button {
    background: var(--panel); border: 0.5px solid var(--line); color: var(--t2);
    font-family: var(--body); font-size: 12.5px; font-weight: 600; padding: 7px 13px;
    border-radius: 20px; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 7px;
  }
  .mfx-filters button:hover { color: var(--t1); }
  .mfx-filters button.on { background: var(--acc); color: #fff; border-color: var(--acc); }
  .mfx-filters .dot { width: 7px; height: 7px; border-radius: 50%; }
  .mfx-filters .dot.paid { background: var(--paid); }
  .mfx-filters .dot.open { background: var(--open); }
  .mfx-filters .dot.over { background: var(--over); }
  .mfx-cnt { font-size: 11px; opacity: .65; font-weight: 700; }

  .mfx-search { margin-left: auto; position: relative; }
  .mfx-search input {
    background: var(--input); border: 0.5px solid var(--line-md); color: var(--t1);
    font-family: var(--body); font-size: 13px; padding: 9px 14px 9px 34px;
    border-radius: 9px; width: 210px; outline: none; transition: border-color .15s;
  }
  .mfx-search input::placeholder { color: var(--t4); }
  .mfx-search input:focus { border-color: var(--acc); }
  .mfx-search svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; stroke: var(--t3); }

  /* ── Table ────────────────────────────────── */
  .mfx-tablewrap { background: var(--card); border: 0.5px solid var(--line); border-radius: 12px; overflow: hidden; }
  .mfx-scroll { overflow-x: auto; }
  table.mfx-table { width: 100%; border-collapse: collapse; min-width: 720px; }
  .mfx-table thead th {
    text-align: left; font-size: 10.5px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.09em; color: var(--t3); padding: 13px 16px; white-space: nowrap;
    border-bottom: 0.5px solid var(--line-md); cursor: pointer; user-select: none; background: var(--panel);
  }
  .mfx-table thead th:hover { color: var(--t1); }
  .mfx-table th.num, .mfx-table td.num { text-align: right; }
  .mfx-table th .arr { opacity: 0; margin-left: 4px; font-size: 9px; }
  .mfx-table th.sorted .arr { opacity: 1; color: var(--acc); }
  .mfx-table tbody td { padding: 13px 16px; border-bottom: 0.5px solid var(--line); font-size: 13.5px; white-space: nowrap; }
  .mfx-table tbody tr { transition: background .12s; }
  .mfx-table tbody tr:hover { background: rgba(255,255,255,0.025); }
  .mfx-table tbody tr:last-child td { border-bottom: none; }
  .mfx-table tbody tr.is-over td:first-child { box-shadow: inset 2px 0 0 var(--over); }
  .mfx-num { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--t1); }
  .mfx-net { font-variant-numeric: tabular-nums; color: var(--t1); font-weight: 600; }
  .mfx-net small { display: block; font-size: 11px; color: var(--t3); font-weight: 400; margin-top: 1px; }
  .mfx-date { color: var(--t2); font-variant-numeric: tabular-nums; }
  .mfx-date.over { color: var(--over); font-weight: 600; }
  .mfx-desc { color: var(--t1); }
  .mfx-cat { font-size: 11px; color: var(--t3); margin-top: 2px; }

  .mfx-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 700; padding: 4px 11px; border-radius: 20px; white-space: nowrap; }
  .mfx-pill .d { width: 6px; height: 6px; border-radius: 50%; }
  .mfx-pill.Betald { color: var(--paid); background: var(--paid-bg); } .mfx-pill.Betald .d { background: var(--paid); }
  .mfx-pill.Obetald { color: var(--open); background: var(--open-bg); } .mfx-pill.Obetald .d { background: var(--open); }
  .mfx-pill.Förfallen { color: var(--over); background: var(--over-bg); } .mfx-pill.Förfallen .d { background: var(--over); }

  .mfx-pdf { display: inline-flex; align-items: center; gap: 5px; color: var(--t2); text-decoration: none; font-size: 12px; font-weight: 600; border: 0.5px solid var(--line-md); padding: 5px 10px; border-radius: 7px; transition: all .15s; }
  .mfx-pdf:hover { color: var(--acc); border-color: var(--acc); }
  .mfx-pdf svg { width: 13px; height: 13px; }
  .mfx-pdf.off { opacity: .35; pointer-events: none; }

  .mfx-table tfoot td { padding: 14px 16px; border-top: 0.5px solid var(--line-md); font-size: 13px; background: var(--panel); }
  .mfx-foot-label { color: var(--t2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px; }
  .mfx-foot-val { font-variant-numeric: tabular-nums; font-weight: 700; color: var(--acc); font-size: 15px; text-align: right; }

  .mfx-empty { padding: 46px 20px; text-align: center; color: var(--t3); font-size: 14px; }

  /* ── Loading / error ──────────────────────── */
  .mfx-loading { padding: 46px 20px; text-align: center; color: var(--t3); font-size: 13px; }
  .mfx-skel { display: inline-block; height: 12px; background: linear-gradient(90deg, var(--panel) 0%, rgba(255,255,255,0.06) 50%, var(--panel) 100%); background-size: 200% 100%; animation: mfxSh 1.4s infinite; border-radius: 4px; vertical-align: middle; }
  @keyframes mfxSh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .mfx-err {
    background: rgba(248,113,113,0.08); color: var(--over);
    border: 0.5px solid rgba(248,113,113,0.25); border-radius: 8px;
    padding: 10px 14px; font-size: 12.5px; margin-bottom: 14px;
  }

  /* ── Responsive ───────────────────────────── */
  @media (max-width: 760px) {
    .mfx-kpis { grid-template-columns: repeat(2, 1fr); }
    .mfx-search { margin-left: 0; width: 100%; }
    .mfx-search input { width: 100%; }
    .mfx-title { font-size: 25px; }
    .mfx-head { flex-direction: column; }
  }
</style>

<!--
  KONFIGURATION (det enda Bubble behöver fylla i):
  #mira_company   value = Current User's Company's unique id
  #mira_endpoint  value = https://mira-exchange.onrender.com/api/invoices
-->
<input type="hidden" id="mira_company"  value="">
<input type="hidden" id="mira_endpoint" value="https://mira-exchange.onrender.com/api/invoices">

<div class="mfx-head">
  <div class="mfx-head-text">
    <div class="mfx-title">Fakturor <span id="mfx-year-h"></span></div>
    <div class="mfx-sub" id="mfx-company">Översikt över dina fakturor från Carotte</div>
  </div>
</div>

<div id="mfx-err" class="mfx-err" style="display:none"></div>

<div class="mfx-kpis">
  <div class="mfx-kpi">
    <div class="mfx-kpi-label">Fakturerat <span id="kpi-total-label">i år</span></div>
    <div class="mfx-kpi-val acc"><span id="kpi-total"><span class="mfx-skel" style="width:90px"></span></span><span class="mfx-kpi-cur">SEK</span></div>
    <div class="mfx-kpi-meta">ex moms</div>
  </div>
  <div class="mfx-kpi">
    <div class="mfx-kpi-label">Betalt</div>
    <div class="mfx-kpi-val paid"><span id="kpi-paid"><span class="mfx-skel" style="width:80px"></span></span><span class="mfx-kpi-cur">SEK</span></div>
    <div class="mfx-kpi-meta" id="kpi-paid-meta">– fakturor</div>
  </div>
  <div class="mfx-kpi">
    <div class="mfx-kpi-label">Att betala</div>
    <div class="mfx-kpi-val"><span id="kpi-open"><span class="mfx-skel" style="width:80px"></span></span><span class="mfx-kpi-cur">SEK</span></div>
    <div class="mfx-kpi-meta" id="kpi-open-meta">– fakturor</div>
  </div>
  <div class="mfx-kpi" id="kpi-over-card">
    <div class="mfx-kpi-label">Förfallet</div>
    <div class="mfx-kpi-val"><span id="kpi-over"><span class="mfx-skel" style="width:60px"></span></span><span class="mfx-kpi-cur">SEK</span></div>
    <div class="mfx-kpi-meta" id="kpi-over-meta">– fakturor</div>
  </div>
</div>

<div class="mfx-controls">
  <div class="mfx-filters" id="mfx-filters">
    <button data-f="all" class="on">Alla <span class="mfx-cnt" data-c="all">0</span></button>
    <button data-f="Betald"><span class="dot paid"></span>Betald <span class="mfx-cnt" data-c="Betald">0</span></button>
    <button data-f="Obetald"><span class="dot open"></span>Obetald <span class="mfx-cnt" data-c="Obetald">0</span></button>
    <button data-f="Förfallen"><span class="dot over"></span>Förfallen <span class="mfx-cnt" data-c="Förfallen">0</span></button>
  </div>
  <div class="mfx-search">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4-4"></path></svg>
    <input type="text" id="mfx-q" placeholder="Sök fakturanr eller text…">
  </div>
</div>

<div class="mfx-tablewrap">
  <div class="mfx-scroll">
    <table class="mfx-table">
      <thead>
        <tr id="mfx-thead">
          <th data-s="number">Fakturanr<span class="arr">▾</span></th>
          <th data-s="date" class="sorted">Datum<span class="arr">▾</span></th>
          <th data-s="due">Förfaller<span class="arr">▾</span></th>
          <th data-s="desc">Beskrivning<span class="arr">▾</span></th>
          <th data-s="net" class="num">Belopp<span class="arr">▾</span></th>
          <th data-s="status">Status<span class="arr">▾</span></th>
          <th class="num">PDF</th>
        </tr>
      </thead>
      <tbody id="mfx-body"><tr><td colspan="7"><div class="mfx-loading">Hämtar fakturor…</div></td></tr></tbody>
      <tfoot id="mfx-foot"></tfoot>
    </table>
  </div>
</div>

<script>
(function () {
  function el(id) { return document.getElementById(id); }
  var TODAY = new Date(); TODAY.setHours(0,0,0,0);
  var THIS_YEAR = TODAY.getFullYear();

  // ── DEMO-FALLBACK ──
  var DEMO_DATA = {
    company: "Demo AB",
    currency: "SEK",
    // Föregående års-faktura (10298) ligger kvar med flit – bevisar att årsfiltret
    // bara visar innevarande år.
    invoices: [
      { number: "10412", date: THIS_YEAR + "-01-31", due: THIS_YEAR + "-02-28", desc: "Kontorslunch januari",  category: "Catering", net: 84200,  vat: 21050, ft_balance: 0      },
      { number: "10478", date: THIS_YEAR + "-04-15", due: THIS_YEAR + "-04-30", desc: "Vårfest – catering",    category: "Event",    net: 124300, vat: 31075, ft_balance: 155375 },
      { number: "10503", date: THIS_YEAR + "-05-31", due: THIS_YEAR + "-06-30", desc: "Kontorslunch maj",      category: "Catering", net: 86700,  vat: 21675, ft_balance: 108375 },
      { number: "10298", date: (THIS_YEAR-1) + "-11-30", due: (THIS_YEAR-1) + "-12-30", desc: "Kontorslunch november", category: "Catering", net: 82100, vat: 20525, ft_balance: 0 }
    ]
  };

  // ── Fetch ──
  function fetchData() {
    var companyId = (el('mira_company') && el('mira_company').value || '').trim();
    var endpoint  = (el('mira_endpoint') && el('mira_endpoint').value || '').trim();

    if (!companyId || !endpoint) {
      console.warn('[mira/invoices] saknar company_id eller endpoint – visar demo');
      return Promise.resolve(DEMO_DATA);
    }
    // year-param skickas som hint men endpointen returnerar alla år
    var url = endpoint + '?company_id=' + encodeURIComponent(companyId) + '&year=' + THIS_YEAR;
    var ctrl = new AbortController();
    var timer = setTimeout(function () { ctrl.abort(); }, 30000);
    return fetch(url, { credentials: 'omit', signal: ctrl.signal })
      .then(function (r) {
        clearTimeout(timer);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .catch(function (e) {
        clearTimeout(timer);
        console.error('[mira/invoices] fetch error:', e);
        showError('Kunde inte hämta fakturor just nu. Försök igen om en stund.');
        return { company: '', currency: 'SEK', invoices: [] };
      });
  }

  function showError(msg) {
    var n = el('mfx-err'); n.textContent = msg; n.style.display = 'block';
  }

  function fmt(n) { return Math.round(n).toLocaleString('sv-SE'); }
  function fmtDate(s) { if (!s) return '–'; var d = new Date(s); return isNaN(d) ? s : d.toLocaleDateString('sv-SE'); }

  function deriveStatus(r) {
    var bal = (r.ft_balance != null) ? +r.ft_balance : null;
    if (bal === 0) return 'Betald';
    if (bal != null) {
      var due = r.due ? new Date(r.due) : null;
      if (due && !isNaN(due) && due < TODAY) return 'Förfallen';
      return 'Obetald';
    }
    return r.status || 'Obetald';
  }

  function normalize(rows) {
    return (rows || []).map(function (r) {
      var net = +r.net || 0, vat = +r.vat || 0;
      var total = (r.total != null) ? +r.total : net + vat;
      var dt = r.date ? new Date(r.date) : null;
      var yr = (dt && !isNaN(dt)) ? dt.getFullYear() : null;
      return {
        number: r.number || '–', date: r.date || '', due: r.due || '',
        desc: r.desc || '–', category: r.category || '',
        net: net, vat: vat, total: total, balance: r.ft_balance,
        status: deriveStatus(r), pdf: r.pdf || '',
        _year: yr
      };
    });
  }

  // ── State ──
  var INV_ALL = [];                       // alla fakturor från endpoint, normaliserade
  var DATA = null;
  var state = { year: THIS_YEAR, filter: 'all', q: '', sort: 'date', dir: -1 };

  function invForYear() {
    return INV_ALL.filter(function (r) { return r._year === state.year; });
  }

  function renderHeader() {
    el('mfx-year-h').textContent = THIS_YEAR;          // dynamiskt innevarande år, ej hårdkodat
    el('kpi-total-label').textContent = 'i år';
    if (DATA && DATA.company) el('mfx-company').textContent = DATA.company + ' · fakturor från Carotte';
  }

  function renderKpis() {
    var inv = invForYear();
    var totalNet = 0, paidNet = 0, openNet = 0, overNet = 0, nPaid = 0, nOpen = 0, nOver = 0;
    inv.forEach(function (r) {
      totalNet += r.net;
      if (r.status === 'Betald') { paidNet += r.net; nPaid++; }
      else if (r.status === 'Förfallen') { overNet += r.net; nOver++; }
      else { openNet += r.net; nOpen++; }
    });
    el('kpi-total').textContent = fmt(totalNet);
    el('kpi-paid').textContent = fmt(paidNet);  el('kpi-paid-meta').textContent = nPaid + ' fakturor';
    el('kpi-open').textContent = fmt(openNet);  el('kpi-open-meta').textContent = nOpen + ' fakturor';
    el('kpi-over').textContent = fmt(overNet);  el('kpi-over-meta').textContent = nOver + ' fakturor';

    // Rensa/sätt over-styling beroende på utfall
    var cardOver = el('kpi-over-card');
    var valOver = el('kpi-over');
    if (overNet > 0) { cardOver.classList.add('is-over'); valOver.classList.add('over'); }
    else             { cardOver.classList.remove('is-over'); valOver.classList.remove('over'); }
  }

  function renderCounts() {
    var inv = invForYear();
    var c = { all: inv.length, Betald: 0, Obetald: 0, Förfallen: 0 };
    inv.forEach(function (r) { if (c[r.status] != null) c[r.status]++; });
    document.querySelectorAll('.mfx-cnt').forEach(function (n) {
      var k = n.getAttribute('data-c'); if (c[k] != null) n.textContent = c[k];
    });
  }

  function rowsFor() {
    var inv = invForYear();
    var q = state.q.toLowerCase();
    var rows = inv.filter(function (r) {
      if (state.filter !== 'all' && r.status !== state.filter) return false;
      if (q && (r.number + ' ' + r.desc + ' ' + r.category).toLowerCase().indexOf(q) < 0) return false;
      return true;
    });
    var s = state.sort, dir = state.dir;
    rows.sort(function (a, b) {
      var x = a[s], y = b[s];
      if (s === 'net' || s === 'total') { x = +x; y = +y; }
      else if (s === 'date' || s === 'due') { x = new Date(x || 0); y = new Date(y || 0); }
      else { x = ('' + x).toLowerCase(); y = ('' + y).toLowerCase(); }
      return x < y ? -dir : x > y ? dir : 0;
    });
    return rows;
  }

  function renderTable() {
    var rows = rowsFor();
    if (!rows.length) {
      var msg = invForYear().length === 0
        ? 'Inga fakturor för ' + state.year + '.'
        : 'Inga fakturor matchar filtret.';
      el('mfx-body').innerHTML = '<tr><td colspan="7"><div class="mfx-empty">' + msg + '</div></td></tr>';
      el('mfx-foot').innerHTML = '';
      return;
    }
    el('mfx-body').innerHTML = rows.map(function (r) {
      var isOver = r.status === 'Förfallen';
      var pdf = r.pdf
        ? '<a class="mfx-pdf" href="' + r.pdf + '" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path></svg>Visa</a>'
        : '<span class="mfx-pdf off"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path></svg>–</span>';
      return '<tr class="' + (isOver ? 'is-over' : '') + '">' +
        '<td><span class="mfx-num">#' + r.number + '</span></td>' +
        '<td><span class="mfx-date">' + fmtDate(r.date) + '</span></td>' +
        '<td><span class="mfx-date ' + (isOver ? 'over' : '') + '">' + fmtDate(r.due) + '</span></td>' +
        '<td><div class="mfx-desc">' + r.desc + '</div>' + (r.category ? '<div class="mfx-cat">' + r.category + '</div>' : '') + '</td>' +
        '<td class="num"><span class="mfx-net">' + fmt(r.net) + ' kr<small>' + fmt(r.total) + ' inkl moms</small></span></td>' +
        '<td><span class="mfx-pill ' + r.status + '"><span class="d"></span>' + r.status + '</span></td>' +
        '<td class="num">' + pdf + '</td>' +
      '</tr>';
    }).join('');

    var sumNet = 0, sumTot = 0;
    rows.forEach(function (r) { sumNet += r.net; sumTot += r.total; });
    el('mfx-foot').innerHTML =
      '<tr><td colspan="4"><span class="mfx-foot-label">Summa (' + rows.length + ' fakturor)</span></td>' +
      '<td class="num"><span class="mfx-foot-val">' + fmt(sumNet) + ' kr</span><div class="mfx-cat" style="text-align:right">' + fmt(sumTot) + ' inkl moms</div></td>' +
      '<td colspan="2"></td></tr>';
  }

  function renderAll() {
    renderHeader();
    renderKpis();
    renderCounts();
    renderTable();
  }

  // ── Interaktion ──
  el('mfx-filters').addEventListener('click', function (e) {
    var b = e.target.closest('button'); if (!b) return;
    state.filter = b.getAttribute('data-f');
    el('mfx-filters').querySelectorAll('button').forEach(function (x) { x.classList.remove('on'); });
    b.classList.add('on'); renderTable(); renderCounts();
  });
  el('mfx-q').addEventListener('input', function (e) { state.q = e.target.value; renderTable(); });
  el('mfx-thead').addEventListener('click', function (e) {
    var th = e.target.closest('th'); if (!th || !th.getAttribute('data-s')) return;
    var s = th.getAttribute('data-s');
    if (state.sort === s) state.dir *= -1; else { state.sort = s; state.dir = (s === 'date' || s === 'due' || s === 'net') ? -1 : 1; }
    el('mfx-thead').querySelectorAll('th').forEach(function (x) { x.classList.remove('sorted'); });
    th.classList.add('sorted'); renderTable();
  });

  // ── Kick-off ──
  fetchData().then(function (d) {
    DATA = d || DEMO_DATA;
    INV_ALL = normalize(DATA.invoices);
    // Visar ENBART innevarande år. Endpointen returnerar alla år, men vi
    // filtrerar lokalt på THIS_YEAR (invForYear) och erbjuder ingen årsväxling.
    state.year = THIS_YEAR;
    renderAll();
  });
})();
</script>
</div>
